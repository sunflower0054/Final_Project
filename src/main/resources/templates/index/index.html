<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>늘 봄 - 통합 관제 시스템</title>
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <div class="top-row">
        <section class="content-card">
            <!--
              수정 완료:
              eventId가 없으면(상황 발생 X) -> 'green-border'
              eventId가 있으면(상황 발생 O) -> 'red-border'
            -->
            <div class="monitoring-box green-border" id="monitoringContainer">

                <div id="videoLoader" class="video-loader">
                    <div class="spinner"></div>
                    <p>실시간 화면을 불러오는 중입니다...</p>
                </div>

                <img id="videoFeed" src="http://192.168.0.23:5005/video_feed" alt="Realtime Video" style="display: none;" onload="showVideo()">

                <!-- 라이브 인디케이터 점 색상도 eventId 기준으로 변경 -->
                <div class="live-indicator">
                    <div class="live-dot" id="liveDot" style="background: #2ecc71;"></div>
                    LIVE MONITORING
                </div>
            </div>
        </section>

        <aside class="content-card control-panel">
            <h2 style="font-size: 14px; color: var(--gray-500); margin-bottom: 15px;">실시간 감지 정보</h2>

            <div class="urgent-alert" id="urgentAlertBox"
                 th:style="${event == null} ? 'display: none;' : 'display: block;'">
            </div>

            <!-- 버튼 그룹은 기존과 동일하게 유지 -->
            <div class="btn-group">
                <button class="btn btn-red" id="manualReportBtn"
                        onclick="alert('현재 감지된 이벤트가 없습니다.')">
                    🚨 119 수동 신고
                </button>

                <button class="btn btn-info"
                        th:if="${currentUser != null and currentUser.residentId != null}"
                        th:onclick="|location.href='/facility/search?residentId=' + ${currentUser.residentId}|">
                    📍 주변 안심 시설 찾기
                </button>

                <button class="btn btn-info"
                        th:unless="${currentUser != null and currentUser.residentId != null}"
                        onclick="alert('등록된 거주자 정보가 없어 해당 기능을 사용할 수 없습니다. 먼저 어르신을 등록해 주세요.')"
                        style="background-color: var(--gray-400) !important; cursor: not-allowed;">
                    📍 주변 안심 시설 찾기
                </button>

                <button class="btn btn-success" id="closeSituationBtn"
                        onclick="alert('현재 감지된 이벤트가 없습니다.')">
                    상황 종료
                </button>
            </div>
        </aside>
    </div>

    <section class="content-card">
        <div class="wrap">
            <!-- resident 객체가 존재할 경우 이름을 출력하고, 없을 경우 '거주자 미등록'을 출력합니다 -->
            <div class="resident-name" th:text="${resident != null ? resident.name + ' 어르신' : '거주자 미등록'}">김순자 어르신</div>
            <div class="section-title">
                이벤트 타임라인
                <input type="date" class="date-input" id="timelineDateInput">
            </div>

            <div class="risk-card">
                <div class="risk-header">
                    <div class="risk-label">최근 7일 위험 지수</div>
                    <div class="risk-date-range" id="riskDateRange">-</div>
                </div>
                <div class="risk-score-row">
                    <span class="risk-badge" id="riskLevelBadge">확인중</span>
                    <span class="risk-score-num" id="riskScoreNum">0점</span>
                </div>
                <div class="gauge-bg"><div class="gauge-fill" id="riskGaugeFill" style="width: 0%;"></div></div>
                <div class="gauge-ends"><span>0</span><span>200</span></div>
            </div>

            <div class="summary-chips">
                <span class="chip chip-all" id="chipAllCount">전체 0건</span>
                <span class="chip chip-fall" id="chipFallCount">낙상 0건</span>
                <span class="chip chip-nomotion" id="chipNomotionCount">무응답 0건</span>
                <span class="chip chip-fight" id="chipFightCount">폭행 0건</span>
            </div>

            <div class="sort-row">
                <select class="sort-select"><option>최신순</option><option>오래된순</option></select>
            </div>

            <div class="all-btn-row filter-pills">
                <button class="all-btn all-btn-fall pill" data-filter="FALL_DETECTED">낙상만 보기</button>
                <button class="all-btn all-btn-nomotion pill" data-filter="NO_MOTION_DETECTED">무응답만 보기</button>
                <button class="all-btn all-btn-fight pill" data-filter="VIOLENT_MOTION_DETECTED">폭행만 보기</button>
                <button class="all-btn chip-all pill active" data-filter="all" style="grid-column: span 3;">전체 보기</button>
            </div>

            <div class="timeline timeline-container" id="timelineContainer">
                <div class="timeline-line"></div>
                <!-- JS에서 동적 렌더링 -->
            </div>
        </div>
    </section>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/app-api.js}"></script>
<script th:inline="javascript">
    // 1. 초기화 및 이벤트 리스너 설정
    window.addEventListener('load', initialize);
    const initialEvent = /*[[${event}]]*/ null;
    const currentResidentId = /*[[
        ${resident != null ? resident.id :
          (currentUser != null && currentUser.residentId != null ? currentUser.residentId : null)}
    ]]*/ null;
    const residentIdForApi = currentResidentId || 0;

    function showVideo() {
        // 1. 로딩 UI 숨기기
        const loader = document.getElementById('videoLoader');
        if (loader) {
            loader.style.display = 'none';
        }

        // 2. 영상 피드 보여주기
        const videoFeed = document.getElementById('videoFeed');
        if (videoFeed) {
            videoFeed.style.display = 'block'; // 숨겨진 영상을 나타나게 함
        }
    }

    function initialize() {
        window.currentResidentName = /*[[${resident != null ? resident.name + ' 어르신' : null}]]*/ null;
        updateClock();
        setInterval(updateClock, 1000);

        setupDropdown('profileBtn', 'profileDropdown');
        document.addEventListener('click', closeDropdownsOnOutside);
        preventCloseInsideDropdown();

        // 필터 버튼 이벤트
        setupTimelineFilter();

        // 날짜 입력창
        const dateInput = document.getElementById('timelineDateInput');
        if (dateInput) {
            const todayStr = new Date().toISOString().split('T')[0];
            dateInput.value = todayStr;
            dateInput.addEventListener('change', (e) => fetchTimelineData(e.target.value));
            fetchTimelineData(todayStr);
        }

        // ★★★ 핵심 수정 ★★★
        // 1. 페이지 로드와 동시에 초기 이벤트 처리
        if (initialEvent) {
            updateUrgentAlertUI(initialEvent);
        }

        // 2. 즉시 한 번 체크 (3초 기다리지 않음)
        checkNewEvent();

        // 3. 이후 3초마다 폴링
        setInterval(checkNewEvent, 3000);
    }

    async function checkNewEvent() {
        console.log(`🔍 checkNewEvent 실행 → residentId=${residentIdForApi}`);

        if (residentIdForApi === 0) {
            console.warn("residentId가 설정되지 않았습니다.");
            return;
        }

        try {
            const response = await fetch(`/api/v1/events/latest-pending?residentId=${residentIdForApi}`);

            console.log(`📡 API 응답 상태: ${response.status} ${response.statusText}`);

            if (response.status === 200) {
                console.log('✅ PENDING 이벤트 발견! UI 업데이트 시작');
                const event = await response.json();
                console.log('📦 받은 이벤트 데이터:', event);
                updateUrgentAlertUI(event);
            }
            else if (response.status === 204) {
                console.log('ℹ️ 현재 PENDING 이벤트 없음 (204)');
                // 필요하면 여기서 UI를 녹색으로 원복하는 로직 추가 가능
            }
            else {
                console.error(`⚠️ 예상치 못한 응답 코드: ${response.status}`);
                const errorText = await response.text();
                console.error('에러 내용:', errorText);
            }
        } catch (e) {
            console.error("🚨 이벤트 체크 fetch 실패:", e);
        }
    }

    // 3. UI 동적 갱신 함수 (Thymeleaf와 완전 통일 버전)
    function updateUrgentAlertUI(event) {
        console.log('✅ updateUrgentAlertUI 호출됨! event:', event);

        const alertBox = document.getElementById('urgentAlertBox');
        const container = document.getElementById('monitoringContainer');
        const liveDot = document.getElementById('liveDot');

        if (!alertBox || !event) return;

        // 모니터링 박스 + 라이브 도트 빨간색으로 변경
        if (container) {
            container.classList.remove('green-border');
            container.classList.add('red-border');
        }
        if (liveDot) liveDot.style.background = '#e74c3c';

        // 이벤트 제목
        const titles = {
            'FALL_DETECTED': '🚨 낙상 발생',
            'NO_MOTION_DETECTED': '🚨 무응답 감지',
            'VIOLENT_MOTION_DETECTED': '🚨 폭행 의심 감지'
        };
        const eventTitle = titles[event.eventType] || '🚨 이상 상황 발생';

        // 시간 포맷
        const eventTime = new Date(event.timestamp).toLocaleTimeString('ko-KR', {
            hour12: false,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });

        // 신뢰도
        const confidence = event.confidence ? Math.round(event.confidence * 100) : 0;

        // 어르신 이름 (전역 변수로 저장한 것을 사용)
        const residentName = window.currentResidentName || '어르신';

        // 통일된 HTML 구조
        alertBox.innerHTML = `
            <h3>${eventTitle}</h3>
            <p><b>${residentName} 감지됨</b></p>

            <p style="font-size:13px; margin-top:5px;">
                <span>신뢰도 ${confidence}% | </span>
                <span>${eventTime}</span>
            </p>

            ${event.eventType === 'VIOLENT_MOTION_DETECTED' ? `
                <p style="font-size:12px; margin-top:5px; color: var(--gray-600);">
                    ${event.maxVelocity !== null && event.maxVelocity !== undefined ?
                        `<span>최대 속도: ${event.maxVelocity}m/s</span>` : ''}
                    ${event.personCount !== null && event.personCount !== undefined ?
                        `<span> | 인원: ${event.personCount}명</span>` : ''}
                </p>
            ` : ''}
        `;

        alertBox.style.display = 'block';

        // 버튼 이벤트 연결
        const reportBtn = document.getElementById('manualReportBtn');
        const closeBtn = document.getElementById('closeSituationBtn');

        if (reportBtn) {
            reportBtn.onclick = () => goToManualReport(event.id);
        }
        if (closeBtn) {
            closeBtn.onclick = () => closeSituation(event.id);
        }
    }

    // 2. 서버 API 데이터 연동 (JSON만 주고받음)
    async function fetchTimelineData(date) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '<div style="text-align:center; padding:30px;">데이터를 분석 중입니다...</div>';

        if (residentIdForApi === 0) {
            container.innerHTML = '<div style="text-align:center; color:red; padding:30px;">거주자 정보가 없습니다.</div>';
            return;
        }

        try {
            const response = await fetch(`/api/v1/eventsTimeline?date=${date}&residentId=${residentIdForApi}`);
            if (!response.ok) throw new Error('서버 응답 오류');

            const data = await response.json();

            updateRiskCard(data.riskSummary);
            updateSummaryChips(data.daySummary);
            renderTimeline(data.events);

            applyActiveFilter();
        } catch (error) {
            console.error('Data Fetch Error:', error);
            container.innerHTML = '<div style="text-align:center; color:red; padding:30px;">데이터 로드 실패</div>';
        }
    }

    // 3. 위험 지수 카드 업데이트 (RiskSummary 연동)
    function updateRiskCard(risk) {
        if (!risk) return;
        document.getElementById('riskDateRange').innerText = risk.dateRange || '-';
        document.getElementById('riskLevelBadge').innerText = risk.riskLevel || '확인중';
        document.getElementById('riskScoreNum').innerText = (risk.totalScore || 0) + '점';

        // 200점 만점 기준 게이지 바 너비 계산
        const percent = Math.min(((risk.totalScore || 0) / 200) * 100, 100);
        document.getElementById('riskGaugeFill').style.width = percent + '%';

        // 위험 수준별 색상 변경
        const badge = document.getElementById('riskLevelBadge');
        if (risk.riskLevel === '안전') {
            badge.style.background = '#e7f7ed'; badge.style.color = '#2ecc71';
        } else if (risk.riskLevel === '주의') {
            badge.style.background = '#fff4e5'; badge.style.color = '#ff9800';
        } else {
            badge.style.background = '#ffebee'; badge.style.color = '#e74c3c';
        }
    }

    // 4. 요약 칩 숫자 업데이트 (DaySummary 연동)
    function updateSummaryChips(summary) {
        if (!summary) return;
        document.getElementById('chipAllCount').innerText = `전체 ${summary.totalCount || 0}건`;
        document.getElementById('chipFallCount').innerText = `낙상 ${summary.fallCount || 0}건`;
        document.getElementById('chipNomotionCount').innerText = `무응답 ${summary.noMotionCount || 0}건`;
        document.getElementById('chipFightCount').innerText = `폭행 ${summary.violentCount || 0}건`;
    }

    // 5. 타임라인 리스트 렌더링 (이미지 및 상세정보 포함)
    function renderTimeline(events) {
        const container = document.getElementById('timelineContainer');
        if (!events || events.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:30px; color:#999;">감지된 이벤트가 없습니다.</div>';
            return;
        }

        container.innerHTML = '<div class="timeline-line"></div>' + events.map(event => `
            <div class="tl-item" data-type="${event.eventType}">
                <div class="tl-time">${event.timestamp}</div>

                <div class="tl-content" style="display: flex; gap: 15px; align-items: flex-start;">

                    <div class="tl-image-box" style="flex: 0 0 120px; width: 120px; height: 90px; border-radius: 8px; overflow: hidden; border: 1px solid #eee; background: #f5f5f5;">
                        <img src="${event.imagePath || 'https://placehold.co/400x300?text=No+Image'}"
                             onerror="this.src='https://placehold.co/400x300?text=No+Image'"
                             alt="감지장면"
                             style="width: 100%; height: 100%; object-fit: cover;"> </div>

                    <div class="tl-text-box" style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span class="tl-title" style="font-weight: 700;">${getEventTitle(event.eventType)}</span>
                            <span class="tl-status" style="font-size: 12px; color: #888;">${event.status}</span>
                        </div>

                        <div class="tl-detail" style="font-size: 13px; color: #666;">
                            ${event.maxVelocity ? `<span>최대 속도: ${event.maxVelocity}m/s</span>` : ''}
                            ${event.personCount ? `<span style="margin-left: 15px;">인원: ${event.personCount}명</span>` : ''}
                        </div>
                    </div>
                </div>
            </div>
        `).join('');

        // 필터 상태 유지
        applyActiveFilter();
    }

    // 6. 필터 버튼 이벤트 연동
    function setupTimelineFilter() {
        const pills = document.querySelectorAll('.filter-pills .pill');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                applyActiveFilter();
            });
        });
    }

    function applyActiveFilter() {
        const activePill = document.querySelector('.filter-pills .pill.active');
        if (!activePill) return;

        const filterType = activePill.dataset.filter;
        const items = document.querySelectorAll('.tl-item');

        items.forEach(item => {
            if (filterType === 'all') {
                item.style.display = 'flex';
            } else {
                item.style.display = (item.dataset.type === filterType) ? 'flex' : 'none';
            }
        });
    }

    // 기타 유틸리티 (기존 로직 유지)
    function getEventTitle(type) {
        const titles = { 'FALL_DETECTED': '낙상 감지', 'NO_MOTION_DETECTED': '무응답', 'VIOLENT_MOTION_DETECTED': '폭행' };
        return titles[type] || type;
    }

    function updateClock() {
        const timeEl = document.getElementById('currentTime');
        if(timeEl) timeEl.innerText = new Date().toLocaleString();
    }

    function setupDropdown(btnId, dropdownId) {
        const btn = document.getElementById(btnId);
        const menu = document.getElementById(dropdownId);
        if (btn && menu) {
            btn.onclick = (e) => { e.stopPropagation(); menu.classList.toggle('open'); };
        }
    }

    function closeDropdownsOnOutside() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
    }

    function preventCloseInsideDropdown() {
        document.querySelectorAll('.dropdown-menu').forEach(m => m.onclick = (e) => e.stopPropagation());
    }

    // 로그아웃 (CSRF 토큰 대응)
    document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.js-logout-btn');
        if (!btn) return;
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;

        const response = await fetch('/api/v1/auth/logout', {
            method: 'POST',
            headers: { [header]: token }
        });
        if (response.ok) window.location.href = '/member/login?logout';
    });

    // 119 수동 신고 페이지 이동 및 문자 전송 함수
    function goToManualReport(eventId) {
        if (!eventId) {
            alert("이벤트 정보가 없어 신고를 진행할 수 없습니다.");
            return;
        }

        if (confirm("119 수동 신고를 진행하시겠습니까? 관련 정보가 문자로 전송됩니다.")) {
            location.href = `/report/confirm?eventId=${eventId}`;
        }
    }


    // 상황 종료 처리 함수 (비동기 통신)
    async function closeSituation(eventId) {
        if (!eventId) {
            alert("이벤트 정보가 없어 상황을 종료할 수 없습니다.");
            return;
        }

        // 오작동 방지를 위한 확인창
        if (confirm("오탐지이거나 상황이 해제되었습니까? 상황을 종료 처리합니다.")) {
            try {
                // SmsController의 @GetMapping("/close") 경로로 비동기 요청
                const response = await fetch(`/report/close?eventId=${eventId}`);

                if (response.ok) {
                    // 컨트롤러에서 반환한 문자열("상황이 종료되었습니다.")을 받아옴
                    const message = await response.text();
                    alert(message);

                    // 긴급 알림창 숨기기
                    const alertBox = document.querySelector('.urgent-alert');
                    if (alertBox) {
                        alertBox.style.display = 'none';
                    }

                    // --- 추가된 부분: 모니터링 테두리를 녹색으로 원상복구 ---
                    const monitoringContainer = document.getElementById('monitoringContainer');
                    if (monitoringContainer) {
                        monitoringContainer.classList.remove('red-border');
                        monitoringContainer.classList.add('green-border');

                        // 라이브 인디케이터 색상도 녹색으로 변경
                        const liveDot = monitoringContainer.querySelector('.live-dot');
                        if(liveDot) {
                            liveDot.style.background = '#2ecc71';
                        }
                    }

                    // (선택) 처리 완료 후 우측의 수동신고 / 상황종료 버튼들도 숨기거나 비활성화 처리할 수 있습니다.
                    // const actionBtns = document.querySelectorAll('.btn-red, .btn-success');
                    // actionBtns.forEach(btn => btn.style.display = 'none');

                } else {
                    alert("상황 종료 처리에 실패했습니다. 서버 상태를 확인해 주세요.");
                }
            } catch (error) {
                console.error('Close Situation Error:', error);
                alert("서버와 통신 중 오류가 발생했습니다.");
            }
        }
    }
</script>
</body>
</html>
