<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골든노미스 - 통합 관제 시스템</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <div class="top-row">
        <section class="content-card">
            <div class="monitoring-box green-border" id="monitoringContainer">
                <div id="videoLoader" class="video-loader">
                    <div class="spinner"></div>
                    <p>실시간 화면을 불러오는 중입니다...</p>
                </div>
                <div class="live-indicator"><div class="live-dot"></div> LIVE MONITORING</div>
            </div>
        </section>
        <aside class="content-card control-panel">
            <h2 style="font-size: 14px; color: var(--gray-500); margin-bottom: 15px;">실시간 감지 정보</h2>
            <div class="urgent-alert">
                <h3>🚨 낙상 발생</h3>
                <p><b>김영희 (거실)</b></p>
                <p style="font-size:13px; margin-top:5px;">신뢰도 98% | 15:28:05</p>
            </div>
            <div class="btn-group">
                <button class="btn btn-red" onclick="goToManualReport(12)">
                    🚨 119 수동 신고
                </button>
                <button class="btn btn-outline">보호자 비상 연락</button>
                <!-- 기존과 동일하게 클래스 유지 -->
                <button class="btn btn-success">상황 종료 및 복구</button>
            </div>
        </aside>
    </div>

    <!-- 중간 통계 및 타임라인 영역은 기존 코드와 동일하게 유지 -->
    <section class="content-card">
        <div class="risk-score-section" style="padding: 24px; display: flex; flex-direction: column; gap: 12px;">
            <div class="score-label-area" style="font-size: 14px; color: var(--gray-500); font-weight: 700; text-align: left;">
                최근 7일 위험 지수 <span id="dateRangeLabel" style="font-size: 13px; font-weight: 500; color: var(--gray-400); margin-left: 8px;"></span>
            </div>
            <div class="score-data-area" style="display: flex; align-items: center; justify-content: space-between; gap: 24px; width: 100%;">
                <div id="scoreText" class="val" style="font-size: 32px; font-weight: 900; line-height: 1; flex-shrink: 0; min-width: 140px;">
                    130 <span class="total-val" style="font-size: 18px; color: var(--gray-400); font-weight: 600;">/ 200</span>
                </div>
                <div class="progress-container" style="flex: 1; height: 16px; background: var(--gray-200); border-radius: 20px; overflow: hidden; border: 1px solid var(--gray-300);">
                    <div id="progressBar" class="progress-bar" style="width: 0%; height: 100%; transition: width 1s ease, background 0.5s ease; border-radius: 20px;"></div>
                </div>
                <div id="statusLabel" style="font-size: 16px; font-weight: 800; white-space: nowrap; flex-shrink: 0; min-width: 90px; text-align: right;">
                    상태: 확인중
                </div>
            </div>
        </div>

        <!-- 이벤트 통계 및 타임라인 부분 생략 (기존 코드 그대로 적용) -->
    </section>
</div>

<footer class="service-footer">
    <div class="footer-content">
        <div class="footer-logo">
            <span class="brand-name">늘봄</span>
            <span class="footer-tagline">언제나 봄날 같은 안전한 일상</span>
        </div>
        <div class="footer-info">
            <p>© 2026 Goldenomis. All rights reserved.</p>
            <p>고객센터: 1588-0000 | 이메일: support@neulbom.ai</p>
        </div>
    </div>
</footer>

<script th:inline="javascript">
    function goToManualReport(residentId) {
        const isConfirmed = confirm("🚨 정말 119에 수동으로 신고하시겠습니까?\n확인을 누르면 즉시 신고 페이지로 이동합니다.");
        if (isConfirmed) {
            location.href = `/report?type=manual&residentId=${residentId}`;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const successBtn = document.querySelector('.btn-success');
        const urgentAlert = document.querySelector('.urgent-alert');
        const monitoringContainer = document.getElementById('monitoringContainer');

        function updateBorder() {
            const isEventActive = urgentAlert && urgentAlert.style.display !== 'none';
            if (isEventActive) {
                monitoringContainer.classList.remove('green-border');
                monitoringContainer.classList.add('red-border');
            } else {
                monitoringContainer.classList.remove('red-border');
                monitoringContainer.classList.add('green-border');
            }
        }

        updateBorder();

        // 3. 상황 종료 버튼 클릭 이벤트 (fetch 연동 부분)
        successBtn.addEventListener('click', function() {
            const isCurrentlyActive = urgentAlert && urgentAlert.style.display !== 'none';

            if (!isCurrentlyActive) {
                alert("현재 발생한 감지 이벤트가 없습니다.");
                return;
            }

            if (confirm("해당 상황을 종료 처리하시겠습니까?")) {

                // TODO: 실제 환경에 맞게 타임리프 변수나 데이터 속성에서 값을 가져오도록 수정하세요.
                // 예: const eventId = /*[[${eventId}]]*/ 1;
                const eventId = 1;

                // 백엔드 API 호출
                fetch(`/report/close?eventId=${eventId}`)
                    .then(res => {
                        if (!res.ok) throw new Error("서버 응답 오류");
                        return res.text();
                    })
                    .then(msg => {
                        // 서버 성공 응답 메시지 알림
                        alert(msg);

                        // 통신 성공 시 기존 UI 복구 로직 실행
                        const originalText = "상황 종료 및 복구";

                        successBtn.innerText = "상황 종료됨 ✓";
                        successBtn.classList.remove('btn-success');
                        successBtn.style.backgroundColor = "var(--gray-400)";
                        successBtn.disabled = true;

                        if (urgentAlert) urgentAlert.style.display = 'none';
                        updateBorder();

                        setTimeout(() => {
                            successBtn.innerText = originalText;
                            successBtn.style.backgroundColor = "var(--success)";
                            successBtn.classList.add('btn-success');
                            successBtn.disabled = false;
                        }, 5000);
                    })
                    .catch(err => {
                        console.error('Fetch Error:', err);
                        alert("상황 종료 처리 중 오류가 발생했습니다.");
                    });
            }
        });
    });

    // 기타 기존 UI 업데이트 함수들 (showVideo, updateClock 등 동일 유지)
    // ...
</script>
</body>
</html>
