<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns="http://www.w3.org/1999/html" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>늘 봄 - 통합 관제 시스템</title>
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <div class="top-row">
        <section class="content-card">
            <div class="monitoring-box green-border" id="monitoringContainer">
                <div id="videoLoader" class="video-loader">
                    <div class="spinner"></div>
                    <p>실시간 화면을 불러오는 중입니다...</p>
                </div>

                <!-- <img id="videoFeed" src="http://localhost:5005/video_feed" alt="Realtime Video" style="display: none;" onload="showVideo()"> -->

                <div class="live-indicator"><div class="live-dot"></div> LIVE MONITORING</div>
            </div>
        </section>

        <aside class="content-card control-panel">
            <h2 style="font-size: 14px; color: var(--gray-500); margin-bottom: 15px;">실시간 감지 정보</h2>

            <!-- 에러 메시지가 있을 때 보여줄 안내창 -->
            <div th:if="${errorMessage != null}" class="urgent-alert" style="background: var(--gray-100); border: 2px solid var(--gray-300);">
                <p style="color: var(--gray-600); font-weight: 700; text-align: center;" th:text="${errorMessage}">
                    회원정보를 불러올 수 없습니다.
                </p>
            </div>

            <!-- 기존 알림창 -->
            <div th:if="${resident != null}" class="urgent-alert">
                <h3>🚨 낙상 발생</h3>
                <p><b th:text="${resident.name} + ' (거실)'">김영희 (거실)</b></p>
                <p style="font-size:13px; margin-top:5px;">신뢰도 98% | 15:28:05</p>
            </div>

            <div class="btn-group">
                <!-- 119 수동 신고 버튼 -->
                <button class="btn btn-red" th:if="${resident != null}" th:onclick="|goToManualReport(${resident.id})|">
                    🚨 119 수동 신고
                </button>

                <!-- 시설 찾기 버튼 -->
                <button class="btn btn-info"
                        th:if="${currentUser != null and currentUser.residentId != null}"
                        th:onclick="|location.href='/facility/search?residentId=' + ${currentUser.residentId}|"
                        style="background-color: #3182ce; color: white;">
                    📍 주변 안심 시설 찾기
                </button>

                <button class="btn btn-info"
                        th:unless="${currentUser != null and currentUser.residentId != null}"
                        onclick="alert('등록된 거주자 정보가 없어 해당 기능을 사용할 수 없습니다. 먼저 어르신을 등록해 주세요.')"
                        style="background-color: var(--gray-400); color: white; cursor: not-allowed;">
                    📍 주변 안심 시설 찾기
                </button>

                <button class="btn btn-outline">보호자 비상 연락</button>
                <button class="btn btn-success">상황 종료 및 복구</button>
            </div>
        </aside>
    </div>

    <section class="content-card">
        <div class="wrap">
            <div class="resident-name">김순자 어르신</div>
            <div class="section-title">
                이벤트 타임라인
                <input type="date" class="date-input" id="timelineDateInput">
            </div>

            <div class="risk-card">
                <div class="risk-header">
                    <div class="risk-label">최근 7일 위험 지수</div>
                    <div class="risk-date-range" id="riskDateRange">-</div>
                </div>
                <div class="risk-score-row">
                    <span class="risk-badge" id="riskLevelBadge">확인중</span>
                    <span class="risk-score-num" id="riskScoreNum">0점</span>
                </div>
                <div class="gauge-bg"><div class="gauge-fill" id="riskGaugeFill" style="width: 0%;"></div></div>
                <div class="gauge-ends"><span>0</span><span>200</span></div>
            </div>

            <div class="summary-chips">
                <span class="chip chip-all" id="chipAllCount">전체 0건</span>
                <span class="chip chip-fall" id="chipFallCount">낙상 0건</span>
                <span class="chip chip-nomotion" id="chipNomotionCount">무응답 0건</span>
                <span class="chip chip-fight" id="chipFightCount">폭행 0건</span>
            </div>

            <div class="sort-row">
                <select class="sort-select"><option>최신순</option><option>오래된순</option></select>
            </div>

            <div class="all-btn-row filter-pills">
                <button class="all-btn all-btn-fall pill" data-filter="FALL_DETECTED">낙상만 보기</button>
                <button class="all-btn all-btn-nomotion pill" data-filter="NO_MOTION_DETECTED">무응답만 보기</button>
                <button class="all-btn all-btn-fight pill" data-filter="VIOLENT_MOTION_DETECTED">폭행만 보기</button>
                <button class="all-btn chip-all pill active" data-filter="all" style="grid-column: span 3;">전체 보기</button>
            </div>

            <div class="timeline timeline-container" id="timelineContainer">
                <div class="timeline-line"></div>
                <!-- JS에서 동적 렌더링 -->
            </div>
        </div>
    </section>
</div>

<footer class="service-footer">
    <div class="footer-content">
        <div class="footer-logo">
            <span class="brand-name">늘봄</span>
            <span class="footer-tagline">언제나 봄날 같은 안전한 일상</span>
        </div>
        <div class="footer-info">
            <p>© 2026 Goldenomis. All rights reserved.</p>
            <p>고객센터: 1588-0000 | 이메일: support@neulbom.ai</p>
        </div>
    </div>
</footer>

<script th:src="@{/js/app-api.js}"></script>
<script th:inline="javascript">

    /* =========================================
       1. 기존 기능 (로그아웃, 알림 종료 등) 유지 영역
       ========================================= */
    document.addEventListener('click', async (event) => {
        const logoutButton = event.target.closest('.js-logout-btn');
        if (!logoutButton) return;

        try {
            const response = await fetch('/api/v1/auth/logout', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            });

            if (response.ok) {
                window.location.href = '/member/login?logout';
            } else {
                alert('로그아웃 처리에 실패했습니다.');
            }
        } catch (error) {
            console.error('Logout error:', error);
            alert('로그아웃 중 오류가 발생했습니다.');
        }
    });

    function goToManualReport(eventId) {
        const isConfirmed = confirm("🚨 정말 119에 수동으로 신고하시겠습니까?\n확인을 누르면 즉시 신고 페이지로 이동합니다.");
        if (isConfirmed) {
            location.href = `/report/confirm?eventId=${eventId}`;
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        const successBtn = document.querySelector('.btn-success');
        const urgentAlert = document.querySelector('.urgent-alert');
        const monitoringContainer = document.getElementById('monitoringContainer');

        function updateBorder() {
            if(!urgentAlert || !monitoringContainer) return;
            const isEventActive = urgentAlert.style.display !== 'none';
            if (isEventActive) {
                monitoringContainer.classList.remove('green-border');
                monitoringContainer.classList.add('red-border');
            } else {
                monitoringContainer.classList.remove('red-border');
                monitoringContainer.classList.add('green-border');
            }
        }
        updateBorder();

        if(successBtn) {
            successBtn.addEventListener('click', function() {
                const isCurrentlyActive = urgentAlert && urgentAlert.style.display !== 'none';

                if (!isCurrentlyActive) {
                    alert("현재 발생한 감지 이벤트가 없습니다.");
                    return;
                }

                if (confirm("해당 상황을 종료 처리하시겠습니까?")) {
                    const eventId = 1; // TODO: 실제 eventId 연동 필요

                    fetch(`/report/close?eventId=${eventId}`)
                        .then(res => {
                            if (!res.ok) throw new Error("서버 응답 오류");
                            return res.text();
                        })
                        .then(msg => {
                            alert(msg);
                            const originalText = "상황 종료 및 복구";

                            successBtn.innerText = "상황 종료됨 ✓";
                            successBtn.classList.remove('btn-success');
                            successBtn.style.backgroundColor = "var(--gray-400)";
                            successBtn.disabled = true;

                            if (urgentAlert) urgentAlert.style.display = 'none';
                            updateBorder();

                            setTimeout(() => {
                                successBtn.innerText = originalText;
                                successBtn.style.backgroundColor = "var(--success)";
                                successBtn.classList.add('btn-success');
                                successBtn.disabled = false;
                            }, 5000);
                        })
                        .catch(err => {
                            console.error('Fetch Error:', err);
                            alert("상황 종료 처리 중 오류가 발생했습니다.");
                        });
                }
            });
        }
    });

    function showVideo() {
        const loader = document.getElementById('videoLoader');
        const feed = document.getElementById('videoFeed');
        if(loader) loader.style.display = 'none';
        if(feed) feed.style.display = 'block';
    }

    function updateClock() {
        const now = new Date();
        const timeEl = document.getElementById('currentTime');
        if(timeEl) {
            timeEl.innerText =
                now.getFullYear() + '. ' +
                (now.getMonth() + 1).toString().padStart(2, '0') + '. ' +
                now.getDate().toString().padStart(2, '0') + ' ' +
                now.getHours().toString().padStart(2, '0') + ':' +
                now.getMinutes().toString().padStart(2, '0') + ':' +
                now.getSeconds().toString().padStart(2, '0');
        }
    }

    function setupDropdown(btnId, dropdownId) {
        const btn = document.getElementById(btnId);
        const dropdown = document.getElementById(dropdownId);
        if (!btn || !dropdown) return;
        btn.addEventListener('click', (e) => {
            e.stopImmediatePropagation();
            document.querySelectorAll('.dropdown-menu').forEach(menu => {
                if (menu.id !== dropdownId) menu.classList.remove('open');
            });
            dropdown.classList.toggle('open');
        });
    }

    function closeDropdownsOnOutside(e) {
        if (!e.target.closest('.dropdown-wrap')) {
            document.querySelectorAll('.dropdown-menu').forEach(menu => menu.classList.remove('open'));
        }
    }

    function preventCloseInsideDropdown() {
        document.querySelectorAll('.dropdown-menu').forEach(menu => {
            menu.addEventListener('click', e => e.stopImmediatePropagation());
        });
    }

    /* =========================================
       2. API 기반 타임라인 동적 렌더링 영역
       ========================================= */

    async function fetchTimelineData(dateStr) {
        try {
            const response = await fetch(`/api/v1/eventsTimeline?date=${dateStr}`);
            if (!response.ok) throw new Error("데이터 불러오기 실패");

            const data = await response.json();

            updateRiskCard(data.riskSummary);
            updateSummaryChips(data.daySummary);
            renderTimeline(data.events);

            // 데이터 로드 후 현재 활성화된 필터를 다시 적용
            applyActiveFilter();

        } catch (error) {
            console.error("Timeline Fetch Error:", error);
            const container = document.getElementById('timelineContainer');
            if(container) {
                container.innerHTML = '<div class="timeline-line"></div><div style="text-align:center; padding:30px; color:#a32d2d; font-weight:bold;">데이터를 불러오는 중 오류가 발생했습니다.</div>';
            }
        }
    }

    function updateRiskCard(risk) {
        if (!risk) return;
        document.getElementById('riskDateRange').innerText = risk.dateRange || '-';
        document.getElementById('riskLevelBadge').innerText = risk.riskLevel || '안전';
        document.getElementById('riskScoreNum').innerText = (risk.totalScore || 0) + '점';

        const percent = Math.min(((risk.totalScore || 0) / 200) * 100, 100);
        document.getElementById('riskGaugeFill').style.width = percent + '%';

        // 뱃지 색상 동적 변경
        const badge = document.getElementById('riskLevelBadge');
        if (risk.riskLevel === '안전') {
            badge.style.background = '#eaf3de'; badge.style.color = '#3b6d11';
        } else if (risk.riskLevel === '주의') {
            badge.style.background = '#faeeda'; badge.style.color = '#854F0B';
        } else {
            badge.style.background = '#fde8e8'; badge.style.color = '#a32d2d';
        }
    }

    function updateSummaryChips(summary) {
        if (!summary) return;
        document.getElementById('chipAllCount').innerText = `전체 ${summary.totalCount || 0}건`;
        document.getElementById('chipFallCount').innerText = `낙상 ${summary.fallCount || 0}건`;
        document.getElementById('chipNomotionCount').innerText = `무응답 ${summary.noMotionCount || 0}건`;
        document.getElementById('chipFightCount').innerText = `폭행 ${summary.violentCount || 0}건`;
    }

    function renderTimeline(events) {
        const container = document.getElementById('timelineContainer');
        container.innerHTML = '<div class="timeline-line"></div>';

        if (!events || events.length === 0) {
            container.innerHTML += `<div style="text-align:center; padding:30px; color:#8a9a70;">해당 날짜에 발생한 이벤트가 없습니다.</div>`;
            return;
        }

        events.forEach(event => {
            let dotColor, tagClass, typeName, title;

            if (event.eventType === 'FALL_DETECTED') {
                dotColor = 'dot-red'; tagClass = 'tag-fall'; typeName = '낙상'; title = '낙상 / 기절 감지';
            } else if (event.eventType === 'NO_MOTION_DETECTED') {
                dotColor = 'dot-amber'; tagClass = 'tag-nomotion'; typeName = '무응답'; title = '장시간 무응답 감지';
            } else if (event.eventType === 'VIOLENT_MOTION_DETECTED') {
                dotColor = 'dot-purple'; tagClass = 'tag-fight'; typeName = '폭행'; title = '폭행 의심 감지';
            } else {
                dotColor = 'dot-amber'; tagClass = 'tag-nomotion'; typeName = '기타'; title = '기타 감지';
            }

            // 이미지 처리: imagePath가 있으면 API 호출 형태 등으로 구성
            // (경로가 절대경로인 경우 프론트에서 직접 띄울 수 없으므로, 향후 /api/images?path=... 형태로 수정 필요)
            const imgHtml = event.imagePath
                ? `<img src="/api/images?path=${encodeURIComponent(event.imagePath)}" style="width:100%; height:100%; object-fit:cover;" alt="감지 사진">`
                : `<span class="img-label">캡처사진 없음</span>`;

            // 추가 정보 (무응답 시간, 폭행 인원 등)
            let extraHtml = '';
            if (event.eventType === 'NO_MOTION_DETECTED' && event.lastMotionTimestamp) {
                const timeOnly = event.lastMotionTimestamp.split('T')[1] || event.lastMotionTimestamp;
                extraHtml = `<div style="font-size:13px; color:#666; margin-top:6px;">⏱️ 마지막 움직임: ${timeOnly}</div>`;
            } else if (event.eventType === 'VIOLENT_MOTION_DETECTED') {
                extraHtml = `<div style="font-size:13px; color:#666; margin-top:6px;">👥 ${event.personCount || 0}명 | 🏃 최고속도: ${event.maxVelocity || 0}</div>`;
            }

            const html = `
                <div class="event-item tl-item" data-type="${event.eventType}" style="display: flex;">
                    <div class="event-dot ${dotColor}"></div>
                    <div class="event-card">
                        <div class="event-card-top">
                            <span class="tag ${tagClass}">${typeName}</span>
                            <div class="event-time">${event.timestamp}</div>
                        </div>
                        <div class="event-body">
                            <div class="event-img">${imgHtml}</div>
                            <div class="event-info">
                                <div class="event-date-txt">${event.date}</div>
                                <div class="event-title">${title}</div>
                                <div class="event-status">${event.status}</div>
                                ${extraHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.insertAdjacentHTML('beforeend', html);
        });
    }

    // 타임라인 필터링 기능
    function setupTimelineFilter() {
        const pills = document.querySelectorAll('.filter-pills .pill');
        pills.forEach(pill => {
            pill.addEventListener('click', () => {
                pills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                applyActiveFilter();
            });
        });
    }

    // 현재 활성화된 칩에 맞춰 리스트 필터링 (렌더링 후 재호출용)
    function applyActiveFilter() {
        const activePill = document.querySelector('.filter-pills .pill.active');
        if(!activePill) return;

        const filterType = activePill.dataset.filter;
        const timelineItems = document.querySelectorAll('.timeline-container .tl-item');

        timelineItems.forEach(item => {
            if (filterType === 'all') {
                item.style.display = 'flex';
            } else {
                item.style.display = item.dataset.type === filterType ? 'flex' : 'none';
            }
        });
    }

    function initialize() {
        updateClock();
        setInterval(updateClock, 1000);

        setupDropdown('notiBtn', 'notiDropdown');
        setupDropdown('profileBtn', 'profileDropdown');
        document.addEventListener('click', closeDropdownsOnOutside);
        preventCloseInsideDropdown();

        setupTimelineFilter();

        const dateInput = document.getElementById('timelineDateInput');
        if (dateInput) {
            // 오늘 날짜 기본 세팅
            const today = new Date();
            // 시간대 보정하여 yyyy-mm-dd 추출
            const offset = today.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(today - offset)).toISOString().split('T')[0];

            dateInput.value = localISOTime;

            // 날짜 변경 이벤트
            dateInput.addEventListener('change', function(e) {
                fetchTimelineData(e.target.value);
            });

            // 첫 진입 시 데이터 자동 로드
            fetchTimelineData(localISOTime);
        }
    }

    window.addEventListener('load', initialize);

</script>
</body>
</html>
