<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 대시보드</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <span class="logo-text">관제 사스템</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item active">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                대시보드
            </a>
            <a href="/camera" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                카메라 관리
            </a>
            <a href="/event" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                이벤트 기록
            </a>
            <a href="/status" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                통계
            </a>
            <a href="/setting" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                설정
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">대시보드</h1>
            </div>
            <div class="topbar-right">
                <button class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <button class="icon-btn avatar-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </header>

        <div class="page-body">
            <!-- Alert Cards -->
            <div class="alert-cards">
                <div class="alert-card alert-red">
                    <div class="alert-icon red"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">낙상 감지</div>
                        <div class="alert-count">3<span>건</span></div>
                    </div>
                </div>
                <div class="alert-card alert-orange">
                    <div class="alert-icon orange"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">무응답</div>
                        <div class="alert-count">2<span>건</span></div>
                    </div>
                </div>
                <div class="alert-card alert-yellow">
                    <div class="alert-icon yellow"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">폭행 의심</div>
                        <div class="alert-count">1<span>건</span></div>
                    </div>
                </div>
            </div>

            <!-- Middle Section -->
            <div class="content-grid">
                <!-- CCTV Feed -->
                <div class="card cctv-card">
                    <div class="card-header">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        <span>CCTV영상</span>
                    </div>
                    <div class="cctv-feed">
                        <div class="cctv-placeholder">
                            <img src="http://192.168.0.79:5005/video_feed"
                                 style="width:100%; height:100%; object-fit:cover; display:block;"
                                 alt="실시간 웹캠">
                            <!-- https://subabsolute-plumier-larae.ngrok-free.dev/realtime/video -->
                            <!-- http://192.168.0.79:5005/video_feed -->
                        </div>
                        <div class="cctv-badge">● CCTV 청상</div>
                    </div>
                </div>

                <!-- Event Log -->
                <div class="card event-log-card">
                    <div class="card-header-plain">이빈드 로그</div>
                    <div class="log-list">
                        <div class="log-item">
                            <div class="log-icon-dot red"></div>
                            <div class="log-text">
                                <div class="log-title">낙상 감지</div>
                                <div class="log-sub">카메라 1</div>
                            </div>
                            <div class="log-right">
                                <div class="log-time">10:21</div>
                                <div class="log-sub">카메라 1</div>
                            </div>
                        </div>
                        <div class="log-item">
                            <div class="log-icon-dot orange"></div>
                            <div class="log-text">
                                <div class="log-title">무음담</div>
                                <div class="log-sub">카메라 2</div>
                            </div>
                            <div class="log-right">
                                <div class="log-time">10:18</div>
                                <div class="log-sub">카메라 2</div>
                            </div>
                        </div>
                        <div class="log-item">
                            <div class="log-icon-dot yellow"></div>
                            <div class="log-text">
                                <div class="log-title">폭행 의심</div>
                                <div class="log-sub">카메라 3</div>
                            </div>
                            <div class="log-right">
                                <div class="log-time">10:15</div>
                                <div class="log-sub">카메라 3</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Section -->
            <div class="bottom-grid">
                <!-- Event Detail -->
                <div class="card event-detail-card">
                    <div class="card-header-plain">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:6px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                        이빈드 상제
                    </div>
                    <div class="event-detail-body">
                        <div class="event-thumb">
                            <div class="thumb-figure"></div>
                        </div>
                        <div class="event-info">
                            <div class="event-row">
                                <span class="event-label">감지 유형 : 낙상</span>
                                <span class="badge-urgent">낙장</span>
                            </div>
                            <div class="event-row"><span class="event-label-sm">시간:</span><span class="event-val">10:21</span></div>
                            <div class="event-row"><span class="event-label-sm">상대:</span><span class="event-val">감지팀</span></div>
                            <hr class="divider">
                            <div class="check-list">
                                <div class="check-item">✓ keypoints 속풀 전료</div>
                                <div class="check-item">✓ 낙상 관만 전료</div>
                                <div class="check-item">✓ 12스 지속</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Actions -->
                <div class="card actions-card">
                    <div class="card-header-plain">액션</div>
                    <div class="action-list">
                        <div class="action-item">
                            <div class="action-icon red"></div>
                            <span class="action-name">서버 전송</span>
                            <span class="action-time">10:21</span>
                        </div>
                        <div class="action-item">
                            <div class="action-icon orange"></div>
                            <span class="action-name">무음담</span>
                            <span class="action-time">10:18</span>
                        </div>
                        <div class="action-item">
                            <div class="action-icon yellow"></div>
                            <span class="action-name">폭행 의심</span>
                            <span class="action-time">10:15</span>
                        </div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-primary">서버 전송</button>
                        <button class="btn-secondary">관티자 얼티</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
