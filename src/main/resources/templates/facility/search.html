<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <title>늘 봄 - 주변 시설 찾기</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>

    <style>
        /* 페이지 전체 레이아웃 */
        .page-container {
            display: grid;
            grid-template-areas:
                "categories"
                "content";
            grid-template-rows: auto 1fr;
            gap: 20px;
            height: calc(100vh - 120px); /* 헤더 높이를 고려한 전체 높이 */
            padding: 20px;
            box-sizing: border-box;
        }

        /* 1. 상단 카테고리 영역 */
        .category-section {
            grid-area: categories;
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            padding: 20px;
        }
        .category-section h3 {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--navy);
        }
        .category-container {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .cat-chip {
            padding: 12px 20px;
            border-radius: 10px;
            border: 2px solid var(--gray-200);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            background: #fff;
            color: var(--gray-600);
            transition: all 0.2s ease;
        }
        /* 카테고리 활성화 스타일 - 서비스 남색 적용 */
        .cat-chip.active {
            background: var(--navy);
            color: #fff;
            border-color: var(--navy);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .category-hint {
            font-size: 14px;
            color: var(--gray-500);
            margin-top: 10px;
        }

        /* 2. 메인 콘텐츠 영역 (지도 + 리스트) */
        .content-section {
            grid-area: content;
            display: grid;
            grid-template-columns: 1fr 420px; /* 지도 1 : 리스트 고정 너비 */
            gap: 20px;
            overflow: hidden; /* 자식 요소의 스크롤을 위해 필수 */
        }

        /* 지도 영역 */
        .map-section {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            overflow: hidden;
        }
        #map { width: 100%; height: 100%; }

        /* 리스트 영역 */
        .list-section {
            background: #fff;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .list-section h4 {
            font-size: 18px;
            font-weight: 800;
            color: var(--gray-800);
            padding: 20px;
            border-bottom: 1px solid var(--gray-100);
            background: #fcfcfc;
        }
        .facility-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: #f8f9fa;
        }

        /* 시설 리스트 아이템 스타일 */
        .facility-item {
            padding: 18px;
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            background: #fff;
            transition: 0.2s;
        }
        .facility-item:hover {
            border-color: var(--navy);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .f-name { font-weight: 800; color: #1a202c; font-size: 17px; margin-bottom: 6px; }
        .f-dist { font-size: 14px; color: var(--navy-light); font-weight: 700; margin-bottom: 4px; }
        .f-info { font-size: 14px; color: var(--gray-600); margin-top: 2px; }

        /* 개선된 거주자 위치 마커 (커스텀 오버레이) - 빨간색에서 남색으로 변경 */
        .resident-label {
            padding: 8px 16px;
            background: var(--navy); /* 서비스 남색 적용 */
            color: white;
            border-radius: 20px;
            font-weight: 800;
            font-size: 14px;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            white-space: nowrap;
        }

        /* 개선된 지도 인포윈도우 디자인 (말풍선) */
        .custom-infowindow {
            padding: 15px;
            background: white;
            border-radius: 12px;
            border: 1px solid var(--gray-200);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative;
            margin-bottom: 15px;
        }
        .custom-infowindow::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: white transparent transparent;
        }
        .custom-infowindow-title {
            font-size: 16px;
            font-weight: 800;
            color: var(--navy);
            margin-bottom: 5px;
        }
        .custom-infowindow-desc {
            font-size: 13px;
            color: var(--gray-600);
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="page-container">
    <div class="category-section">
        <h3>어떤 시설을 찾으세요?</h3>
        <div class="category-container" id="categoryGroup">
            <button class="cat-chip" data-keyword="병원">병원 찾기</button>
            <button class="cat-chip" data-keyword="요양원">요양원 찾기</button>
            <button class="cat-chip" data-keyword="복지관">복지관 찾기</button>
            <button class="cat-chip" data-keyword="치매지원센터">치매지원센터 찾기</button>
        </div>
        <p class="category-hint">* 여러 개를 동시에 선택할 수 있습니다.</p>
    </div>

    <div class="content-section">
        <div class="map-section">
            <div id="map"></div>
        </div>

        <div class="list-section">
            <h4>주변 시설 리스트</h4>
            <div class="facility-scroll" id="facilityList">
                <div id="noSelectionMessage" style="text-align: center; padding: 40px; color: var(--gray-500); font-size: 16px;">
                    위의 카테고리를 선택하여<br>주변 시설을 찾아보세요.
                </div>
            </div>
        </div>
    </div>
</div>


<script th:src="@{/js/dropdown.js}"></script>
<script th:inline="javascript">
    const residentAddr = [[${resident?.address}]] || "서울 강남구 테헤란로 152";
    const residentName = [[${resident?.name}]] || "거주자";

    let map, ps, infowindow;
    let markers = [];
    let selectedKeywords = []; // 초기 선택 없음

    document.addEventListener("DOMContentLoaded", function() {
        const mapContainer = document.getElementById('map');
        map = new kakao.maps.Map(mapContainer, { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 4 });
        ps = new kakao.maps.services.Places();
        // 기본 인포윈도우는 사용하지 않고, CustomOverlay로 대체합니다.

        const geocoder = new kakao.maps.services.Geocoder();
        geocoder.addressSearch(residentAddr, function(result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const coords = new kakao.maps.LatLng(result[0].y, result[0].x);

                const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/mapapidoc/markerStar.png';
                const imageSize = new kakao.maps.Size(24, 35);
                const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

                new kakao.maps.Marker({ map: map, position: coords, image: markerImage });

                new kakao.maps.CustomOverlay({
                    position: coords,
                    content: `<div class="resident-label">🏠 ${residentName}님의 집</div>`,
                    yAnchor: 2.3
                }).setMap(map);

                map.setCenter(coords);
            } else {
                // 이 부분을 추가해 주세요!
                console.error("카카오맵 API 주소 검색 실패. 전달된 주소:", residentAddr);
                alert("거주자의 주소(" + residentAddr + ")를 찾을 수 없습니다. 상세 주소(동/호수)가 있다면 제거해 주세요.");
            }
        });

        // 카테고리 클릭 이벤트 (복수 선택 로직)
        document.querySelectorAll('.cat-chip').forEach(chip => {
            chip.addEventListener('click', function() {
                const keyword = this.dataset.keyword;

                if (this.classList.contains('active')) {
                    // 이미 선택된 경우 해제
                    this.classList.remove('active');
                    selectedKeywords = selectedKeywords.filter(k => k !== keyword);
                } else {
                    // 선택되지 않은 경우 추가
                    this.classList.add('active');
                    selectedKeywords.push(keyword);
                }
                updateSearch();
            });
        });
    });

    // 검색 결과 콜백 함수를 위한 카운터와 결과 배열
    let currentSearchCount = 0;
    let allSearchResults = [];

    // 선택된 모든 키워드로 검색 수행
    function updateSearch() {
        removeMarkers();
        const listEl = document.getElementById('facilityList');
        const messageEl = document.getElementById('noSelectionMessage');

        // 변경된 부분: innerHTML을 비우는 대신, 실제 추가된 검색 결과 카드들만 삭제
        document.querySelectorAll('.facility-item').forEach(item => item.remove());

        if (selectedKeywords.length === 0) {
            messageEl.style.display = 'block';
            return;
        }

        messageEl.style.display = 'none';

        currentSearchCount = 0;
        allSearchResults = [];

        // 각 키워드별로 검색 실행
        selectedKeywords.forEach(keyword => {
            ps.keywordSearch(keyword, placesSearchCB, {
                location: map.getCenter(),
                radius: 2000 // 반경 2km
            });
        });
    }

    // 검색 결과 콜백
    function placesSearchCB(data, status) {
        currentSearchCount++;

        if (status === kakao.maps.services.Status.OK) {
            allSearchResults = allSearchResults.concat(data);
        }

        // 모든 키워드에 대한 검색이 완료되었을 때만 결과를 표시
        if (currentSearchCount === selectedKeywords.length) {
            // 중복된 장소를 제거합니다. (여러 카테고리에 속할 수 있음)
            const uniqueResults = removeDuplicatePlaces(allSearchResults);
            displayPlaces(uniqueResults);
        }
    }

    // 중복 장소 제거 함수
    function removeDuplicatePlaces(places) {
        const uniquePlaces = [];
        const placeIds = new Set();
        for (const place of places) {
            if (!placeIds.has(place.id)) {
                uniquePlaces.push(place);
                placeIds.add(place.id);
            }
        }
        return uniquePlaces;
    }

    // 전역 변수로 현재 열린 커스텀 오버레이 저장
    let currentCustomOverlay = null;

    function displayPlaces(places) {
        const listEl = document.getElementById('facilityList');

        places.forEach((place, i) => {
            const placePosition = new kakao.maps.LatLng(place.y, place.x);
            const marker = new kakao.maps.Marker({ position: placePosition, map: map });
            markers.push(marker);

            // 개선된 디자인의 인포윈도우 콘텐츠
            const iwContent = `
                <div class="custom-infowindow">
                    <div class="custom-infowindow-title">${place.place_name}</div>
                    <div class="custom-infowindow-desc">${place.phone || '전화번호 정보 없음'}</div>
                </div>
            `;

            // 커스텀 오버레이로 인포윈도우 구현
            const customOverlay = new kakao.maps.CustomOverlay({
                position: placePosition,
                content: iwContent,
                yAnchor: 1.2 /* 마커 위에 배치 */
            });

            // 리스트 아이템 생성
            const itemEl = document.createElement('div');
            itemEl.className = 'facility-item';
            itemEl.innerHTML = `
                <div class="f-name">${place.place_name}</div>
                <div class="f-dist">집에서 ${place.distance}m 떨어짐</div>
                <div class="f-info">전화: ${place.phone || '정보 없음'}</div>
                <div class="f-info">주소: ${place.address_name}</div>
            `;

            // 리스트 아이템 클릭 시 이벤트
            itemEl.onclick = () => {
                map.panTo(placePosition);
                // 이전 오버레이 닫기
                if (currentCustomOverlay) currentCustomOverlay.setMap(null);
                customOverlay.setMap(map);
                currentCustomOverlay = customOverlay;
            };

            listEl.appendChild(itemEl);

            // 마커 클릭 시 이벤트
            kakao.maps.event.addListener(marker, 'click', () => {
                // 이전 오버레이 닫기
                if (currentCustomOverlay) currentCustomOverlay.setMap(null);
                customOverlay.setMap(map);
                currentCustomOverlay = customOverlay;
            });
        });
    }

    function removeMarkers() {
        markers.forEach(m => m.setMap(null));
        markers = [];
        // 오버레이도 함께 닫습니다.
        if (currentCustomOverlay) currentCustomOverlay.setMap(null);
        currentCustomOverlay = null;
    }
</script>
</body>
</html>
