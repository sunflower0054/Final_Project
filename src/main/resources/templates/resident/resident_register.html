<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 등록</title>
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="main-container">

    <header class="header-area">
        <a href="/" class="brand-logo">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <circle cx="12" cy="11" r="3"/>
                </svg>
            </div>
            <span class="brand-name">골든노미스</span>
        </a>
        <div class="topbar-right">
            <div class="system-time" id="currentTime"></div>
        </div>
    </header>

    <div class="content-card">
        <div class="risk-score-section">
            <div class="brand-logo">
                <button type="button" class="icon-btn" onclick="history.back()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="15 18 9 12 15 6"/>
                    </svg>
                </button>
                <div>
                    <div class="user-name" style="margin-bottom: 2px;">거주자 등록</div>
                    <div class="user-email">기존 등록 API를 통해 거주자 정보를 입력합니다.</div>
                </div>
            </div>
            <span class="status-badge badge-success">등록</span>
        </div>

        <div class="event-stats-section">
            <div class="content-card control-panel">
                <div class="timeline-title">기본 정보</div>

                <form id="residentRegisterForm" style="display:flex;flex-direction:column;gap:16px;">
                    <div class="summary-cards">
                        <div class="stat-card">
                            <label class="stat-title" for="name">이름</label>
                            <input id="name" name="name" type="text" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;" maxlength="50">
                        </div>
                        <div class="stat-card">
                            <label class="stat-title" for="birthDate">생년월일</label>
                            <input id="birthDate" name="birthDate" type="date" class="btn btn-outline" style="width:100%;text-align:left;">
                        </div>
                    </div>

                    <div class="summary-cards">
                        <div class="stat-card">
                            <label class="stat-title" for="phone">전화번호</label>
                            <input id="phone" name="phone" type="tel" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;" maxlength="20">
                        </div>
                        <div class="stat-card">
                            <label class="stat-title" for="disease">기저질환</label>
                            <input id="disease" name="disease" type="text" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;" maxlength="255">
                        </div>
                    </div>

                    <div class="summary-cards">
                        <div class="stat-card">
                            <label class="stat-title" for="address">주소</label>
                            <input id="address" name="address" type="text" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;" maxlength="255">
                        </div>
                    </div>

                    <div class="summary-cards">
                        <div class="stat-card">
                            <label class="stat-title" for="latitude">위도</label>
                            <input id="latitude" name="latitude" type="number" step="any" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;">
                        </div>
                        <div class="stat-card">
                            <label class="stat-title" for="longitude">경도</label>
                            <input id="longitude" name="longitude" type="number" step="any" class="btn btn-outline" style="width:100%;text-align:left;cursor:text;">
                        </div>
                    </div>

                    <div class="summary-cards" style="justify-content:flex-end;">
                        <button type="button" class="btn btn-outline" onclick="history.back()">취소</button>
                        <button type="submit" class="btn btn-success">등록하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const text =
            now.getFullYear() + '. ' +
            String(now.getMonth() + 1).padStart(2, '0') + '. ' +
            String(now.getDate()).padStart(2, '0') + ' ' +
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0') + ':' +
            String(now.getSeconds()).padStart(2, '0');
        const currentTime = document.getElementById('currentTime');
        if (currentTime) currentTime.innerText = text;
    }

    function getCsrfHeaders() {
        const tokenMeta = document.querySelector('meta[name="_csrf"]');
        const headerMeta = document.querySelector('meta[name="_csrf_header"]');
        if (!tokenMeta || !headerMeta) return {};
        return { [headerMeta.content]: tokenMeta.content };
    }

    async function parseJsonResponse(response) {
        const text = await response.text();
        if (!text) return {};
        try {
            return JSON.parse(text);
        } catch (e) {
            return { message: text };
        }
    }

    function getFormPayload() {
        return {
            name: document.getElementById('name').value.trim(),
            birthDate: document.getElementById('birthDate').value,
            address: document.getElementById('address').value.trim(),
            phone: document.getElementById('phone').value.trim(),
            disease: document.getElementById('disease').value.trim(),
            latitude: document.getElementById('latitude').value === '' ? null : Number(document.getElementById('latitude').value),
            longitude: document.getElementById('longitude').value === '' ? null : Number(document.getElementById('longitude').value)
        };
    }

    function validatePayload(payload) {
        if (!payload.name || !payload.birthDate || !payload.address || payload.latitude === null || payload.longitude === null) {
            alert('이름, 생년월일, 주소, 위도, 경도는 필수입니다.');
            return false;
        }
        if (Number.isNaN(payload.latitude) || Number.isNaN(payload.longitude)) {
            alert('위도와 경도는 숫자로 입력해주세요.');
            return false;
        }
        return true;
    }

    document.getElementById('residentRegisterForm').addEventListener('submit', async function (event) {
        event.preventDefault();

        const payload = getFormPayload();
        if (!validatePayload(payload)) return;

        try {
            const response = await fetch('/api/v1/residents', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    ...getCsrfHeaders()
                },
                credentials: 'same-origin',
                body: JSON.stringify(payload)
            });

            const result = await parseJsonResponse(response);

            if (!response.ok || result.success !== true) {
                alert(result.message || '거주자 등록에 실패했습니다.');
                return;
            }

            alert(result.message || '거주자 정보가 등록되었습니다.');
            location.href = '/resident/detail';
        } catch (e) {
            alert('거주자 등록 요청 중 오류가 발생했습니다.');
        }
    });

    updateClock();
    setInterval(updateClock, 1000);
</script>
</body>
</html>
