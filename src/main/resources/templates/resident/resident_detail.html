<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>관제 시스템 - 거주자 상세</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>
<input type="hidden" id="current-user-resident-id" th:value="${currentUser.residentId}">

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title" id="page-title">거주자 등록</h2>
            <p class="page-subtitle" id="page-subtitle">새로운 거주자 정보를 입력해주세요.</p>
        </div>

        <div class="info-grid" style="grid-template-columns: 280px 1fr; gap: 24px;">

            <!-- 프로필 카드 -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-xl" id="avatar"
                         style="font-size: 48px; background: linear-gradient(135deg, var(--primary-light), var(--primary-mid)); color: var(--primary);">
                        ?
                    </div>
                    <h3 class="profile-name-lg" id="profile-name">신규 등록</h3>
                    <p class="profile-email" id="profile-age-gender" style="margin-top: 4px; font-size: 15px;">정보를 입력해주세요</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="reg-date">-</div>
                        <div class="stat-label">등록일</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="last-fall" style="color:var(--error);">-</div>
                        <div class="stat-label">최근 낙상</div>
                    </div>
                </div>

                <div class="profile-actions" style="padding:20px; display:flex; gap:12px; flex-direction:column;">
                    <button class="btn-profile-detail" id="btn-save" onclick="handlePrimaryAction()">
                        <!-- 기존 아이콘 생략 -->
                        <span id="save-btn-text">등록하기</span>
                    </button>

                    <!-- ▼ 추가된 삭제 버튼 (기본 숨김) ▼ -->
                    <button class="btn-profile-detail" id="btn-delete" style="background:#ff4d4f; color:white; display:none;" onclick="deleteResident()">
                        삭제하기
                    </button>

                    <button class="btn-profile-detail" style="background:var(--secondary); color:var(--text-sub);" onclick="history.back()">
                        취소
                    </button>
                </div>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                    </div>

                    <!-- 생년월일 -->
                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <!-- 전화번호 -->
                    <div class="form-group">
                        <label class="form-label">전화번호</label>
                        <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX" oninput="formatPhone(this)">
                    </div>

                    <!-- 주소 -->
                    <div class="form-group address-group">
                        <label class="form-label">주소 <span style="color:red;">*</span></label>
                        <div id="postcode-wrapper" style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:140px;">
                            <button type="button" id="address-search-btn" onclick="execDaumPostcode()"
                                    style="padding:8px 16px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer;">
                                주소 검색
                            </button>
                        </div>
                        <input type="text" id="address" class="form-control" placeholder="기본 주소 (도로명 또는 지번)" readonly>
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세 주소 (예: 301호, 2층)" style="margin-top: 8px;">
                    </div>

                    <!-- [추가] 기저질환 및 건강 상태 입력 -->
                    <div class="form-group">
                        <label class="form-label">기저질환 및 건강 상태</label>
                        <textarea class="form-control" id="disease" rows="4"
                                  placeholder="고혈압, 당뇨 등 기저질환이나 참고해야 할 건강 상태를 자유롭게 입력해주세요."
                                  style="resize: vertical;"></textarea>
                        <p style="font-size: 12px; color: var(--gray-500); margin-top: 6px;">※ 여러 질환이 있을 경우 줄바꿈(Enter)이나 쉼표(,)로 구분하여 입력해주세요.</p>
                    </div>
                </div>
            </div>
        </div>


    </main>
</div>

<script th:src="@{/js/dropdown.js}"></script>
<script th:src="@{/js/app-api.js}"></script>
<!-- 우편번호 서비스 -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<!-- 카카오맵 API (본인 JavaScript 키 입력, libraries=services 필수) -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>

<script>
    let isEditMode = false;
    let residentId = null;
    let selectedLat = null;
    let selectedLon = null;

    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function getCurrentUserResidentId() {
        const value = document.getElementById('current-user-resident-id')?.value;
        return value && value.trim() ? value.trim() : null;
    }

    function extractResident(payload) {
        return payload?.resident || payload || {};
    }

    function getErrorMessage(error, fallbackMessage) {
        if (error?.message && error.message.trim()) {
            return error.message;
        }

        if (error?.data?.message && error.data.message.trim()) {
            return error.data.message;
        }

        return fallbackMessage;
    }

    function calculateAge(birthDate) {
        if (!birthDate) {
            return null;
        }

        const birth = new Date(birthDate);
        if (Number.isNaN(birth.getTime())) {
            return null;
        }

        const today = new Date();
        let age = today.getFullYear() - birth.getFullYear();
        const birthdayPassed =
            today.getMonth() > birth.getMonth()
            || (today.getMonth() === birth.getMonth() && today.getDate() >= birth.getDate());

        if (!birthdayPassed) {
            age -= 1;
        }

        return age;
    }

    function updateProfileUI(resident) {
        const name = resident.name || '신규 등록';
        const age = calculateAge(resident.birthDate);

        document.getElementById('profile-name').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0) || '?';
        document.getElementById('profile-age-gender').textContent =
            age !== null ? `만 ${age}세` : '정보를 입력해주세요';

        // 등록일 표시 (백엔드 변수명이 createdAt이라고 가정)
        if (resident.createdAt) {
            const dateObj = new Date(resident.createdAt);
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            document.getElementById('reg-date').textContent = `${yyyy}.${mm}.${dd}`;
        } else {
            document.getElementById('reg-date').textContent = '-';
        }

        document.getElementById('last-fall').textContent = '-';
    }

    function syncDiseaseCheckboxes(disease) {
        const selectedDiseases = new Set(
            (disease || '')
                .split(',')
                .map(value => value.trim())
                .filter(Boolean)
        );

        document.querySelectorAll('#underlying-diseases input[type="checkbox"]').forEach((checkbox) => {
            checkbox.checked = selectedDiseases.has(checkbox.value);
        });
    }

function setDetailViewMode(enabled) {
        const isReadOnly = Boolean(enabled);

        document.getElementById('name').readOnly = isReadOnly;
        document.getElementById('phone').readOnly = isReadOnly;
        document.getElementById('detailAddress').readOnly = isReadOnly;
        document.getElementById('disease').readOnly = isReadOnly; // 기저질환 읽기 전용

        document.getElementById('birthYear').disabled = isReadOnly;
        document.getElementById('birthMonth').disabled = isReadOnly;
        document.getElementById('birthDay').disabled = isReadOnly;
        document.getElementById('address-search-btn').disabled = isReadOnly;

        // 읽기 전용(상세 보기)일 때 불필요한 입력칸 숨기기
        const postcodeWrapper = document.getElementById('postcode-wrapper');
        const detailAddressInput = document.getElementById('detailAddress');

        if (isReadOnly) {
            if (postcodeWrapper) postcodeWrapper.style.display = 'none';
            if (detailAddressInput) detailAddressInput.style.display = 'none';
        } else {
            if (postcodeWrapper) postcodeWrapper.style.display = 'flex';
            if (detailAddressInput) detailAddressInput.style.display = 'block';
        }
    }

    function handlePrimaryAction() {
        if (isEditMode) {
            window.location.href = `/resident/edit?id=${residentId}`;
            return;
        }

        saveResident();
    }

    async function deleteResident() {
        if (!isEditMode || !residentId) {
            return;
        }

        if (!window.confirm('정말로 이 거주자 정보를 삭제하시겠습니까?')) {
            return;
        }

        try {
            const result = await AppApi.del(`/api/v1/residents/${residentId}`);
            alert(result?.message || '거주자 정보가 삭제되었습니다.');
            window.location.href = '/resident/detail';
        } catch (error) {
            alert(getErrorMessage(error, '삭제에 실패했습니다.'));
        }
    }

    document.addEventListener('DOMContentLoaded', function() {
        initBirthDateSelects();
        const idParam = getUrlParameter('id');
        const currentUserResidentId = getCurrentUserResidentId();
        const resolvedResidentId = idParam && idParam !== 'new'
            ? idParam
            : currentUserResidentId;

        if (resolvedResidentId) {
            residentId = resolvedResidentId;
            isEditMode = true;
            document.getElementById('page-title').textContent = '거주자 상세 정보';
            document.getElementById('page-subtitle').textContent = '거주자 정보를 확인하고 수정 화면으로 이동할 수 있습니다.';
            document.getElementById('save-btn-text').textContent = '수정하기';
            document.getElementById('btn-delete').style.display = 'block';
            setDetailViewMode(true);
            loadResidentData(residentId);
        } else {
            isEditMode = false;
            document.getElementById('page-title').textContent = '거주자 등록';
            document.getElementById('page-subtitle').textContent = '새로운 거주자 정보를 입력해주세요.';
            document.getElementById('save-btn-text').textContent = '등록하기';
            document.getElementById('btn-delete').style.display = 'none';
            setDetailViewMode(false);
            clearForm();
        }
    });

    // ==================== 생년월일 ====================
    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i + '년';
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '월';
            monthSelect.appendChild(opt);
        }
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '일';
            daySelect.appendChild(opt);
        }

        [yearSelect, monthSelect, daySelect].forEach(s => s.addEventListener('change', updateBirthDateHidden));
    }

    function updateBirthDateHidden() {
        const y = document.getElementById('birthYear').value;
        const m = document.getElementById('birthMonth').value;
        const d = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (y && m && d) ? `${y}-${m}-${d}` : '';
    }

    // ==================== Daum 주소 검색 ====================
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                const addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;

                document.getElementById('postcode').value = data.zonecode;
                document.getElementById('address').value = addr;

                const geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(addr, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        selectedLat = result[0].y;
                        selectedLon = result[0].x;
                    } else {
                        alert('주소 좌표 변환에 실패했습니다. 주소를 다시 검색해주세요.');
                        selectedLat = null;
                        selectedLon = null;
                    }
                });

                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

    async function loadResidentData(id) {
        try {
            const payload = await AppApi.get(`/api/v1/residents/${id}`);
            const resident = extractResident(payload);

            document.getElementById('name').value = resident.name || '';
            document.getElementById('phone').value = resident.phone || '';
            document.getElementById('address').value = resident.address || '';
            document.getElementById('detailAddress').value = '';

            selectedLat = resident.latitude ?? null;
            selectedLon = resident.longitude ?? null;

            if (resident.birthDate) {
                const [y, m, d] = resident.birthDate.split('-');
                document.getElementById('birthYear').value = y || '';
                document.getElementById('birthMonth').value = m || '';
                document.getElementById('birthDay').value = d || '';
                document.getElementById('birthDate').value = resident.birthDate;
            } else {
                document.getElementById('birthYear').value = '';
                document.getElementById('birthMonth').value = '';
                document.getElementById('birthDay').value = '';
                document.getElementById('birthDate').value = '';
            }

            // 기저질환 textarea 값 바인딩
            document.getElementById('disease').value = resident.disease || '';

            updateProfileUI(resident);
        } catch (error) {
            alert(getErrorMessage(error, '거주자 정보를 불러오는 데 실패했습니다.'));
        }
    }

    function clearForm() {
        document.querySelectorAll('input:not([type=hidden]), select, textarea').forEach((element) => {
            if (element.type === 'checkbox') {
                element.checked = false;
                return;
            }

            element.value = '';
        });

        selectedLat = null;
        selectedLon = null;
        updateProfileUI({});
    }

    async function saveResident() {
        if (isEditMode) {
            alert('수정 기능은 2차 작업에서 진행합니다.');
            return;
        }

        updateBirthDateHidden();

        const name = document.getElementById('name').value.trim();
        const birthDate = document.getElementById('birthDate').value;
        const address = document.getElementById('address').value.trim();
        const detailAddress = document.getElementById('detailAddress').value.trim();
        const latitude = Number.parseFloat(selectedLat);
        const longitude = Number.parseFloat(selectedLon);
        // textarea 기저질환 값 가져오기
        const disease = document.getElementById('disease').value.trim();

        if (!name) {
            alert('이름은 필수입니다.');
            return;
        }

        if (!birthDate) {
            alert('생년월일을 선택해주세요.');
            return;
        }

        if (!address) {
            alert('주소를 입력해주세요.');
            return;
        }

        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
            alert('주소 검색을 완료해 좌표를 먼저 확보해주세요.');
            return;
        }

        const payload = {
            name,
            birthDate,
            address: detailAddress ? `${address} ${detailAddress}` : address,
            phone: document.getElementById('phone').value.trim() || null,
            disease: disease || null, // 기저질환 값 저장
            latitude,
            longitude
        };

        const successMessage = '등록이 완료되었습니다.';
        const fallbackMessage = '저장에 실패했습니다.';

        try {
            const result = await AppApi.post('/api/v1/residents', payload);
            const createdResidentId = result?.residentId;

            if (!createdResidentId) {
                throw new Error('등록된 거주자 ID를 확인할 수 없습니다.');
            }

            alert(successMessage);
            window.location.href = `/resident/detail?id=${createdResidentId}`;
        } catch (error) {
            alert(getErrorMessage(error, fallbackMessage));
        }
    }

    // ==================== 전화번호 포맷팅 ====================
    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 3 && v.length <= 7) {
            v = v.slice(0, 3) + '-' + v.slice(3);
        } else if (v.length > 7) {
            v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
        }
        el.value = v;
    }
</script>

</body>
</html>
