<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 상세</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title" id="page-title">거주자 등록</h2>
            <p class="page-subtitle" id="page-subtitle">새로운 거주자 정보를 입력해주세요.</p>
        </div>

        <div class="info-grid" style="grid-template-columns: 280px 1fr; gap: 24px;">

            <!-- 프로필 카드 -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-xl" id="avatar"
                         style="font-size: 48px; background: linear-gradient(135deg, var(--primary-light), var(--primary-mid)); color: var(--primary);">
                        ?
                    </div>
                    <h3 class="profile-name-lg" id="profile-name">신규 등록</h3>
                    <p class="profile-email" id="profile-age-gender" style="margin-top: 4px; font-size: 15px;">정보를 입력해주세요</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="reg-date">-</div>
                        <div class="stat-label">등록일</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="last-fall" style="color:var(--error);">-</div>
                        <div class="stat-label">최근 낙상</div>
                    </div>
                </div>

                <div class="profile-actions" style="padding:20px; display:flex; gap:12px; flex-direction:column;">
                    <button class="btn-profile-detail" id="btn-save" onclick="saveResident()">
                        <!-- 기존 아이콘 생략 -->
                        <span id="save-btn-text">등록하기</span>
                    </button>

                    <!-- ▼ 추가된 삭제 버튼 (기본 숨김) ▼ -->
                    <button class="btn-profile-detail" id="btn-delete" style="background:#ff4d4f; color:white; display:none;" onclick="deleteResident()">
                        삭제하기
                    </button>

                    <button class="btn-profile-detail" style="background:var(--secondary); color:var(--text-sub);" onclick="history.back()">
                        취소
                    </button>
                </div>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                    </div>

                    <!-- 생년월일 -->
                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <!-- 전화번호 -->
                    <div class="form-group">
                        <label class="form-label">전화번호</label>
                        <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX" oninput="formatPhone(this)">
                    </div>

                    <!-- 주소 -->
                    <div class="form-group address-group">
                        <label class="form-label">주소 <span style="color:red;">*</span></label>
                        <div style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:140px;">
                            <button type="button" onclick="execDaumPostcode()"
                                    style="padding:8px 16px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer;">
                                주소 검색
                            </button>
                        </div>
                        <input type="text" id="address" class="form-control" placeholder="기본 주소 (도로명 또는 지번)" readonly>
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세 주소 (예: 301호, 2층)" style="margin-top: 8px;">
                    </div>
                </div>
            </div>
        </div>

        <!-- 건강 정보 카드 -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">건강 정보</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">기저질환</label>
                    <div id="underlying-diseases" class="underlying-diseases" style="display:flex; gap:8px; flex-wrap:wrap; padding:8px 0;">
                        <label class="badge" style="background:#E3F2FD; color:#1976D2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="고혈압"> 고혈압
                        </label>
                        <label class="badge" style="background:#E8F5E9; color:#388E3C; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="당뇨"> 당뇨
                        </label>
                        <label class="badge" style="background:#FFF3E0; color:#F57C00; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="골다공증"> 골다공증
                        </label>
                        <label class="badge" style="background:#F3E5F5; color:#7B1FA2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="관절염"> 관절염
                        </label>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<script th:src="@{/js/dropdown.js}"></script>
<!-- 우편번호 서비스 -->
<script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<!-- 카카오맵 API (본인 JavaScript 키 입력, libraries=services 필수) -->
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>

<script>
    let isEditMode = false;
    let residentId = null;

    // 전역 변수: 위도(latitude)와 경도(longitude) 저장용
    let selectedLat = null;
    let selectedLon = null;

    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

        document.addEventListener('DOMContentLoaded', function() {
            const idParam = getUrlParameter('id');
            initBirthDateSelects();

            if (idParam && idParam !== 'new') {
                residentId = idParam;
                isEditMode = true;
                document.getElementById('page-title').textContent = '거주자 상세 정보';
                document.getElementById('page-subtitle').textContent = '거주자 정보를 확인 및 수정할 수 있습니다.';
                document.getElementById('save-btn-text').textContent = '수정하기';

                // --- 추가: 수정 모드일 때 삭제 버튼 표시 ---
                document.getElementById('btn-delete').style.display = 'block';

                loadResidentData(residentId);
            } else {
                isEditMode = false;
                document.getElementById('page-title').textContent = '거주자 등록';
                document.getElementById('page-subtitle').textContent = '새로운 거주자 정보를 입력해주세요.';
                document.getElementById('save-btn-text').textContent = '등록하기';

                // --- 추가: 등록 모드일 때 삭제 버튼 숨김 ---
                document.getElementById('btn-delete').style.display = 'none';

                clearForm();
            }
        });

    // ==================== 생년월일 ====================
    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i + '년';
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '월';
            monthSelect.appendChild(opt);
        }
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '일';
            daySelect.appendChild(opt);
        }

        [yearSelect, monthSelect, daySelect].forEach(s => s.addEventListener('change', updateBirthDateHidden));
    }

    function updateBirthDateHidden() {
        const y = document.getElementById('birthYear').value;
        const m = document.getElementById('birthMonth').value;
        const d = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (y && m && d) ? `${y}-${m}-${d}` : '';
    }

    // ==================== Daum 주소 검색 ====================
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                let addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;

                document.getElementById('postcode').value = data.zonecode;
                document.getElementById('address').value = addr;

                // 주소를 좌표로 변환하여 전역 변수에 저장
                const geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(addr, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        selectedLat = result[0].y; // 위도
                        selectedLon = result[0].x; // 경도
                        console.log("좌표 획득 성공:", selectedLat, selectedLon);
                    } else {
                        alert("주소 좌표 변환에 실패했습니다. 다시 시도해주세요.");
                        selectedLat = null;
                        selectedLon = null;
                    }
                });

                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

    function loadResidentData(id) {
        fetch(`/api/residents/${id}`)
            .then(res => res.ok ? res.json() : Promise.reject('로드 실패'))
            .then(data => {
                document.getElementById('name').value = data.name || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('address').value = data.address || '';

                // --- 핵심: 기존 위경도를 불러와 전역 변수에 저장 (주소 미변경 시 유지용) ---
                selectedLat = data.latitude || null;
                selectedLon = data.longitude || null;
                // ----------------------------------------------------------------------

                // 존재하지 않는 DOM 요소에 접근 시 에러가 나지 않도록 방어 코드 추가
                if(document.getElementById('gender')) document.getElementById('gender').value = data.gender || '';
                if(document.getElementById('medications')) document.getElementById('medications').value = data.medications || '';
                if(document.getElementById('bloodType')) document.getElementById('bloodType').value = data.bloodType || '';
                if(document.getElementById('notes')) document.getElementById('notes').value = data.notes || '';
                if(document.getElementById('guardianName')) document.getElementById('guardianName').value = data.guardianName || '';
                if(document.getElementById('guardianPhone')) document.getElementById('guardianPhone').value = data.guardianPhone || '';

                if (data.birthDate) {
                    const [y, m, d] = data.birthDate.split('-');
                    document.getElementById('birthYear').value = y || '';
                    document.getElementById('birthMonth').value = m || '';
                    document.getElementById('birthDay').value = d || '';
                    document.getElementById('birthDate').value = data.birthDate;
                }

                updateProfileUI(data);

                if (data.underlyingDiseases) {
                    document.querySelectorAll('#underlying-diseases input[type="checkbox"]').forEach(cb => {
                        cb.checked = data.underlyingDiseases.includes(cb.value);
                    });
                }
            })
            .catch(err => alert('거주자 정보를 불러오는 데 실패했습니다.'));
    }

    function updateProfileUI(data) {
        const name = data.name || '신규 등록';
        document.getElementById('profile-name').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0) || '?';

        const ageGender = data.age ? `만 ${data.age}세 · ${data.gender || '미등록'}` : '정보를 입력해주세요';
        document.getElementById('profile-age-gender').textContent = ageGender;

        document.getElementById('reg-date').textContent = data.regDate || '-';
        document.getElementById('last-fall').textContent = data.lastFallDate || '-';
    }

    function clearForm() {
        document.querySelectorAll('input:not([type=hidden]), select, textarea').forEach(el => {
            if (el.type === 'checkbox') el.checked = false;
            else el.value = '';
        });
        selectedLat = null;
        selectedLon = null;
    }

    function saveResident() {
        updateBirthDateHidden();

        const name = document.getElementById('name').value.trim();
        const address = document.getElementById('address').value;
        const detailAddress = document.getElementById('detailAddress').value.trim();

        if (!name) { alert('이름은 필수입니다.'); return; }
        if (!document.getElementById('birthDate').value) { alert('생년월일을 선택해주세요.'); return; }
        if (!address) { alert('주소를 입력해주세요.'); return; }

        // 위경도 체크 (DB NOT NULL 대응)
        if (!selectedLat || !selectedLon) {
            alert('주소 검색을 통해 정확한 위치 정보(위도, 경도)를 가져와야 합니다.');
            return;
        }

        const diseases = Array.from(
            document.querySelectorAll('#underlying-diseases input[type="checkbox"]:checked')
        ).map(cb => cb.value).join(', ');

        const fullAddress = address + (detailAddress ? " " + detailAddress : "");

        const data = {
            name: name,
            birthDate: document.getElementById('birthDate').value,
            phone: document.getElementById('phone').value || null,
            address: fullAddress,
            disease: diseases || null,
            latitude: parseFloat(selectedLat),
            longitude: parseFloat(selectedLon)
        };

        const url = isEditMode ? `/api/residents/${residentId}` : '/api/residents';
        const method = isEditMode ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(result => {
            alert(isEditMode ? '수정이 완료되었습니다.' : '등록이 완료되었습니다.');

            // 좌표를 포함한 신고 페이지 링크 (테스트/확인용)
            const reportUrl = `/report?address=${encodeURIComponent(data.address)}&name=${encodeURIComponent(data.name)}&lat=${data.latitude}&lon=${data.longitude}`;
            console.log("신고 페이지 링크(좌표포함):", reportUrl);

            if (!isEditMode && result.id) {
                location.href = `/resident/detail?id=${result.id}`;
            } else {
                loadResidentData(residentId);
            }
        })
        .catch(() => alert('저장에 실패했습니다. 다시 시도해주세요.'));
    }

    // ==================== 전화번호 포맷팅 ====================
    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 3 && v.length <= 7) {
            v = v.slice(0, 3) + '-' + v.slice(3);
        } else if (v.length > 7) {
            v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
        }
        el.value = v;
    }

    // ==================== 거주자 삭제 ====================
    function deleteResident() {
        if (!residentId) return;

        // 실수로 삭제하는 것을 방지하기 위해 확인창 띄우기
        if (!confirm('정말로 이 거주자 정보를 삭제하시겠습니까? 삭제 후에는 복구할 수 없습니다.')) {
            return;
        }

        fetch(`/api/residents/${residentId}`, {
            method: 'DELETE',
        })
        .then(res => {
            if (res.ok) {
                alert('삭제가 완료되었습니다.');
                // 삭제 후 목록 페이지로 이동 (본인의 목록 페이지 URL에 맞게 수정하세요)
                location.href = '/resident/list';
            } else {
                return Promise.reject('삭제 실패');
            }
        })
        .catch(err => alert('삭제 중 오류가 발생했습니다. 다시 시도해주세요.'));
    }
</script>

</body>
</html>
