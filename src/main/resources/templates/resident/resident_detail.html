<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 상세</title>
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .hidden { display: none; }

        .birth-row {
            display: grid;
            grid-template-columns: 1fr 0.75fr 0.75fr;
            gap: 8px;
            max-width: 260px;
        }

        .birth-row select {
            font-size: 14.5px !important;
            padding: 7px 8px !important;
            height: 38px !important;
            border-radius: 6px;
        }

        .coordinate-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 16px;
        }

        .form-group label {
            margin-bottom: 6px;
        }

        .form-hint {
            font-size: 13px;
            color: #64748b;
            margin-top: 6px;
            display: block;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title" id="page-title">거주자 등록</h2>
            <p class="page-subtitle" id="page-subtitle">새로운 거주자 정보를 입력해주세요.</p>
        </div>

        <div class="info-grid" style="grid-template-columns: 280px 1fr; gap: 24px;">
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-xl" id="avatar"
                         style="font-size: 48px; background: linear-gradient(135deg, #FFEBEE, #FFCDD2); color: #E53935;">
                        ?
                    </div>
                    <h3 class="profile-name-lg" id="profile-name">신규 등록</h3>
                    <p class="profile-email" id="profile-summary" style="margin-top: 4px; font-size: 15px;">정보를 입력해주세요</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="reg-date">-</div>
                        <div class="stat-label">등록일</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="coord-status" style="color:#1E3A5F;">-</div>
                        <div class="stat-label">좌표 상태</div>
                    </div>
                </div>

                <div class="profile-actions" style="padding:20px; display:flex; gap:12px; flex-direction:column;">
                    <button class="btn-profile-detail" id="btn-save" onclick="saveResident()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 9 9 17 5 13"/>
                        </svg>
                        <span id="save-btn-text">등록하기</span>
                    </button>
                    <button class="btn-profile-detail" style="background:#757575; color:white;" onclick="history.back()">
                        취소
                    </button>
                </div>
            </div>

            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                    </div>

                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <div class="form-group">
                        <label class="form-label">전화번호</label>
                        <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX" oninput="formatPhone(this)">
                    </div>

                    <div class="form-group address-group">
                        <label class="form-label">주소 <span style="color:red;">*</span></label>
                        <div style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:140px;">
                            <button type="button" onclick="execDaumPostcode()"
                                    style="padding:8px 16px; background:#1e3a5f; color:white; border:none; border-radius:6px; cursor:pointer; white-space:nowrap;">
                                주소 검색
                            </button>
                        </div>
                        <input type="text" id="address" class="form-control" placeholder="기본 주소 (도로명 또는 지번)">
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세 주소 (예: 301호, 2층)" style="margin-top: 8px;">
                        <span class="form-hint">기본 주소와 상세 주소를 입력한 뒤 좌표를 확인해주세요.</span>
                    </div>

                    <div class="coordinate-row">
                        <div class="form-group">
                            <label class="form-label">위도 <span style="color:red;">*</span></label>
                            <input type="number" step="any" class="form-control" id="latitude" placeholder="예: 37.5665">
                        </div>
                        <div class="form-group">
                            <label class="form-label">경도 <span style="color:red;">*</span></label>
                            <input type="number" step="any" class="form-control" id="longitude" placeholder="예: 126.9780">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">건강 정보</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">기저질환</label>
                    <div id="underlying-diseases" class="underlying-diseases" style="display:flex; gap:8px; flex-wrap:wrap; padding:8px 0;">
                        <label class="badge" style="background:#E3F2FD; color:#1976D2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="고혈압" style="margin-right:6px;"> 고혈압
                        </label>
                        <label class="badge" style="background:#E8F5E9; color:#388E3C; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="당뇨" style="margin-right:6px;"> 당뇨
                        </label>
                        <label class="badge" style="background:#FFF3E0; color:#F57C00; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="골다공증" style="margin-right:6px;"> 골다공증
                        </label>
                        <label class="badge" style="background:#F3E5F5; color:#7B1FA2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="관절염" style="margin-right:6px;"> 관절염
                        </label>
                    </div>
                    <input type="hidden" id="disease" value="">
                    <span class="form-hint">선택한 항목은 저장 시 기저질환 문자열로 합쳐집니다.</span>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/app-api.js}"></script>
<script th:src="@{/js/dropdown.js}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>
<script>
    let isEditMode = false;
    let residentId = null;

    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    document.addEventListener('DOMContentLoaded', async function() {
        initBirthDateSelects();
        bindAddressEvents();
        bindDiseaseEvents();

        const idParam = getUrlParameter('id');
        if (idParam && idParam !== 'new') {
            residentId = idParam;
            setEditMode();
            await loadResidentData(residentId);
            return;
        }

        if (idParam === 'new') {
            setCreateMode();
            clearForm();
            return;
        }

        await loadDefaultResident();
    });

    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            const option = document.createElement('option');
            option.value = String(i);
            option.textContent = i + '년';
            yearSelect.appendChild(option);
        }

        for (let i = 1; i <= 12; i++) {
            const value = String(i).padStart(2, '0');
            const option = document.createElement('option');
            option.value = value;
            option.textContent = i + '월';
            monthSelect.appendChild(option);
        }

        for (let i = 1; i <= 31; i++) {
            const value = String(i).padStart(2, '0');
            const option = document.createElement('option');
            option.value = value;
            option.textContent = i + '일';
            daySelect.appendChild(option);
        }

        [yearSelect, monthSelect, daySelect].forEach(select => {
            select.addEventListener('change', updateBirthDateHidden);
        });
    }

    function bindAddressEvents() {
        const addressInput = document.getElementById('address');
        const detailAddressInput = document.getElementById('detailAddress');

        [addressInput, detailAddressInput].forEach(input => {
            input.addEventListener('input', clearCoordinates);
            input.addEventListener('blur', async function() {
                const fullAddress = buildFullAddress();
                if (fullAddress && (!document.getElementById('latitude').value || !document.getElementById('longitude').value)) {
                    await resolveCoordinates(fullAddress);
                }
            });
        });
    }

    function bindDiseaseEvents() {
        document.querySelectorAll('#underlying-diseases input[type="checkbox"]').forEach(checkbox => {
            checkbox.addEventListener('change', syncDiseaseInputFromCheckboxes);
        });
    }

    function updateBirthDateHidden() {
        const year = document.getElementById('birthYear').value;
        const month = document.getElementById('birthMonth').value;
        const day = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (year && month && day) ? `${year}-${month}-${day}` : '';
    }

    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: async function(data) {
                const address = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                document.getElementById('postcode').value = data.zonecode || '';
                document.getElementById('address').value = address;
                await resolveCoordinates(buildFullAddress());
                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

    function setCreateMode() {
        isEditMode = false;
        residentId = null;
        document.getElementById('page-title').textContent = '거주자 등록';
        document.getElementById('page-subtitle').textContent = '새로운 거주자 정보를 입력해주세요.';
        document.getElementById('save-btn-text').textContent = '등록하기';
    }

    function setEditMode() {
        isEditMode = true;
        document.getElementById('page-title').textContent = '거주자 상세 정보';
        document.getElementById('page-subtitle').textContent = '거주자 정보를 확인 및 수정할 수 있습니다.';
        document.getElementById('save-btn-text').textContent = '수정하기';
    }

    async function loadDefaultResident() {
        try {
            const result = await AppApi.get('/api/v1/residents');

            if (result.success !== true || !Array.isArray(result.residents) || result.residents.length === 0) {
                setCreateMode();
                clearForm();
                return;
            }

            const resident = result.residents[0];
            residentId = resident.id;
            setEditMode();
            fillResidentForm(resident);
        } catch (error) {
            setCreateMode();
            clearForm();
        }
    }

    async function loadResidentData(id) {
        try {
            const result = await AppApi.get(`/api/v1/residents/${id}`);

            if (result.success !== true || !result.resident) {
                throw new Error(result.message || '로드 실패');
            }

            fillResidentForm(result.resident);
        } catch (error) {
            alert(error.message || '거주자 정보를 불러오는 데 실패했습니다.');
        }
    }

    function fillResidentForm(data) {
        document.getElementById('name').value = data.name || '';
        document.getElementById('phone').value = data.phone || '';
        document.getElementById('address').value = data.address || '';
        document.getElementById('detailAddress').value = '';
        document.getElementById('postcode').value = '';
        document.getElementById('latitude').value = data.latitude ?? '';
        document.getElementById('longitude').value = data.longitude ?? '';
        setDiseaseCheckboxes(data.disease || '');

        if (data.birthDate) {
            const parts = data.birthDate.split('-');
            document.getElementById('birthYear').value = parts[0] || '';
            document.getElementById('birthMonth').value = parts[1] || '';
            document.getElementById('birthDay').value = parts[2] || '';
            document.getElementById('birthDate').value = data.birthDate;
        } else {
            document.getElementById('birthYear').value = '';
            document.getElementById('birthMonth').value = '';
            document.getElementById('birthDay').value = '';
            document.getElementById('birthDate').value = '';
        }

        updateProfileUI(data);
    }

    function updateProfileUI(data) {
        const name = data.name || '신규 등록';
        document.getElementById('profile-name').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0) || '?';

        const summaryParts = [];
        const age = calculateAge(data.birthDate);
        if (age !== null) {
            summaryParts.push(`만 ${age}세`);
        }
        if (data.phone) {
            summaryParts.push(data.phone);
        }
        document.getElementById('profile-summary').textContent = summaryParts.length > 0 ? summaryParts.join(' · ') : '정보를 입력해주세요';

        document.getElementById('reg-date').textContent = '-';
        document.getElementById('coord-status').textContent = hasCoordinates(data) ? '입력됨' : '미입력';
    }

    function calculateAge(birthDate) {
        if (!birthDate) {
            return null;
        }

        const today = new Date();
        const birth = new Date(birthDate);
        if (Number.isNaN(birth.getTime())) {
            return null;
        }

        let age = today.getFullYear() - birth.getFullYear();
        const monthDiff = today.getMonth() - birth.getMonth();
        if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
            age--;
        }
        return age >= 0 ? age : null;
    }

    function hasCoordinates(data) {
        return data.latitude !== null && data.latitude !== undefined && data.latitude !== '' &&
            data.longitude !== null && data.longitude !== undefined && data.longitude !== '';
    }

    function clearForm() {
        document.querySelectorAll('input:not([type=hidden]), select, textarea').forEach(element => {
            if (element.type === 'checkbox') {
                element.checked = false;
            } else {
                element.value = '';
            }
        });
        document.getElementById('birthDate').value = '';
        document.getElementById('disease').value = '';
        updateProfileUI({});
    }

    function clearCoordinates() {
        document.getElementById('latitude').value = '';
        document.getElementById('longitude').value = '';
        document.getElementById('coord-status').textContent = '미입력';
    }

    function buildFullAddress() {
        const baseAddress = document.getElementById('address').value.trim();
        const detailAddress = document.getElementById('detailAddress').value.trim();
        return [baseAddress, detailAddress].filter(Boolean).join(' ');
    }

    function getCoordinateValue(id) {
        const value = document.getElementById(id).value.trim();
        if (!value) {
            return null;
        }

        const number = Number(value);
        return Number.isNaN(number) ? Number.NaN : number;
    }

    function getSelectedDiseases() {
        return Array.from(document.querySelectorAll('#underlying-diseases input[type="checkbox"]:checked'))
            .map(checkbox => checkbox.value);
    }

    function syncDiseaseInputFromCheckboxes() {
        document.getElementById('disease').value = getSelectedDiseases().join(', ');
    }

    function setDiseaseCheckboxes(diseaseText) {
        const selected = String(diseaseText || '')
            .split(',')
            .map(value => value.trim())
            .filter(Boolean);

        document.querySelectorAll('#underlying-diseases input[type="checkbox"]').forEach(checkbox => {
            checkbox.checked = selected.includes(checkbox.value);
        });
        document.getElementById('disease').value = selected.join(', ');
    }

    function getPayload() {
        syncDiseaseInputFromCheckboxes();
        return {
            name: document.getElementById('name').value.trim(),
            birthDate: document.getElementById('birthDate').value,
            address: buildFullAddress(),
            phone: document.getElementById('phone').value.trim() || null,
            disease: document.getElementById('disease').value.trim() || null,
            latitude: getCoordinateValue('latitude'),
            longitude: getCoordinateValue('longitude')
        };
    }

    function validatePayload(payload) {
        if (!payload.name) {
            alert('이름은 필수입니다.');
            document.getElementById('name').focus();
            return false;
        }

        if (!payload.birthDate) {
            alert('생년월일을 선택해주세요.');
            document.getElementById('birthYear').focus();
            return false;
        }

        if (!payload.address) {
            alert('주소는 필수입니다.');
            document.getElementById('address').focus();
            return false;
        }

        if (payload.latitude === null || payload.longitude === null) {
            alert('위도와 경도는 필수입니다.');
            if (payload.latitude === null) {
                document.getElementById('latitude').focus();
            } else {
                document.getElementById('longitude').focus();
            }
            return false;
        }

        if (Number.isNaN(payload.latitude) || Number.isNaN(payload.longitude)) {
            alert('위도와 경도는 숫자로 입력해주세요.');
            return false;
        }

        return true;
    }

    function geocodeAddress(address) {
        return new Promise(resolve => {
            if (!address) {
                resolve(null);
                return;
            }

            const runGeocode = function() {
                const geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(address, function(result, status) {
                    if (status === kakao.maps.services.Status.OK && result.length > 0) {
                        resolve({
                            latitude: Number(result[0].y),
                            longitude: Number(result[0].x)
                        });
                        return;
                    }
                    resolve(null);
                });
            };

            if (window.kakao && kakao.maps && kakao.maps.services) {
                runGeocode();
                return;
            }

            if (window.kakao && kakao.maps && typeof kakao.maps.load === 'function') {
                kakao.maps.load(runGeocode);
                return;
            }

            resolve(null);
        });
    }

    async function resolveCoordinates(address) {
        const coordinates = await geocodeAddress(address);
        if (!coordinates) {
            document.getElementById('coord-status').textContent = '직접 입력 필요';
            return;
        }

        document.getElementById('latitude').value = coordinates.latitude;
        document.getElementById('longitude').value = coordinates.longitude;
        document.getElementById('coord-status').textContent = '입력됨';
    }

    async function saveResident() {
        updateBirthDateHidden();

        const fullAddress = buildFullAddress();
        if (fullAddress && (!document.getElementById('latitude').value || !document.getElementById('longitude').value)) {
            await resolveCoordinates(fullAddress);
        }

        const payload = getPayload();
        if (!validatePayload(payload)) {
            return;
        }

        const url = isEditMode ? `/api/v1/residents/${residentId}` : '/api/v1/residents';
        const method = isEditMode ? 'PUT' : 'POST';

        try {
            const result = method === 'PUT'
                ? await AppApi.put(url, payload)
                : await AppApi.post(url, payload);

            if (result.success !== true) {
                throw new Error(result.message || '저장에 실패했습니다.');
            }

            alert(result.message || (isEditMode ? '수정이 완료되었습니다.' : '등록이 완료되었습니다.'));

            if (!isEditMode && result.residentId) {
                location.href = `/resident/detail?id=${result.residentId}`;
                return;
            }

            await loadResidentData(residentId);
        } catch (error) {
            alert(error.message || '저장에 실패했습니다. 다시 시도해주세요.');
        }
    }

    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 3 && v.length <= 7) {
            v = v.slice(0, 3) + '-' + v.slice(3);
        } else if (v.length > 7) {
            v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
        }
        el.value = v;
    }
</script>
</body>
</html>
