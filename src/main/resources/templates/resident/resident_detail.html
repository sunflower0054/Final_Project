<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 상세</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title">거주자 상세 정보</h2>
            <p class="page-subtitle">김영희 거주자님의 기본 정보 및 건강 상태를 확인합니다.</p>
        </div>

        <div class="info-grid" style="grid-template-columns: 280px 1fr; gap: 24px;">

            <!-- 프로필 카드 (myinfo 스타일) -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-xl" style="font-size: 48px; background: linear-gradient(135deg, #FFEBEE, #FFCDD2); color: #E53935;">
                        김
                    </div>
                    <h3 class="profile-name-lg">김영희</h3>
                    <p class="profile-email" style="margin-top: 4px; font-size: 15px;">만 76세 · 여성</p>
                    <span class="badge badge-red" style="margin-top: 12px; background:#FFEBEE; color:#E53935; padding:6px 14px; font-size:13px;">
                        위험
                    </span>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value">2024-01-15</div>
                        <div class="stat-label">등록일</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" style="color:#E53935;">2024-04-27</div>
                        <div class="stat-label">최근 낙상</div>
                    </div>
                </div>

                <div class="profile-actions" style="padding:20px;">
                    <button class="btn-profile-detail" onclick="location.href='/resident/edit'">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                        </svg>
                        정보 수정하기
                    </button>
                </div>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름</label>
                        <input type="text" class="form-control" value="김영희" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">생년월일</label>
                        <input type="text" class="form-control" value="1948년 3월 12일 (만 76세)" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">전화번호</label>
                        <input type="tel" class="form-control" value="010-9876-5432" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">성별</label>
                        <input type="text" class="form-control" value="여성" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">주소</label>
                        <input type="text" class="form-control" value="서울시 강남구 역삼동 123-45, 2층" readonly>
                    </div>
                </div>
            </div>

        </div>

        <!-- 건강 / 기저질환 정보 -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">건강 / 기저질환 정보</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">기저질환</label>
                    <div style="display:flex; gap:8px; flex-wrap:wrap; padding:8px 0;">
                        <span class="badge" style="background:#E3F2FD; color:#1976D2; padding:6px 12px;">고혈압</span>
                        <span class="badge" style="background:#E8F5E9; color:#388E3C; padding:6px 12px;">당뇨</span>
                        <span class="badge" style="background:#FFF3E0; color:#F57C00; padding:6px 12px;">골다공증</span>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">복용 약물</label>
                    <input type="text" class="form-control" value="혈압약, 인슐린" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">혈액형</label>
                    <input type="text" class="form-control" value="A형" readonly>
                </div>
                <div class="form-group">
                    <label class="form-label">특이사항</label>
                    <textarea class="form-control" readonly style="height:80px; resize:none;">낙상 이력 있음. 야간 이동 시 주의 필요.</textarea>
                </div>
            </div>
        </div>

        <!-- 비상 연락처 -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">비상 연락처</h3>
            </div>
            <div class="card-body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
                    <div class="form-group">
                        <label class="form-label">보호자 이름</label>
                        <input type="text" class="form-control" value="김민수 (아들)" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">보호자 연락처</label>
                        <input type="tel" class="form-control" value="010-1234-9999" readonly>
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<script th:src="@{/js/dropdown.js}"></script>

</body>
</html>
