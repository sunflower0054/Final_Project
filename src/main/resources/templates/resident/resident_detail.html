<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 상세</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        .hidden { display: none; }
        .badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            margin-right: 6px;
            margin-bottom: 6px;
        }

        /* 생년월일 선택박스 컴팩트 */
        .birth-row {
            display: grid;
            grid-template-columns: 1fr 0.75fr 0.75fr;
            gap: 8px;
            max-width: 260px;
        }

        .birth-row select {
            font-size: 14.5px !important;
            padding: 7px 8px !important;
            height: 38px !important;
            border-radius: 6px;
        }

        /* 성별 + 전화번호 한 줄 배치 */
        .two-column {
            display: grid;
            grid-template-columns: 1fr 1.6fr;
            gap: 20px;
        }

        /* 라벨 간격 */
        .form-group label {
            margin-bottom: 6px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title" id="page-title">거주자 등록</h2>
            <p class="page-subtitle" id="page-subtitle">새로운 거주자 정보를 입력해주세요.</p>
        </div>

        <div class="info-grid" style="grid-template-columns: 280px 1fr; gap: 24px;">

            <!-- 프로필 카드 -->
            <div class="profile-card">
                <div class="profile-header">
                    <div class="profile-avatar-xl" id="avatar"
                         style="font-size: 48px; background: linear-gradient(135deg, #FFEBEE, #FFCDD2); color: #E53935;">
                        ?
                    </div>
                    <h3 class="profile-name-lg" id="profile-name">신규 등록</h3>
                    <p class="profile-email" id="profile-age-gender" style="margin-top: 4px; font-size: 15px;">정보를 입력해주세요</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-item">
                        <div class="stat-value" id="reg-date">-</div>
                        <div class="stat-label">등록일</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="last-fall" style="color:#E53935;">-</div>
                        <div class="stat-label">최근 낙상</div>
                    </div>
                </div>

                <div class="profile-actions" style="padding:20px; display:flex; gap:12px; flex-direction:column;">
                    <button class="btn-profile-detail" id="btn-save" onclick="saveResident()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                            <polyline points="17 9 9 17 5 13"/>
                        </svg>
                        <span id="save-btn-text">등록하기</span>
                    </button>
                    <button class="btn-profile-detail" style="background:#757575; color:white;" onclick="history.back()">
                        취소
                    </button>
                </div>
            </div>

            <!-- 기본 정보 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:red;">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                    </div>

                    <!-- 생년월일 -->
                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <!-- 성별 + 전화번호 한 줄 배치 -->
                    <div class="two-column">
                        <div class="form-group">
                            <label class="form-label">성별</label>
                            <select class="form-control" id="gender">
                                <option value="">선택하세요</option>
                                <option value="남성">남성</option>
                                <option value="여성">여성</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">전화번호</label>
                            <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX">
                        </div>
                    </div>

                    <!-- 주소 (Daum Postcode 적용) -->
                    <div class="form-group">
                        <label class="form-label">주소</label>
                        <div style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:140px;">
                            <button type="button" onclick="execDaumPostcode()"
                                    style="padding:8px 16px; background:#1e3a5f; color:white; border:none; border-radius:6px; cursor:pointer; white-space:nowrap;">
                                주소 검색
                            </button>
                        </div>
                        <input type="text" id="address" class="form-control" placeholder="기본 주소" readonly style="margin-bottom:8px;">
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세 주소 (예: 2층, 301호)">
                    </div>

                </div>
            </div>
        </div>

        <!-- 건강 / 기저질환 정보 -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">건강 / 기저질환 정보</h3>
            </div>
            <div class="card-body">
                <div class="form-group">
                    <label class="form-label">기저질환</label>
                    <div id="underlying-diseases" style="display:flex; gap:8px; flex-wrap:wrap; padding:8px 0;">
                        <label class="badge" style="background:#E3F2FD; color:#1976D2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="고혈압" style="margin-right:6px;"> 고혈압
                        </label>
                        <label class="badge" style="background:#E8F5E9; color:#388E3C; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="당뇨" style="margin-right:6px;"> 당뇨
                        </label>
                        <label class="badge" style="background:#FFF3E0; color:#F57C00; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="골다공증" style="margin-right:6px;"> 골다공증
                        </label>
                        <label class="badge" style="background:#F3E5F5; color:#7B1FA2; padding:8px 14px; cursor:pointer;">
                            <input type="checkbox" value="관절염" style="margin-right:6px;"> 관절염
                        </label>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">복용 약물</label>
                    <input type="text" class="form-control" id="medications" placeholder="복용 중인 약물을 입력하세요">
                </div>
                <div class="form-group">
                    <label class="form-label">혈액형</label>
                    <select class="form-control" id="bloodType">
                        <option value="">선택하세요</option>
                        <option value="A형">A형</option>
                        <option value="B형">B형</option>
                        <option value="AB형">AB형</option>
                        <option value="O형">O형</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">특이사항</label>
                    <textarea class="form-control" id="notes" rows="4" placeholder="특이사항을 입력하세요"></textarea>
                </div>
            </div>
        </div>

        <!-- 비상 연락처 -->
        <div class="content-card" style="margin-top: 24px;">
            <div class="card-header">
                <h3 class="card-title">비상 연락처</h3>
            </div>
            <div class="card-body">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:24px;">
                    <div class="form-group">
                        <label class="form-label">보호자 이름</label>
                        <input type="text" class="form-control" id="guardianName" placeholder="보호자 이름">
                    </div>
                    <div class="form-group">
                        <label class="form-label">보호자 연락처</label>
                        <input type="tel" class="form-control" id="guardianPhone" placeholder="010-XXXX-XXXX">
                    </div>
                </div>
            </div>
        </div>

    </main>
</div>

<script th:src="@{/js/dropdown.js}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script>
    let isEditMode = false;
    let residentId = null;

    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    document.addEventListener('DOMContentLoaded', function() {
        const idParam = getUrlParameter('id');
        initBirthDateSelects();

        if (idParam && idParam !== 'new') {
            residentId = idParam;
            isEditMode = true;
            document.getElementById('page-title').textContent = '거주자 상세 정보';
            document.getElementById('page-subtitle').textContent = '거주자 정보를 확인 및 수정할 수 있습니다.';
            document.getElementById('save-btn-text').textContent = '수정하기';
            loadResidentData(residentId);
        } else {
            isEditMode = false;
            document.getElementById('page-title').textContent = '거주자 등록';
            document.getElementById('page-subtitle').textContent = '새로운 거주자 정보를 입력해주세요.';
            document.getElementById('save-btn-text').textContent = '등록하기';
            clearForm();
        }
    });

// ==================== 생년월일 ====================
    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i + '년';
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '월';
            monthSelect.appendChild(opt);
        }
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '일';
            daySelect.appendChild(opt);
        }

        [yearSelect, monthSelect, daySelect].forEach(s => s.addEventListener('change', updateBirthDateHidden));
    }

    function updateBirthDateHidden() {
        const y = document.getElementById('birthYear').value;
        const m = document.getElementById('birthMonth').value;
        const d = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (y && m && d) ? `${y}-${m}-${d}` : '';
    }

    // ==================== Daum 주소 검색 ====================
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                let addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;

                document.getElementById('postcode').value = data.zonecode;
                document.getElementById('address').value = addr;
                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

    function loadResidentData(id) {
        fetch(`/api/residents/${id}`)
            .then(res => res.ok ? res.json() : Promise.reject('로드 실패'))
            .then(data => {
                document.getElementById('name').value = data.name || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('gender').value = data.gender || '';
                document.getElementById('address').value = data.address || '';
                document.getElementById('medications').value = data.medications || '';
                document.getElementById('bloodType').value = data.bloodType || '';
                document.getElementById('notes').value = data.notes || '';
                document.getElementById('guardianName').value = data.guardianName || '';
                document.getElementById('guardianPhone').value = data.guardianPhone || '';

                if (data.birthDate) {
                    const [y, m, d] = data.birthDate.split('-');
                    document.getElementById('birthYear').value = y || '';
                    document.getElementById('birthMonth').value = m || '';
                    document.getElementById('birthDay').value = d || '';
                    document.getElementById('birthDate').value = data.birthDate;
                }

                updateProfileUI(data);

                if (data.underlyingDiseases) {
                    document.querySelectorAll('#underlying-diseases input[type="checkbox"]').forEach(cb => {
                        cb.checked = data.underlyingDiseases.includes(cb.value);
                    });
                }
            })
            .catch(err => alert('거주자 정보를 불러오는 데 실패했습니다.'));
    }

    function updateProfileUI(data) {
        const name = data.name || '신규 등록';
        document.getElementById('profile-name').textContent = name;
        document.getElementById('avatar').textContent = name.charAt(0) || '?';

        const ageGender = data.age ? `만 ${data.age}세 · ${data.gender || '미등록'}` : '정보를 입력해주세요';
        document.getElementById('profile-age-gender').textContent = ageGender;

        document.getElementById('reg-date').textContent = data.regDate || '-';
        document.getElementById('last-fall').textContent = data.lastFallDate || '-';
    }

    function clearForm() {
        document.querySelectorAll('input:not([type=hidden]), select, textarea').forEach(el => {
            if (el.type === 'checkbox') el.checked = false;
            else el.value = '';
        });
    }

    function saveResident() {
        updateBirthDateHidden();

        const name = document.getElementById('name').value.trim();
        if (!name) {
            alert('이름은 필수입니다.');
            document.getElementById('name').focus();
            return;
        }
        if (!document.getElementById('birthDate').value) {
            alert('생년월일을 선택해주세요.');
            document.getElementById('birthYear').focus();
            return;
        }

        const underlyingDiseases = Array.from(
            document.querySelectorAll('#underlying-diseases input[type="checkbox"]:checked')
        ).map(cb => cb.value);

        const data = {
            name: name,
            birthDate: document.getElementById('birthDate').value,
            phone: document.getElementById('phone').value || null,
            gender: document.getElementById('gender').value || null,
            address: document.getElementById('address').value || null,
            underlyingDiseases: underlyingDiseases,
            medications: document.getElementById('medications').value || null,
            bloodType: document.getElementById('bloodType').value || null,
            notes: document.getElementById('notes').value || null,
            guardianName: document.getElementById('guardianName').value || null,
            guardianPhone: document.getElementById('guardianPhone').value || null
        };

        const url = isEditMode ? `/api/residents/${residentId}` : '/api/residents';
        const method = isEditMode ? 'PUT' : 'POST';

        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(result => {
            alert(isEditMode ? '수정이 완료되었습니다.' : '등록이 완료되었습니다.');

            // 등록/수정이 완료된 시점에 입력된 주소와 이름을 report.html로 전달
            const reportUrl = `/report?address=${encodeURIComponent(data.address)}&name=${encodeURIComponent(data.name)}`;

            // 지금 바로 이동할 게 아니라면, 나중에 신고가 발생했을 때
            // 저 주소(reportUrl)를 호출하게 만들면 됩니다.
            console.log("신고 페이지 링크:", reportUrl);

            if (!isEditMode && result.id) {
                location.href = `/resident/detail?id=${result.id}`;
            } else {
                loadResidentData(residentId);
            }
        })
        .catch(() => alert('저장에 실패했습니다. 다시 시도해주세요.'));
    }
</script>

</body>
</html>
