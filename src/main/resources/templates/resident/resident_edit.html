<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">

    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="logo-text">관제 시스템</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/index/index" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                대시보드
            </a>
            <a href="/camera/camera" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                카메라 관리
            </a>
            <a href="/events/events_timeline" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                이벤트 타임라인
            </a>
            <div class="nav-divider"></div>
            <div class="nav-section-label">관리</div>
            <a href="/resident/detail" class="nav-item active">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                거주자 정보
            </a>
            <a href="/setting/setting" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                설정
            </a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn" onclick="history.back()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                </button>
                <h1 class="page-title">거주자 정보 수정</h1>
            </div>
            <div class="topbar-right">
                <button class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <div class="profile-dropdown-wrap">
                    <button class="icon-btn avatar-btn" id="profileBtn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    </button>
                    <div class="profile-dropdown" id="profileDropdown">
                        <div class="profile-dropdown-header">
                            <div class="profile-avatar-lg">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                            <div>
                                <div class="profile-name">홍길동</div>
                                <div class="profile-role">관리자 · 스마트 관제 센터</div>
                            </div>
                        </div>
                        <div class="profile-dropdown-footer">
                            <a href="/myinfo/myinfo" class="btn-profile-detail">내 정보 상세보기</a>
                            <button class="btn-profile-logout">로그아웃</button>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 안내 배너 -->
        <div style="background:#FFF3E0;border-bottom:1px solid #FFE0B2;padding:10px 20px;display:flex;align-items:center;gap:8px;font-size:12px;color:#F57C00">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            기존 정보를 불러왔습니다. 변경할 항목만 수정 후 저장해주세요.
        </div>

        <div style="flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px">

            <!-- 기본 정보 폼 -->
            <div class="edit-form-card">
                <div class="edit-form-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    기본 정보
                </div>
                <div class="edit-form-body">
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">이름 <span style="color:var(--red)">*</span></label>
                            <input type="text" class="form-input" value="김영희">
                        </div>
                        <div class="form-field">
                            <label class="form-label">성별</label>
                            <select class="form-input" style="cursor:pointer">
                                <option selected>여성</option>
                                <option>남성</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">생년월일 <span style="color:var(--red)">*</span></label>
                            <input type="date" class="form-input" value="1948-03-12">
                        </div>
                        <div class="form-field">
                            <label class="form-label">전화번호 <span style="color:var(--red)">*</span></label>
                            <input type="tel" class="form-input" value="010-9876-5432">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field full">
                            <label class="form-label">주소 <span style="color:var(--red)">*</span></label>
                            <input type="text" class="form-input" value="서울시 강남구 역삼동 123-45, 2층">
                            <span class="form-hint">상세 주소까지 입력해주세요</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 건강 정보 폼 -->
            <div class="edit-form-card">
                <div class="edit-form-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    건강 / 기저질환 정보
                </div>
                <div class="edit-form-body">
                    <div class="form-row">
                        <div class="form-field full">
                            <label class="form-label">기저질환</label>
                            <input type="text" class="form-input" value="고혈압, 당뇨, 골다공증">
                            <span class="form-hint">쉼표(,)로 구분하여 입력 · 예: 고혈압, 당뇨</span>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">복용 약물</label>
                            <input type="text" class="form-input" value="혈압약, 인슐린">
                        </div>
                        <div class="form-field">
                            <label class="form-label">혈액형</label>
                            <select class="form-input" style="cursor:pointer">
                                <option>A형</option>
                                <option>B형</option>
                                <option>O형</option>
                                <option>AB형</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field full">
                            <label class="form-label">특이사항</label>
                            <textarea class="form-textarea">낙상 이력 있음. 야간 이동 시 주의 필요.</textarea>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 비상 연락처 폼 -->
            <div class="edit-form-card">
                <div class="edit-form-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.39 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    비상 연락처
                </div>
                <div class="edit-form-body">
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">보호자 이름</label>
                            <input type="text" class="form-input" value="김민수">
                        </div>
                        <div class="form-field">
                            <label class="form-label">관계</label>
                            <input type="text" class="form-input" value="아들">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-field">
                            <label class="form-label">보호자 연락처</label>
                            <input type="tel" class="form-input" value="010-1234-9999">
                        </div>
                        <div class="form-field">
                            <!-- empty -->
                        </div>
                    </div>
                </div>
                <div class="edit-form-footer">
                    <button class="btn-secondary" style="font-size:12px;padding:9px 20px" onclick="history.back()">취소</button>
                    <button class="btn-primary" style="font-size:12px;padding:9px 24px;border-radius:7px;width:auto;display:flex;align-items:center;gap:6px">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/></svg>
                        저장하기
                    </button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    const btn = document.getElementById('profileBtn');
    const dropdown = document.getElementById('profileDropdown');
    btn.addEventListener('click', e => { e.stopPropagation(); dropdown.classList.toggle('open'); });
    document.addEventListener('click', () => dropdown.classList.remove('open'));
    dropdown.addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
