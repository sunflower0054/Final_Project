<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:if="${_csrf != null}" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:if="${_csrf != null}" th:content="${_csrf.headerName}">
    <title>관제 시스템 - 거주자 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title">거주자 정보 수정</h2>
            <p class="page-subtitle">거주자 정보를 수정합니다. 변경 후 저장해주세요.</p>
        </div>

        <div style="background:var(--primary-light); border:1px solid var(--primary-mid); border-radius:12px; padding:14px 20px; display:flex; align-items:center; gap:10px; font-size:14px; color:var(--text-main); margin-bottom:24px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="color:var(--primary);">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            기존 정보를 불러왔습니다. 변경할 항목만 수정 후 저장해주세요.
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 24px;">

            <!-- 기본 정보 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:var(--error);">*</span></label>
                        <input type="text" class="form-control" id="name" placeholder="이름을 입력하세요">
                    </div>

                    <!-- 생년월일 -->
                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <!-- 전화번호 -->
                    <div class="form-group">
                        <label class="form-label">전화번호</label>
                        <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX" oninput="formatPhone(this)">
                    </div>

                    <!-- 주소 -->
                    <div class="form-group address-group">
                        <label class="form-label">주소 <span style="color:#E53935;">*</span></label>
                        <div style="display:flex; gap:8px; margin-bottom:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:150px;">
                            <button type="button" onclick="execDaumPostcode()"
                                    style="padding:8px 16px; background:var(--primary); color:white; border:none; border-radius:6px; cursor:pointer; white-space:nowrap;">
                                주소 검색
                            </button>
                        </div>
                        <input type="text" id="address" class="form-control" placeholder="주소" readonly>
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세 주소 (예: 301호)" style="margin-top: 8px;">
                    </div>
                    <div class="form-group" style="margin-top: 20px;">
                        <label class="form-label">기저질환 및 건강 상태</label>
                        <textarea class="form-control" id="disease" rows="5"
                                  placeholder="고혈압, 당뇨 등 기저질환이나 참고해야 할 건강 상태를 자유롭게 입력해주세요."
                                  style="resize: vertical; min-height: 120px;" th:text="${resident?.disease}"></textarea>
                        <p style="font-size: 12px; color: var(--gray-500); margin-top: 6px;">※ 여러 질환이 있을 경우 줄바꿈(Enter)이나 쉼표(,)로 구분하여 입력해주세요.</p>
                    </div>
                </div>
            </div>
        </div>
        <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
            <button onclick="history.back()"
                    class="btn"
                    style="background:var(--secondary); color:var(--text-sub); border:1px solid var(--gray-300); padding:12px 28px; font-weight:600;">
                취소
            </button>
            <button onclick="saveResident()"
                    class="btn btn-navy"
                    style="padding:12px 32px; font-weight:600; display:flex; align-items:center; gap:8px; background:var(--primary);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                </svg>
                저장하기
            </button>
        </div>
    </main>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:src="@{/js/dropdown.js}"></script>
<script th:src="@{/js/app-api.js}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
<script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>

<script>
    let residentId = null;
    let selectedLat = null;
    let selectedLon = null;

    function getUrlParameter(name) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(name);
    }

    function extractResident(payload) {
        return payload?.resident || payload || {};
    }

    function getErrorMessage(error, fallbackMessage) {
        if (error?.message && error.message.trim()) {
            return error.message;
        }

        if (error?.data?.message && error.data.message.trim()) {
            return error.data.message;
        }

        return fallbackMessage;
    }

    document.addEventListener('DOMContentLoaded', function() {
        initBirthDateSelects();

        residentId = getUrlParameter('id');
        if (residentId) {
            loadResidentData(residentId);
        } else {
            alert('잘못된 접근입니다. 거주자 ID가 없습니다.');
            history.back();
        }
    });

    async function loadResidentData(id) {
        try {
            const payload = await AppApi.get(`/api/v1/residents/${id}`);
            const resident = extractResident(payload);

            document.getElementById('name').value = resident.name || '';
            document.getElementById('phone').value = resident.phone || '';
            document.getElementById('address').value = resident.address || '';
            document.getElementById('detailAddress').value = '';

            selectedLat = resident.latitude ?? null;
            selectedLon = resident.longitude ?? null;

            if (resident.birthDate) {
                const [y, m, d] = resident.birthDate.split('-');
                document.getElementById('birthYear').value = y || '';
                document.getElementById('birthMonth').value = m || '';
                document.getElementById('birthDay').value = d || '';
                document.getElementById('birthDate').value = resident.birthDate;
            } else {
                document.getElementById('birthYear').value = '';
                document.getElementById('birthMonth').value = '';
                document.getElementById('birthDay').value = '';
                document.getElementById('birthDate').value = '';
            }

            document.getElementById('disease').value = resident.disease || '';

        } catch (error) {
            alert(getErrorMessage(error, '거주자 정보를 불러오는 데 실패했습니다.'));
        }
    }

    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            yearSelect.add(new Option(i + '년', i));
        }
        for (let i = 1; i <= 12; i++) {
            const val = i < 10 ? '0' + i : i;
            monthSelect.add(new Option(i + '월', val));
        }
        for (let i = 1; i <= 31; i++) {
            const val = i < 10 ? '0' + i : i;
            daySelect.add(new Option(i + '일', val));
        }

        [yearSelect, monthSelect, daySelect].forEach(s =>
            s.addEventListener('change', updateBirthDateHidden)
        );
    }

    function updateBirthDateHidden() {
        const y = document.getElementById('birthYear').value;
        const m = document.getElementById('birthMonth').value;
        const d = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (y && m && d) ? `${y}-${m}-${d}` : '';
    }

    // ==================== 주소 검색 및 좌표 변환 ====================
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                const addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;
                document.getElementById('postcode').value = data.zonecode;
                document.getElementById('address').value = addr;

                const geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(addr, function(result, status) {
                    if (status === kakao.maps.services.Status.OK) {
                        selectedLat = result[0].y;
                        selectedLon = result[0].x;
                    } else {
                        alert('주소 좌표 변환에 실패했습니다. 주소를 다시 검색해주세요.');
                        selectedLat = null;
                        selectedLon = null;
                    }
                });

                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

    // ==================== 전화번호 자동 하이픈 ====================
    function formatPhone(el) {
        let v = el.value.replace(/\D/g, '');
        if (v.length > 3 && v.length <= 7) {
            v = v.slice(0, 3) + '-' + v.slice(3);
        } else if (v.length > 7) {
            v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
        }
        el.value = v;
    }

    // ==================== 최종 수정 내용 서버로 전송 ====================
    async function saveResident() {
        updateBirthDateHidden();

        const name = document.getElementById('name').value.trim();
        const birthDate = document.getElementById('birthDate').value;
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const detailAddress = document.getElementById('detailAddress').value.trim();
        const latitude = Number.parseFloat(selectedLat);
        const longitude = Number.parseFloat(selectedLon);
        const disease = document.getElementById('disease').value.trim();

        if (!name) {
            alert('이름을 입력해주세요.');
            document.getElementById('name').focus();
            return;
        }

        if (!birthDate) {
            alert('생년월일을 선택해주세요.');
            return;
        }

        if (!address) {
            alert('주소를 입력해주세요.');
            return;
        }

        if (!Number.isFinite(latitude) || !Number.isFinite(longitude)) {
            alert('주소 검색을 완료해 좌표를 먼저 확보해주세요.');
            return;
        }

        const fullAddress = address + (detailAddress ? " " + detailAddress : "");

        const payload = {
            name,
            birthDate,
            phone: phone || null,
            address: fullAddress,
            disease: disease || null, // [수정됨] textarea 값 할당
            latitude,
            longitude
        };

        try {
            await AppApi.put(`/api/v1/residents/${residentId}`, payload);
            alert('거주자 정보가 성공적으로 수정되었습니다.');
            window.location.href = `/resident/detail?id=${residentId}`;
        } catch (error) {
            alert(getErrorMessage(error, '수정에 실패했습니다.'));
        }
    }
</script>

</body>
</html>
