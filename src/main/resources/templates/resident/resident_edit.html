<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 정보 수정</title>
    <link rel="stylesheet" th:href="@{/css/myinfo.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<style>
    .hidden { display: none; }
    .badge {
        display: inline-block;
        padding: 6px 12px;
        border-radius: 20px;
        font-size: 14px;
        margin-right: 6px;
        margin-bottom: 6px;
    }

    /* 생년월일 선택박스 컴팩트 */
    .birth-row {
        display: grid;
        grid-template-columns: 1fr 0.75fr 0.75fr;
        gap: 8px;
        max-width: 260px;
    }

    .birth-row select {
        font-size: 14.5px !important;
        padding: 7px 8px !important;
        height: 38px !important;
        border-radius: 6px;
    }

    /* 성별 + 전화번호 한 줄 배치 */
    .two-column {
        display: grid;
        grid-template-columns: 1fr 1.6fr;
        gap: 20px;
    }

    /* 라벨 간격 */
    .form-group label {
        margin-bottom: 6px;
    }
</style>

<body>

<div th:replace="~{fragments/header :: header}"></div>

<div class="main-container">
    <main class="content-area">
        <div class="page-header">
            <h2 class="page-title">거주자 정보 수정</h2>
            <p class="page-subtitle">김영희 거주자님의 정보를 수정합니다. 변경 후 저장해주세요.</p>
        </div>

        <!-- 안내 배너 (myinfo 스타일에 맞게 조정) -->
        <div style="background:#FFF3E0; border:1px solid #FFE0B2; border-radius:12px; padding:14px 20px; display:flex; align-items:center; gap:10px; font-size:14px; color:#F57C00; margin-bottom:24px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            기존 정보를 불러왔습니다. 변경할 항목만 수정 후 저장해주세요.
        </div>

        <div style="display: grid; grid-template-columns: 1fr; gap: 24px;">

            <!-- 기본 정보 수정 카드 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">기본 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">이름 <span style="color:#E53935;">*</span></label>
                        <input type="text" class="form-control" value="김영희">
                    </div>
                    <!-- 생년월일 -->
                    <div class="form-group">
                        <label class="form-label">생년월일 <span style="color:red;">*</span></label>
                        <div class="birth-row">
                            <select id="birthYear" class="form-control">
                                <option value="">년도</option>
                            </select>
                            <select id="birthMonth" class="form-control">
                                <option value="">월</option>
                            </select>
                            <select id="birthDay" class="form-control">
                                <option value="">일</option>
                            </select>
                        </div>
                        <input type="hidden" id="birthDate" value="">
                    </div>

                    <!-- 성별 + 전화번호 한 줄 배치 -->
                    <div class="two-column">
                        <div class="form-group">
                            <label class="form-label">성별</label>
                            <select class="form-control" id="gender">
                                <option value="">선택하세요</option>
                                <option value="남성">남성</option>
                                <option value="여성">여성</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">전화번호</label>
                            <input type="tel" class="form-control" id="phone" placeholder="010-XXXX-XXXX" oninput="formatPhone(this)">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">주소 <span style="color:#E53935;">*</span></label>

                        <div style="display:flex; gap:8px;">
                            <input type="text" id="postcode" class="form-control" placeholder="우편번호" readonly style="max-width:150px;">
                            <button type="button" onclick="execDaumPostcode()"
                                    style="padding:8px 12px; background:#1e3a5f; color:white; border:none; border-radius:6px; cursor:pointer;">
                                주소 검색
                            </button>
                        </div>

                        <input type="text" id="address" class="form-control" placeholder="주소" readonly style="margin-top:8px;">
                        <input type="text" id="detailAddress" class="form-control" placeholder="상세주소" style="margin-top:8px;">

                        <span class="form-hint" style="font-size:13px; color:#64748b; margin-top:4px; display:block;">
                            상세 주소까지 정확히 입력해주세요
                        </span>
                    </div>
                </div>
            </div>

            <!-- 건강 / 기저질환 정보 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">건강 / 기저질환 정보</h3>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label class="form-label">기저질환</label>
                        <input type="text" class="form-control" value="고혈압, 당뇨, 골다공증">
                        <span class="form-hint" style="font-size:13px; color:#64748b;">쉼표(,)로 구분하여 입력하세요</span>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label class="form-label">복용 약물</label>
                            <input type="text" class="form-control" value="혈압약, 인슐린">
                        </div>
                        <div class="form-group">
                            <label class="form-label">혈액형</label>
                            <select class="form-control" style="cursor:pointer;">
                                <option selected>A형</option>
                                <option>B형</option>
                                <option>O형</option>
                                <option>AB형</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">특이사항</label>
                        <textarea class="form-control" style="height: 100px; resize: vertical;">낙상 이력 있음. 야간 이동 시 주의 필요.</textarea>
                    </div>
                </div>
            </div>

            <!-- 비상 연락처 -->
            <div class="content-card">
                <div class="card-header">
                    <h3 class="card-title">비상 연락처</h3>
                </div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label class="form-label">보호자 이름</label>
                            <input type="text" class="form-control" value="김민수">
                        </div>
                        <div class="form-group">
                            <label class="form-label">관계</label>
                            <input type="text" class="form-control" value="아들">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">보호자 연락처</label>
                        <input type="tel" class="form-control" value="010-1234-9999" oninput="formatPhone(this)">
                    </div>
                </div>
            </div>

        </div>

        <!-- 저장/취소 버튼 영역 -->
        <div style="margin-top: 32px; display: flex; justify-content: flex-end; gap: 12px;">
            <button onclick="history.back()"
                    class="btn"
                    style="background:#f8f9fa; color:#475569; border:1px solid #dee2e6; padding:12px 28px; font-weight:600;">
                취소
            </button>
            <button onclick="alert('거주자 정보가 저장되었습니다.'); history.back()"
                    class="btn btn-navy"
                    style="padding:12px 32px; font-weight:600; display:flex; align-items:center; gap:8px;">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
                    <polyline points="17 21 17 13 7 13 7 21"/>
                </svg>
                저장하기
            </button>
        </div>

    </main>
</div>

<script>
    // ==================== 생년월일 ====================
    function initBirthDateSelects() {
        const yearSelect = document.getElementById('birthYear');
        const monthSelect = document.getElementById('birthMonth');
        const daySelect = document.getElementById('birthDay');
        const currentYear = new Date().getFullYear();

        for (let i = currentYear; i >= 1920; i--) {
            const opt = document.createElement('option');
            opt.value = i; opt.textContent = i + '년';
            yearSelect.appendChild(opt);
        }
        for (let i = 1; i <= 12; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '월';
            monthSelect.appendChild(opt);
        }
        for (let i = 1; i <= 31; i++) {
            const opt = document.createElement('option');
            opt.value = i < 10 ? '0' + i : i;
            opt.textContent = i + '일';
            daySelect.appendChild(opt);
        }

        [yearSelect, monthSelect, daySelect].forEach(s => s.addEventListener('change', updateBirthDateHidden));
    }

    function updateBirthDateHidden() {
        const y = document.getElementById('birthYear').value;
        const m = document.getElementById('birthMonth').value;
        const d = document.getElementById('birthDay').value;
        document.getElementById('birthDate').value = (y && m && d) ? `${y}-${m}-${d}` : '';
    }
    // ==================== Daum 주소 검색 ====================
    function execDaumPostcode() {
        new daum.Postcode({
            oncomplete: function(data) {
                let addr = data.userSelectedType === 'R' ? data.roadAddress : data.jibunAddress;

                document.getElementById('postcode').value = data.zonecode;
                document.getElementById('address').value = addr;
                document.getElementById('detailAddress').focus();
            }
        }).open();
    }

<!--    =================================================-->
<!--    ======= 전화번호 입력 시 자동으로 - 입력 ========-->
<!--    =================================================-->
    function formatPhone(el) {
    let v = el.value.replace(/\D/g, '');
    if (v.length > 3 && v.length <= 7) {
        v = v.slice(0, 3) + '-' + v.slice(3);
    } else if (v.length > 7) {
        v = v.slice(0, 3) + '-' + v.slice(3, 7) + '-' + v.slice(7, 11);
    }
    el.value = v;
}
</script>


<script th:src="@{/js/dropdown.js}"></script>
<script src="https://t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>

</body>
</html>
