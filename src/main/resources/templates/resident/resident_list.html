<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 시스템 - 거주자 목록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="main-container">

    <header class="header-area">
        <a href="/" class="brand-logo">
            <div class="logo-box">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                    <circle cx="12" cy="11" r="3"/>
                </svg>
            </div>
            <span class="brand-name">골든노미스</span>
        </a>
        <div class="topbar-right">
            <div class="system-time" id="currentTime"></div>
        </div>
    </header>

    <div class="content-card">
        <div class="risk-score-section">
            <div>
                <div class="user-name" style="margin-bottom: 2px;">거주자 목록</div>
                <div class="user-email">이름을 선택하면 해당 거주자의 상세 화면으로 이동합니다.</div>
            </div>
        </div>

        <div class="event-stats-section">
            <div class="content-card control-panel">
                <div class="timeline-title">목록 조회</div>
                <div id="residentList" class="event-stats-section">
                    <div class="stat-card">
                        <div class="user-email">거주자 목록을 불러오는 중입니다.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        const now = new Date();
        const text =
            now.getFullYear() + '. ' +
            String(now.getMonth() + 1).padStart(2, '0') + '. ' +
            String(now.getDate()).padStart(2, '0') + ' ' +
            String(now.getHours()).padStart(2, '0') + ':' +
            String(now.getMinutes()).padStart(2, '0') + ':' +
            String(now.getSeconds()).padStart(2, '0');
        const currentTime = document.getElementById('currentTime');
        if (currentTime) currentTime.innerText = text;
    }

    async function parseJsonResponse(response) {
        const text = await response.text();
        if (!text) return {};
        try {
            return JSON.parse(text);
        } catch (e) {
            return { message: text };
        }
    }

    function escapeHtml(value) {
        return String(value ?? '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderResidents(residents) {
        const residentList = document.getElementById('residentList');

        if (!Array.isArray(residents) || residents.length === 0) {
            residentList.innerHTML = `
                <div class="stat-card">
                    <div class="user-email">조회 가능한 거주자 정보가 없습니다.</div>
                </div>
            `;
            return;
        }

        residentList.innerHTML = residents.map((resident) => `
            <div class="stat-card">
                <div class="stats-header">
                    <div>
                        <div class="stat-title">거주자 ID</div>
                        <div class="stat-value">${escapeHtml(resident.id)}</div>
                    </div>
                    <a href="/resident/detail?id=${encodeURIComponent(resident.id)}" class="btn-profile-detail" style="width:auto;padding:8px 14px;">
                        ${escapeHtml(resident.name)}
                    </a>
                </div>
                <div class="noti-detail-row">
                    <span>생년월일</span>
                    <span class="value">${escapeHtml(resident.birthDate || '-')}</span>
                </div>
                <div class="noti-detail-row">
                    <span>전화번호</span>
                    <span class="value">${escapeHtml(resident.phone || '-')}</span>
                </div>
            </div>
        `).join('');
    }

    async function loadResidents() {
        try {
            const response = await fetch('/api/v1/residents', {
                method: 'GET',
                credentials: 'same-origin'
            });
            const result = await parseJsonResponse(response);

            if (!response.ok || result.success !== true) {
                alert(result.message || '거주자 목록을 불러오지 못했습니다.');
                renderResidents([]);
                return;
            }

            renderResidents(result.residents);
        } catch (e) {
            alert('거주자 목록 조회 중 오류가 발생했습니다.');
            renderResidents([]);
        }
    }

    updateClock();
    setInterval(updateClock, 1000);
    loadResidents();
</script>
</body>
</html>
