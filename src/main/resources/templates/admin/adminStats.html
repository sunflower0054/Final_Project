<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 통계 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>

        /* =========================================
           2. 인라인 스타일을 CSS 클래스로 분리
           ========================================= */
        .header-area {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 20px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .chart-card {
            padding: 24px;
        }

        .chart-container {
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }

        /* 특정 차트용 개별 스타일 */
        #userAgeChart {
            background: var(--navy-light);
        }
        #monthlyTrendChart {
            height: 350px;
        }
    </style>
</head>
<body>

<!-- 인라인 style 속성 제거 -->
<header class="header-area">
    <div class="brand-logo">
        <div class="logo-box">A</div>
        <div class="brand-name">관리자 통계 (Admin Statistics)</div>
    </div>
    <div class="topbar-right">
        <span class="status-badge badge-success">ADMIN 권한</span>
    </div>
</header>

<div class="main-container">
    <div class="summary-cards">
        <div class="stat-card">
            <div class="stat-title">전체 회원 수</div>
            <div class="stat-value" id="totalUsers">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">등록된 독거노인 수 (평균 <span id="avgAge">0</span>세)</div>
            <div class="stat-value" id="totalResidents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">누적 이벤트 발생 건수</div>
            <div class="stat-value" id="totalEvents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">AI 오탐지율 (CLOSED 비율)</div>
            <div class="stat-value red" id="falseAlarmRate">로딩중...</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="content-card chart-card">
            <div class="section-title">
                [ 회원 연령대 분포 ]
            </div>
            <!-- 인라인 style 속성 제거 -->
            <div id="userAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                [ 회원 가입 목적 ]
            </div>
            <div id="userPurposeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                [ 독거노인 연령대 분포 ]
            </div>
            <div id="residentAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                [ 이벤트 처리 상태 ]
            </div>
            <div id="eventStatusChart" class="chart-container"></div>
        </div>

        <!-- 인라인 style 속성 제거 (grid-column 등) -->
        <div class="content-card chart-card" style="grid-column: 1 / -1;">
            <div class="section-title">
                [ 월별 이벤트 발생 추이 ]
            </div>
            <div id="monthlyTrendChart" class="chart-container"></div>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart', 'bar']});
    google.charts.setOnLoadCallback(fetchDataAndDrawCharts);

    // 전역 변수
    let colors = {};
    let charts = {}; // 차트 인스턴스 저장 (resize 시 재사용)

    function fetchDataAndDrawCharts() {
        // CSS 변수 동적으로 읽어오기 (가장 먼저 실행)
        const rootStyle = getComputedStyle(document.documentElement);
        colors = {
            primary: rootStyle.getPropertyValue('--navy').trim() || '#94D05C',
            primaryMid: rootStyle.getPropertyValue('--navy-mid').trim() || '#A7D673',
            primaryLight: rootStyle.getPropertyValue('--navy-light').trim() || '#f6f7ea',
            success: rootStyle.getPropertyValue('--success').trim() || '#2A8F3D',
            warning: rootStyle.getPropertyValue('--warning').trim() || '#F59E0B',
            error: rootStyle.getPropertyValue('--error').trim() || '#E03131',
            gray: rootStyle.getPropertyValue('--gray-400').trim() || '#9CA3AF',
            dark: rootStyle.getPropertyValue('--gray-900').trim() || '#1C2919',
            gridLine: rootStyle.getPropertyValue('--chart-grid-line').trim() || '#F1F5F9',
            pieGreen1: rootStyle.getPropertyValue('--chart-pie-green-1').trim() || '#C5E1A5',
            pieGreen2: rootStyle.getPropertyValue('--chart-pie-green-2').trim() || '#DCEDC8',
            pieYellow1: rootStyle.getPropertyValue('--chart-pie-yellow-1').trim() || '#FBBF24',
            pieYellow2: rootStyle.getPropertyValue('--chart-pie-yellow-2').trim() || '#FDE68A'
        };

        // ==================== 데이터 ====================
        const userData = {
            totalUsers: 1245,
            ageGroups: [
                ['연령대', '인원 수'],
                ['20대', 350], ['30대', 420], ['40대', 280], ['50대', 145], ['60대 이상', 50]
            ],
            purposes: [
                ['목적', '비율'],
                ['부모님 안전 확인', 65], ['방범 및 모니터링', 20], ['연구/공공기관', 10], ['기타', 5]
            ]
        };

        const residentData = {
            totalResidents: 412,
            averageAge: 76.4,
            ageGroups: [
                ['연령대', '인원 수'],
                ['60대', 120], ['70대', 190], ['80대 이상', 102]
            ]
        };

        const eventData = {
            totalEvents: 3890,
            byStatus: [
                ['상태', '건수'],
                ['수동신고', 1500],
                ['자동신고', 1650],
                ['오탐지', 640]
            ],
            monthlyTrend: [
                ['월', '낙상', '움직임 없음', '폭행'],
                ['10월', 45, 12, 5],
                ['11월', 52, 18, 8],
                ['12월', 61, 25, 4],
                ['1월', 85, 40, 10],
                ['2월', 70, 32, 6],
                ['3월', 40, 15, 3]
            ]
        };

        // ==================== 숫자 업데이트 ====================
        document.getElementById('totalUsers').innerText = userData.totalUsers.toLocaleString() + '명';
        document.getElementById('totalResidents').innerText = residentData.totalResidents.toLocaleString() + '명';
        document.getElementById('avgAge').innerText = residentData.averageAge;
        document.getElementById('totalEvents').innerText = eventData.totalEvents.toLocaleString() + '건';

        const closedEvents = eventData.byStatus[3][1];
        const falseAlarmRate = ((closedEvents / eventData.totalEvents) * 100).toFixed(1);
        document.getElementById('falseAlarmRate').innerText = falseAlarmRate + '%';

        // ==================== 차트 그리기 ====================
        drawUserAgeChart(userData.ageGroups);
        drawUserPurposeChart(userData.purposes);
        drawResidentAgeChart(residentData.ageGroups);
        drawEventStatusChart(eventData.byStatus);
        drawMonthlyTrendChart(eventData.monthlyTrend);
    }

    // ==================== 차트 함수들 ====================
    function drawUserAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            legend: { position: 'none' },
            colors: [colors.primaryMid],
            chartArea: { width: '80%', height: '70%' },
            vAxis: { gridlines: { color: colors.gridLine }, textStyle: { color: colors.gray } },
            hAxis: { textStyle: { color: colors.gray } },
            animation: { startup: true, duration: 800, easing: 'out' }
        };
        var chart = new google.visualization.ColumnChart(document.getElementById('userAgeChart'));
        chart.draw(data, options);
    }

    function drawUserPurposeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.5,
            colors: [colors.primary, colors.primaryMid, colors.pieGreen1, colors.pieGreen2],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right', textStyle: { color: colors.dark, fontSize: 12 } },
            pieSliceBorderColor: "none"
        };
        var chart = new google.visualization.PieChart(document.getElementById('userPurposeChart'));
        chart.draw(data, options);
    }

    function drawResidentAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.5,
            colors: [colors.warning, colors.pieYellow1, colors.pieYellow2],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            pieSliceBorderColor: "none"
        };
        var chart = new google.visualization.PieChart(document.getElementById('residentAgeChart'));
        chart.draw(data, options);
    }

    function drawEventStatusChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.6,
            colors: [colors.gray, colors.success, colors.error],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            pieSliceText: 'none'
        };
        var chart = new google.visualization.PieChart(document.getElementById('eventStatusChart'));
        chart.draw(data, options);
    }

    function drawMonthlyTrendChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            curveType: 'function',
            lineWidth: 3,
            legend: { position: 'bottom', textStyle: { color: colors.gray } },
            colors: [colors.error, colors.warning, colors.primary],
            vAxis: { minValue: 0, gridlines: { color: colors.gridLine } },
            chartArea: { width: '85%', height: '70%' },
            animation: { startup: true, duration: 800, easing: 'out' }
        };
        var chart = new google.visualization.LineChart(document.getElementById('monthlyTrendChart'));
        chart.draw(data, options);
    }

    // ==================== Resize 최적화 ====================
    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            fetchDataAndDrawCharts();
        }, 250);   // 250ms 디바운스
    });
</script>
</body>
</html>
