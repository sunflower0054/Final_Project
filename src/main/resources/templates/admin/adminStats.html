<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 통계 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        /* 대시보드 차트 레이아웃을 위한 간단한 그리드 추가 (style.css 훼손 방지) */
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .chart-card {
            padding: 24px;
        }
        .chart-container {
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header class="header-area" style="padding: 20px; background: #fff; border-bottom: 1px solid var(--gray-200); margin-bottom: 20px;">
    <div class="brand-logo">
        <div class="logo-box">A</div>
        <div class="brand-name">관리자 통계 (Admin Statistics)</div>
    </div>
    <div class="topbar-right">
        <span class="status-badge badge-success">ADMIN 권한</span>
    </div>
</header>

<div class="main-container">
    <div class="summary-cards">
        <div class="stat-card">
            <div class="stat-title">전체 회원 수</div>
            <div class="stat-value" id="totalUsers">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">등록된 독거노인 수 (평균 <span id="avgAge">0</span>세)</div>
            <div class="stat-value" id="totalResidents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">누적 이벤트 발생 건수</div>
            <div class="stat-value" id="totalEvents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">AI 오탐지율 (CLOSED 비율)</div>
            <div class="stat-value red" id="falseAlarmRate">로딩중...</div>
        </div>
    </div>

    <div class="chart-grid">
        <div class="content-card chart-card">
            <div class="section-title">
                <span class="section-title-icon" style="background: var(--navy-light); color: var(--navy);">📊</span>
                회원 연령대 분포
            </div>
            <div id="userAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                <span class="section-title-icon" style="background: var(--navy-light); color: var(--navy);">🎯</span>
                회원 가입 목적
            </div>
            <div id="userPurposeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                <span class="section-title-icon" style="background: var(--warning-bg); color: var(--warning);">👵</span>
                독거노인 연령대 분포
            </div>
            <div id="residentAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                <span class="section-title-icon" style="background: var(--error-bg); color: var(--error);">🚨</span>
                이벤트 처리 상태 (오탐지율)
            </div>
            <div id="eventStatusChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card" style="grid-column: 1 / -1;">
            <div class="section-title">
                <span class="section-title-icon" style="background: var(--gray-200); color: var(--gray-600);">📈</span>
                월별 이벤트 발생 추이
            </div>
            <div id="monthlyTrendChart" class="chart-container" style="height: 350px;"></div>
        </div>
    </div>
</div>

<script>
    // 구글 차트 패키지 로드
    google.charts.load('current', {'packages':['corechart', 'bar']});
    google.charts.setOnLoadCallback(fetchDataAndDrawCharts);

    // API 명세서 기반의 더미 데이터 (실제 백엔드 API 연동 시 fetch로 교체)
    function fetchDataAndDrawCharts() {
        // [AD-01] 회원 통계 데이터 (Mock)
        const userData = {
            totalUsers: 1245,
            ageGroups: [
                ['연령대', '인원 수'],
                ['20대', 350], ['30대', 420], ['40대', 280], ['50대', 145], ['60대 이상', 50]
            ],
            purposes: [
                ['목적', '비율'],
                ['부모님 안전 확인', 65], ['방범 및 모니터링', 20], ['연구/공공기관', 10], ['기타', 5]
            ]
        };

        // [AD-02] 독거노인 통계 데이터 (Mock)
        const residentData = {
            totalResidents: 412,
            averageAge: 76.4,
            ageGroups: [
                ['연령대', '인원 수'],
                ['60대', 120], ['70대', 190], ['80대 이상', 102]
            ]
        };

        // [AD-03] 이벤트 통계 데이터 (Mock)
        const eventData = {
            totalEvents: 3890,
            byStatus: [
                ['상태', '건수'],
                ['진행중(OPEN)', 150],
                ['조치완료(RESOLVED)', 3100],
                ['오탐지(CLOSED)', 640] // 오탐지율 지표
            ],
            monthlyTrend: [
                ['월', '낙상', '움직임 없음', '폭행'],
                ['10월', 45, 12, 5],
                ['11월', 52, 18, 8],
                ['12월', 61, 25, 4],
                ['1월', 85, 40, 10],
                ['2월', 70, 32, 6],
                ['3월', 40, 15, 3]
            ]
        };

        // 1. 요약 카드 DOM 업데이트
        document.getElementById('totalUsers').innerText = userData.totalUsers.toLocaleString() + '명';
        document.getElementById('totalResidents').innerText = residentData.totalResidents.toLocaleString() + '명';
        document.getElementById('avgAge').innerText = residentData.averageAge;
        document.getElementById('totalEvents').innerText = eventData.totalEvents.toLocaleString() + '건';

        // 오탐지율 계산 (CLOSED 건수 / 전체 건수 * 100)
        const closedEvents = eventData.byStatus[3][1];
        const falseAlarmRate = ((closedEvents / eventData.totalEvents) * 100).toFixed(1);
        document.getElementById('falseAlarmRate').innerText = falseAlarmRate + '%';

        // 2. 차트 그리기 실행
        drawUserAgeChart(userData.ageGroups);
        drawUserPurposeChart(userData.purposes);
        drawResidentAgeChart(residentData.ageGroups);
        drawEventStatusChart(eventData.byStatus);
        drawMonthlyTrendChart(eventData.monthlyTrend);
    }

    // 공통 색상 (style.css 변수 참고)
    const colors = {
        navy: '#3B5B9D',
        navyMid: '#4E71B8',
        navyLight: '#F0F4FB',
        success: '#059669',
        warning: '#D97706',
        error: '#DC2626',
        gray: '#94A3B8'
    };

    // [AD-01] 회원 연령대 분포 (막대 차트)
    function drawUserAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            legend: { position: 'none' },
            colors: [colors.navyMid],
            vAxis: { minValue: 0 },
            animation: { startup: true, duration: 1000, easing: 'out' }
        };
        var chart = new google.visualization.ColumnChart(document.getElementById('userAgeChart'));
        chart.draw(data, options);
    }

    // [AD-01] 회원 가입 목적 (파이 차트)
    function drawUserPurposeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0, // 완전한 원형 파이 차트
            colors: [colors.navy, colors.navyMid, '#7DA0FA', '#A9C3FD'],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' }
        };
        var chart = new google.visualization.PieChart(document.getElementById('userPurposeChart'));
        chart.draw(data, options);
    }

    // [AD-02] 독거노인 연령대 (도넛 차트 - 60대/70대/80대 이상 그룹핑)
    function drawResidentAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.4, // 가운데 구멍을 뚫어 도넛 형태로
            colors: [colors.warning, '#F59E0B', '#FCD34D'],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' }
        };
        var chart = new google.visualization.PieChart(document.getElementById('residentAgeChart'));
        chart.draw(data, options);
    }

    // [AD-03] 이벤트 처리 상태 - CLOSED 비율(오탐지율) 강조 (도넛 차트)
    function drawEventStatusChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.4,
            // OPEN(회색), RESOLVED(녹색), CLOSED(빨간색 - 오탐지)
            colors: [colors.gray, colors.success, colors.error],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            pieSliceText: 'percentage'
        };
        var chart = new google.visualization.PieChart(document.getElementById('eventStatusChart'));
        chart.draw(data, options);
    }

    // [AD-03] 이벤트 월별 추이 (선 그래프)
    function drawMonthlyTrendChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            curveType: 'function', // 부드러운 곡선
            legend: { position: 'bottom' },
            colors: [colors.error, colors.warning, colors.navy], // 낙상(빨강), 움직임(노랑), 폭행(파랑)
            vAxis: { minValue: 0 },
            animation: { startup: true, duration: 1000, easing: 'out' },
            chartArea: { width: '85%', height: '70%' }
        };
        var chart = new google.visualization.LineChart(document.getElementById('monthlyTrendChart'));
        chart.draw(data, options);
    }

    // 반응형 처리: 창 크기 조절 시 차트 다시 그리기
    window.addEventListener('resize', function() {
        fetchDataAndDrawCharts();
    });
</script>
</body>
</html>
