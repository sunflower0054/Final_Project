<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 통계 대시보드</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        .header-area {
            padding: 20px;
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            margin-bottom: 20px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .chart-card {
            padding: 24px;
        }

        .chart-card-wide {
            grid-column: 1 / -1;
        }

        .chart-container {
            width: 100%;
            height: 300px;
            margin-top: 10px;
        }

        .chart-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            background: var(--gray-50);
            color: var(--gray-500);
            font-size: 14px;
            text-align: center;
        }

        .filter-panel {
            padding: 24px;
            margin-bottom: 20px;
        }

        .filter-panel-header {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 16px;
        }

        .filter-panel-helper {
            font-size: 13px;
            color: var(--gray-500);
            font-weight: 500;
        }

        .created-at-filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .event-chart-header {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 16px;
        }

        .event-chart-title-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .event-chart-helper {
            font-size: 13px;
            color: var(--gray-500);
            font-weight: 500;
        }

        .event-filter-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .created-at-filter-row select,
        .event-filter-row select {
            min-width: 140px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid var(--gray-300);
            border-radius: 10px;
            background: #fff;
            color: var(--gray-900);
            font-size: 14px;
            font-weight: 600;
            outline: none;
        }

        .filter-reset-btn {
            height: 40px;
            padding: 0 16px;
            border: none;
            border-radius: 10px;
            background: var(--navy, #94D05C);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .filter-reset-btn:hover {
            opacity: 0.92;
        }

        #userAgeChart {
            background: var(--navy-light);
        }

        #monthlyTrendChart {
            height: 350px;
        }

        @media (max-width: 900px) {
            .chart-grid {
                grid-template-columns: 1fr;
            }

            .chart-card-wide {
                grid-column: auto;
            }

            .created-at-filter-row select,
            .event-filter-row select,
            .filter-reset-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<header class="header-area">
    <div class="brand-logo">
        <div class="logo-box">A</div>
        <div class="brand-name">관리자 통계 (Admin Statistics)</div>
    </div>
    <div class="topbar-right">
        <span class="status-badge badge-success">ADMIN 권한</span>
    </div>
</header>

<div class="main-container">
    <div class="summary-cards">
        <div class="stat-card">
            <div class="stat-title">전체 회원 수</div>
            <div class="stat-value" id="totalUsers">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">등록된 독거노인 수 (평균 <span id="avgAge">0</span>세)</div>
            <div class="stat-value" id="totalResidents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">누적 이벤트 발생 건수</div>
            <div class="stat-value" id="totalEvents">로딩중...</div>
        </div>
        <div class="stat-card">
            <div class="stat-title">AI 오탐지율</div>
            <div class="stat-value red" id="falseAlarmRate">로딩중...</div>
        </div>
    </div>

    <div class="content-card filter-panel">
        <div class="filter-panel-header">
            <div class="section-title">
                [ 회원/독거노인 등록 일자 ]
            </div>
            <div class="filter-panel-helper">
                아래 필터는 회원/독거노인 통계에만 적용되며 이벤트 통계에는 영향을 주지 않습니다.
            </div>
        </div>

        <div class="created-at-filter-row">
            <select id="createdAtYearFilter" aria-label="회원 및 독거노인 연도 필터">
                <option value="">전체 연도</option>
            </select>

            <select id="createdAtMonthFilter" aria-label="회원 및 독거노인 월 필터">
                <option value="">전체 월</option>
                <option value="1">1월</option>
                <option value="2">2월</option>
                <option value="3">3월</option>
                <option value="4">4월</option>
                <option value="5">5월</option>
                <option value="6">6월</option>
                <option value="7">7월</option>
                <option value="8">8월</option>
                <option value="9">9월</option>
                <option value="10">10월</option>
                <option value="11">11월</option>
                <option value="12">12월</option>
            </select>

            <button type="button" id="resetCreatedAtFiltersBtn" class="filter-reset-btn">초기화</button>
        </div>
    </div>

    <div class="chart-grid">
        <div class="content-card chart-card">
            <div class="section-title">
                [ 회원 연령대 분포 ]
            </div>
            <div id="userAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                [ 회원 가입 목적 ]
            </div>
            <div id="userPurposeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="section-title">
                [ 독거노인 연령대 분포 ]
            </div>
            <div id="residentAgeChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card">
            <div class="event-chart-header">
                <div class="event-chart-title-group">
                    <div class="section-title">
                        [ 이벤트 처리 상태 ]
                    </div>
                    <div class="event-chart-helper">
                        아래 이벤트 차트 전체에 적용
                    </div>
                </div>

                <div class="event-filter-row">
                    <select id="eventYearFilter" aria-label="이벤트 연도 필터">
                        <option value="">전체 연도</option>
                    </select>

                    <select id="eventMonthFilter" aria-label="이벤트 월 필터">
                        <option value="">전체 월</option>
                        <option value="1">1월</option>
                        <option value="2">2월</option>
                        <option value="3">3월</option>
                        <option value="4">4월</option>
                        <option value="5">5월</option>
                        <option value="6">6월</option>
                        <option value="7">7월</option>
                        <option value="8">8월</option>
                        <option value="9">9월</option>
                        <option value="10">10월</option>
                        <option value="11">11월</option>
                        <option value="12">12월</option>
                    </select>

                    <select id="eventTypeFilter" aria-label="이벤트 유형 필터">
                        <option value="">전체 유형</option>
                        <option value="FALL_DETECTED">낙상</option>
                        <option value="NO_MOTION_DETECTED">움직임 없음</option>
                        <option value="VIOLENT_MOTION_DETECTED">폭행</option>
                    </select>

                    <select id="eventStatusFilter" aria-label="이벤트 상태 필터">
                        <option value="">전체 상태</option>
                        <option value="PENDING">대기중</option>
                        <option value="CONFIRMED">수동신고</option>
                        <option value="AUTO_REPORTED">자동신고</option>
                        <option value="CLOSED">오탐지</option>
                    </select>

                    <button type="button" id="resetEventFiltersBtn" class="filter-reset-btn">초기화</button>
                </div>
            </div>

            <div id="eventStatusChart" class="chart-container"></div>
        </div>

        <div class="content-card chart-card chart-card-wide">
            <div class="section-title">
                [ 월별 이벤트 발생 추이 ]
            </div>
            <div id="monthlyTrendChart" class="chart-container"></div>
        </div>
    </div>
</div>

<script>
    google.charts.load('current', {'packages':['corechart', 'bar']});
    google.charts.setOnLoadCallback(initAdminStatsPage);

    let colors = {};
    const dashboardState = {
        userData: null,
        residentData: null,
        eventData: null,
        userError: null,
        residentError: null,
        eventError: null,
        createdAtFilters: {
            year: '',
            month: ''
        },
        eventFilters: {
            year: '',
            month: '',
            eventType: '',
            status: ''
        }
    };

    function initAdminStatsPage() {
        colors = readChartColors();
        initializeCreatedAtFilterOptions();
        initializeEventFilterOptions();
        bindCreatedAtFilterControls();
        bindEventFilterControls();
        setLoadingState();
        loadDashboardData();
    }

    function readChartColors() {
        const rootStyle = getComputedStyle(document.documentElement);
        return {
            primary: rootStyle.getPropertyValue('--navy').trim() || '#94D05C',
            primaryMid: rootStyle.getPropertyValue('--navy-mid').trim() || '#A7D673',
            primaryLight: rootStyle.getPropertyValue('--navy-light').trim() || '#f6f7ea',
            success: rootStyle.getPropertyValue('--success').trim() || '#2A8F3D',
            warning: rootStyle.getPropertyValue('--warning').trim() || '#F59E0B',
            error: rootStyle.getPropertyValue('--error').trim() || '#E03131',
            gray: rootStyle.getPropertyValue('--gray-400').trim() || '#9CA3AF',
            dark: rootStyle.getPropertyValue('--gray-900').trim() || '#1C2919',
            gridLine: rootStyle.getPropertyValue('--chart-grid-line').trim() || '#F1F5F9',
            pieGreen1: rootStyle.getPropertyValue('--chart-pie-green-1').trim() || '#C5E1A5',
            pieGreen2: rootStyle.getPropertyValue('--chart-pie-green-2').trim() || '#DCEDC8',
            pieYellow1: rootStyle.getPropertyValue('--chart-pie-yellow-1').trim() || '#FBBF24',
            pieYellow2: rootStyle.getPropertyValue('--chart-pie-yellow-2').trim() || '#FDE68A'
        };
    }

    function initializeCreatedAtFilterOptions() {
        populateYearFilterOptions('createdAtYearFilter');
    }

    function initializeEventFilterOptions() {
        populateYearFilterOptions('eventYearFilter');
    }

    function populateYearFilterOptions(selectId) {
        const yearSelect = document.getElementById(selectId);
        if (!yearSelect) {
            return;
        }

        const currentYear = new Date().getFullYear();
        for (let year = currentYear; year >= currentYear - 4; year--) {
            const option = document.createElement('option');
            option.value = String(year);
            option.textContent = `${year}년`;
            yearSelect.appendChild(option);
        }
    }

    function bindCreatedAtFilterControls() {
        const filterIds = ['createdAtYearFilter', 'createdAtMonthFilter'];

        filterIds.forEach((id) => {
            const element = document.getElementById(id);
            if (!element) {
                return;
            }

            element.addEventListener('change', () => {
                dashboardState.createdAtFilters = {
                    year: document.getElementById('createdAtYearFilter')?.value || '',
                    month: document.getElementById('createdAtMonthFilter')?.value || ''
                };
                reloadCreatedAtStats();
            });
        });

        const resetButton = document.getElementById('resetCreatedAtFiltersBtn');
        if (resetButton) {
            resetButton.addEventListener('click', resetCreatedAtFilters);
        }
    }

    function resetCreatedAtFilters() {
        const yearFilter = document.getElementById('createdAtYearFilter');
        const monthFilter = document.getElementById('createdAtMonthFilter');

        if (yearFilter) yearFilter.value = '';
        if (monthFilter) monthFilter.value = '';

        dashboardState.createdAtFilters = {
            year: '',
            month: ''
        };

        reloadCreatedAtStats();
    }

    function bindEventFilterControls() {
        const filterIds = ['eventYearFilter', 'eventMonthFilter', 'eventTypeFilter', 'eventStatusFilter'];

        filterIds.forEach((id) => {
            const element = document.getElementById(id);
            if (!element) {
                return;
            }

            element.addEventListener('change', () => {
                dashboardState.eventFilters = {
                    year: document.getElementById('eventYearFilter')?.value || '',
                    month: document.getElementById('eventMonthFilter')?.value || '',
                    eventType: document.getElementById('eventTypeFilter')?.value || '',
                    status: document.getElementById('eventStatusFilter')?.value || ''
                };
                reloadEventStats();
            });
        });

        const resetButton = document.getElementById('resetEventFiltersBtn');
        if (resetButton) {
            resetButton.addEventListener('click', resetEventFilters);
        }
    }

    function resetEventFilters() {
        const yearFilter = document.getElementById('eventYearFilter');
        const monthFilter = document.getElementById('eventMonthFilter');
        const typeFilter = document.getElementById('eventTypeFilter');
        const statusFilter = document.getElementById('eventStatusFilter');

        if (yearFilter) yearFilter.value = '';
        if (monthFilter) monthFilter.value = '';
        if (typeFilter) typeFilter.value = '';
        if (statusFilter) statusFilter.value = '';

        dashboardState.eventFilters = {
            year: '',
            month: '',
            eventType: '',
            status: ''
        };

        reloadEventStats();
    }

    function buildUserStatsUrl() {
        return buildCreatedAtStatsUrl('/api/v1/admin/stats/users');
    }

    function buildResidentStatsUrl() {
        return buildCreatedAtStatsUrl('/api/v1/admin/stats/residents');
    }

    function buildCreatedAtStatsUrl(path) {
        const params = new URLSearchParams();
        const { year, month } = dashboardState.createdAtFilters;

        if (year) {
            params.set('year', year);
        }
        if (month) {
            params.set('month', month);
        }

        const query = params.toString();
        return query ? `${path}?${query}` : path;
    }

    function buildEventStatsUrl() {
        const params = new URLSearchParams();
        const { year, month, eventType, status } = dashboardState.eventFilters;

        if (year) {
            params.set('year', year);
        }
        if (month) {
            params.set('month', month);
        }
        if (eventType) {
            params.set('eventType', eventType);
        }
        if (status) {
            params.set('status', status);
        }

        const query = params.toString();
        return query ? `/api/v1/admin/stats/events?${query}` : '/api/v1/admin/stats/events';
    }

    async function loadDashboardData() {
        const [userResult, residentResult, eventResult] = await Promise.allSettled([
            fetchStats(buildUserStatsUrl()),
            fetchStats(buildResidentStatsUrl()),
            fetchStats(buildEventStatsUrl())
        ]);

        applySectionResult('userData', 'userError', userResult);
        applySectionResult('residentData', 'residentError', residentResult);
        applySectionResult('eventData', 'eventError', eventResult);

        renderDashboard();
    }

    async function reloadCreatedAtStats() {
        setCardText('totalUsers', '濡쒕뵫以?..');
        setCardText('totalResidents', '濡쒕뵫以?..');
        document.getElementById('avgAge').innerText = '0';
        showChartMessage('userAgeChart', '?뚯썝 ?곕졊? ?곗씠?곕? 遺덈윭?ㅻ뒗 以묒엯?덈떎.');
        showChartMessage('userPurposeChart', '?뚯썝 媛??紐⑹쟻 ?곗씠?곕? 遺덈윭?ㅻ뒗 以묒엯?덈떎.');
        showChartMessage('residentAgeChart', '嫄곗＜???곗씠?곕? 遺덈윭?ㅻ뒗 以묒엯?덈떎.');

        const [userResult, residentResult] = await Promise.allSettled([
            fetchStats(buildUserStatsUrl()),
            fetchStats(buildResidentStatsUrl())
        ]);

        applySectionResult('userData', 'userError', userResult);
        applySectionResult('residentData', 'residentError', residentResult);
        renderUserSection();
        renderResidentSection();
    }

    async function reloadEventStats() {
        setCardText('totalEvents', '로딩중...');
        setCardText('falseAlarmRate', '로딩중...');
        showChartMessage('eventStatusChart', '이벤트 상태 데이터를 불러오는 중입니다.');
        showChartMessage('monthlyTrendChart', '월별 이벤트 추이를 불러오는 중입니다.');

        const [eventResult] = await Promise.allSettled([
            fetchStats(buildEventStatsUrl())
        ]);

        applySectionResult('eventData', 'eventError', eventResult);
        renderEventSection();
    }

    function applySectionResult(dataKey, errorKey, result) {
        if (result.status === 'fulfilled') {
            dashboardState[dataKey] = result.value;
            dashboardState[errorKey] = null;
            return;
        }

        dashboardState[dataKey] = null;
        dashboardState[errorKey] = result.reason instanceof Error
            ? result.reason.message
            : '데이터를 불러오지 못했습니다.';
    }

    async function fetchStats(url) {
        const response = await fetch(url, {
            method: 'GET',
            credentials: 'same-origin',
            headers: {
                'X-Requested-With': 'XMLHttpRequest',
                'Accept': 'application/json'
            }
        });

        if (response.redirected && response.url.includes('/member/login')) {
            window.location.href = '/member/login';
            throw new Error('로그인이 필요합니다.');
        }

        const contentType = (response.headers.get('content-type') || '').toLowerCase();
        const payload = contentType.includes('application/json')
            ? await response.json().catch(() => null)
            : null;

        if (!response.ok) {
            if (response.status === 403) {
                throw new Error('관리자 권한이 필요합니다.');
            }
            throw new Error(payload?.message || `통계 데이터를 불러오지 못했습니다. (${response.status})`);
        }

        if (!payload || payload.success !== true) {
            throw new Error('통계 응답 형식이 올바르지 않습니다.');
        }

        return payload;
    }

    function setLoadingState() {
        setCardText('totalUsers', '로딩중...');
        setCardText('totalResidents', '로딩중...');
        setCardText('totalEvents', '로딩중...');
        setCardText('falseAlarmRate', '로딩중...');
        document.getElementById('avgAge').innerText = '0';

        showChartMessage('userAgeChart', '회원 연령대 데이터를 불러오는 중입니다.');
        showChartMessage('userPurposeChart', '회원 가입 목적 데이터를 불러오는 중입니다.');
        showChartMessage('residentAgeChart', '거주자 데이터를 불러오는 중입니다.');
        showChartMessage('eventStatusChart', '이벤트 상태 데이터를 불러오는 중입니다.');
        showChartMessage('monthlyTrendChart', '월별 이벤트 추이를 불러오는 중입니다.');
    }

    function renderDashboard() {
        renderUserSection();
        renderResidentSection();
        renderEventSection();
    }

    function renderUserSection() {
        if (dashboardState.userError) {
            setCardText('totalUsers', '오류');
            showChartMessage('userAgeChart', dashboardState.userError);
            showChartMessage('userPurposeChart', dashboardState.userError);
            return;
        }

        const userData = normalizeUserStats(dashboardState.userData);
        setCardText('totalUsers', `${formatNumber(userData.totalUsers)}명`);
        renderSingleSeriesChart('userAgeChart', userData.ageGroups, drawUserAgeChart, '회원 연령대 데이터가 없습니다.');
        renderSingleSeriesChart('userPurposeChart', userData.purposes, drawUserPurposeChart, '회원 가입 목적 데이터가 없습니다.');
    }

    function renderResidentSection() {
        if (dashboardState.residentError) {
            setCardText('totalResidents', '오류');
            document.getElementById('avgAge').innerText = '오류';
            showChartMessage('residentAgeChart', dashboardState.residentError);
            return;
        }

        const residentData = normalizeResidentStats(dashboardState.residentData);
        setCardText('totalResidents', `${formatNumber(residentData.totalResidents)}명`);
        document.getElementById('avgAge').innerText = formatAverageAge(residentData.averageAge);
        renderSingleSeriesChart('residentAgeChart', residentData.ageGroups, drawResidentAgeChart, '거주자 연령대 데이터가 없습니다.');
    }

    function renderEventSection() {
        if (dashboardState.eventError) {
            setCardText('totalEvents', '오류');
            setCardText('falseAlarmRate', '오류');
            showChartMessage('eventStatusChart', dashboardState.eventError);
            showChartMessage('monthlyTrendChart', dashboardState.eventError);
            return;
        }

        const eventData = normalizeEventStats(dashboardState.eventData);
        setCardText('totalEvents', `${formatNumber(eventData.totalEvents)}건`);
        setCardText('falseAlarmRate', `${calculateFalseAlarmRate(eventData.totalEvents, eventData.byStatus)}%`);
        renderSingleSeriesChart('eventStatusChart', eventData.byStatus, drawEventStatusChart, '이벤트 상태 데이터가 없습니다.');
        renderMultiSeriesChart('monthlyTrendChart', eventData.monthlyTrend, drawMonthlyTrendChart, '월별 이벤트 데이터가 없습니다.');
    }

    function normalizeUserStats(data) {
        return {
            totalUsers: asNumber(data?.totalUsers),
            ageGroups: normalizeChartData(data?.ageGroups, [
                ['연령대', '인원 수']
            ]),
            purposes: normalizeChartData(data?.purposes, [
                ['이용 목적', '회원 수']
            ])
        };
    }

    function normalizeResidentStats(data) {
        return {
            totalResidents: asNumber(data?.totalResidents),
            averageAge: asNumber(data?.averageAge),
            ageGroups: normalizeChartData(data?.ageGroups, [
                ['연령대', '인원 수']
            ])
        };
    }

    function normalizeEventStats(data) {
        return {
            totalEvents: asNumber(data?.totalEvents),
            byType: normalizeChartData(data?.byType, [
                ['유형', '건수']
            ]),
            byStatus: normalizeChartData(data?.byStatus, [
                ['상태', '건수']
            ]),
            monthlyTrend: normalizeChartData(data?.monthlyTrend, [
                ['월', '낙상', '움직임 없음', '폭행']
            ])
        };
    }

    function normalizeChartData(dataArray, fallback) {
        return Array.isArray(dataArray) && dataArray.every(row => Array.isArray(row))
            ? dataArray
            : fallback;
    }

    function renderSingleSeriesChart(containerId, dataArray, drawFn, emptyMessage) {
        if (!hasChartRows(dataArray) || getNumericTotal(dataArray) === 0) {
            showChartMessage(containerId, emptyMessage);
            return;
        }

        drawChart(containerId, dataArray, drawFn);
    }

    function renderMultiSeriesChart(containerId, dataArray, drawFn, emptyMessage) {
        if (!hasChartRows(dataArray) || getNumericTotal(dataArray) === 0) {
            showChartMessage(containerId, emptyMessage);
            return;
        }

        drawChart(containerId, dataArray, drawFn);
    }

    function drawChart(containerId, dataArray, drawFn) {
        try {
            clearChartMessage(containerId);
            drawFn(dataArray);
        } catch (error) {
            console.error(`차트 렌더링 실패 (${containerId})`, error);
            showChartMessage(containerId, '차트를 그리지 못했습니다.');
        }
    }

    function hasChartRows(dataArray) {
        return Array.isArray(dataArray) && dataArray.length > 1;
    }

    function getNumericTotal(dataArray) {
        if (!Array.isArray(dataArray)) {
            return 0;
        }

        return dataArray.slice(1).reduce((total, row) => {
            if (!Array.isArray(row)) {
                return total;
            }

            const rowSum = row.slice(1).reduce((sum, value) => sum + (Number(value) || 0), 0);
            return total + rowSum;
        }, 0);
    }

    function calculateFalseAlarmRate(totalEvents, byStatus) {
        if (totalEvents === 0) {
            return '0.0';
        }

        const falseAlarmCount = findRowValue(byStatus, '오탐지');
        return ((falseAlarmCount / totalEvents) * 100).toFixed(1);
    }

    function findRowValue(dataArray, label) {
        const targetRow = Array.isArray(dataArray)
            ? dataArray.find((row, index) => index > 0 && Array.isArray(row) && row[0] === label)
            : null;
        return targetRow ? asNumber(targetRow[1]) : 0;
    }

    function showChartMessage(containerId, message) {
        const container = document.getElementById(containerId);
        if (!container) {
            return;
        }
        container.innerHTML = `<div class="chart-placeholder">${escapeHtml(message)}</div>`;
    }

    function clearChartMessage(containerId) {
        const container = document.getElementById(containerId);
        if (container) {
            container.innerHTML = '';
        }
    }

    function setCardText(elementId, text) {
        const element = document.getElementById(elementId);
        if (element) {
            element.innerText = text;
        }
    }

    function formatNumber(value) {
        return asNumber(value).toLocaleString();
    }

    function formatAverageAge(value) {
        return asNumber(value).toFixed(1);
    }

    function asNumber(value) {
        return Number.isFinite(Number(value)) ? Number(value) : 0;
    }

    function escapeHtml(value) {
        return String(value)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function drawUserAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            legend: { position: 'none' },
            colors: [colors.primaryMid],
            chartArea: { width: '80%', height: '70%' },
            vAxis: { gridlines: { color: colors.gridLine }, textStyle: { color: colors.gray } },
            hAxis: { textStyle: { color: colors.gray } },
            animation: { startup: true, duration: 800, easing: 'out' }
        };
        var chart = new google.visualization.ColumnChart(document.getElementById('userAgeChart'));
        chart.draw(data, options);
    }

    function drawUserPurposeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.5,
            colors: [colors.primary, colors.primaryMid, colors.pieGreen1, colors.pieGreen2],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right', textStyle: { color: colors.dark, fontSize: 12 } },
            pieSliceBorderColor: "none"
        };
        var chart = new google.visualization.PieChart(document.getElementById('userPurposeChart'));
        chart.draw(data, options);
    }

    function drawResidentAgeChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.5,
            colors: [colors.warning, colors.pieYellow1, colors.pieYellow2],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            pieSliceBorderColor: "none"
        };
        var chart = new google.visualization.PieChart(document.getElementById('residentAgeChart'));
        chart.draw(data, options);
    }

    function drawEventStatusChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            pieHole: 0.6,
            colors: [colors.gray, colors.success, colors.error],
            chartArea: { width: '90%', height: '90%' },
            legend: { position: 'right' },
            pieSliceText: 'none'
        };
        var chart = new google.visualization.PieChart(document.getElementById('eventStatusChart'));
        chart.draw(data, options);
    }

    function drawMonthlyTrendChart(dataArray) {
        var data = google.visualization.arrayToDataTable(dataArray);
        var options = {
            curveType: 'function',
            lineWidth: 3,
            legend: { position: 'bottom', textStyle: { color: colors.gray } },
            colors: [colors.error, colors.warning, colors.primary],
            vAxis: { minValue: 0, gridlines: { color: colors.gridLine } },
            chartArea: { width: '85%', height: '70%' },
            animation: { startup: true, duration: 800, easing: 'out' }
        };
        var chart = new google.visualization.LineChart(document.getElementById('monthlyTrendChart'));
        chart.draw(data, options);
    }

    let resizeTimer;
    window.addEventListener('resize', function() {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            renderDashboard();
        }, 250);
    });
</script>
</body>
</html>
