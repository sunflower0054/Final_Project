<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관제 사스템 - 이빈드 기록</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="logo-text">관제 사스템</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        대시보드
      </a>
      <a href="/camera" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        카메라 관리
      </a>
      <a href="/event" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        이벤트 기록
      </a>
      <a href="/status" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        통계
      </a>
      <a href="/setting" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        설정
      </a>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">이빈드 기록</h1>
      </div>
      <div class="topbar-right">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="icon-btn avatar-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>

    <!-- Filters -->
    <div class="events-filters">
      <div class="search-box">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" placeholder="검색">
      </div>
      <div class="date-filter">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        2024-04-25 · 2024-04-27
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <select class="sort-select">
        <option>최신순</option>
        <option>오래된순</option>
      </select>
    </div>

    <!-- Sub Filter Bar -->
    <div class="events-sub-bar">
      <button class="event-filter-btn red">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
        낙상 감지 3건
      </button>
      <button class="event-filter-btn orange">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
        무음담 2건
      </button>
      <button class="event-filter-btn yellow">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
        폭행 의심 1건
      </button>
      <span class="sub-spacer"></span>
      <span class="total-count">전체 6건</span>
      <span class="view-toggle">
        멍로토
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </span>
    </div>

    <!-- Event List -->
    <div class="event-list">
      <!-- Event 1 -->
      <div class="event-row-item">
        <div class="event-thumb-sm">
          <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
            <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
            <!-- fallen figure simplified -->
            <circle cx="38" cy="22" r="7" fill="#aaa"/>
            <line x1="38" y1="29" x2="28" y2="40" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="28" y1="40" x2="16" y2="36" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="28" y1="40" x2="32" y2="52" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="38" y1="29" x2="48" y2="34" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#E53935">낙상 감지</span>
            <span class="event-cam">카메라 1</span>
          </div>
          <div class="event-time">10:21</div>
          <div class="event-meta">12조 · 12조 감파</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>

      <!-- Event 2 -->
      <div class="event-row-item">
        <div class="event-thumb-sm">
          <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
            <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
            <circle cx="30" cy="18" r="7" fill="#aaa"/>
            <line x1="30" y1="25" x2="30" y2="42" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="30" y1="32" x2="20" y2="38" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="30" y1="42" x2="22" y2="54" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#F57C00">무음담</span>
            <span class="event-cam">카메라 2</span>
          </div>
          <div class="event-time">09:55</div>
          <div class="event-meta">20분 감파 · 9제존</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>

      <!-- Event 3 -->
      <div class="event-row-item">
        <div class="event-thumb-sm">
          <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
            <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
            <circle cx="22" cy="18" r="6" fill="#aaa"/>
            <circle cx="42" cy="22" r="6" fill="#aaa"/>
            <line x1="22" y1="24" x2="20" y2="40" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="42" y1="28" x2="44" y2="44" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="20" y1="33" x2="36" y2="28" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#F9A825">폭행 의심</span>
            <span class="event-cam">카메라 3</span>
          </div>
          <div class="event-time">10:15</div>
          <div class="event-meta">10린 · 7단춤 산점</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>

      <!-- Event 4 (past) -->
      <div class="event-row-item">
        <div style="position:relative">
          <div class="event-thumb-sm">
            <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
              <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
              <circle cx="38" cy="22" r="7" fill="#aaa"/>
              <line x1="38" y1="29" x2="28" y2="40" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
              <line x1="28" y1="40" x2="16" y2="36" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div style="position:absolute;top:-4px;left:-4px">
            <span class="past-badge">시전 기존</span>
          </div>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#E53935">낙상 감지</span>
            <span class="event-cam">카메라 1</span>
          </div>
          <div class="event-time">15:31</div>
          <div class="event-meta">15조 감파 · 15조 경파</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>

      <!-- Event 5 -->
      <div class="event-row-item">
        <div class="event-thumb-sm">
          <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
            <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
            <circle cx="38" cy="22" r="7" fill="#aaa"/>
            <line x1="38" y1="29" x2="28" y2="40" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            <line x1="28" y1="40" x2="16" y2="36" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#F57C00">무음담</span>
            <span class="event-cam">카메라 2</span>
          </div>
          <div class="event-time">13:24</div>
          <div class="event-meta">10분 경파 · 10발존</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>

      <!-- Event 6 (past) -->
      <div class="event-row-item">
        <div style="position:relative">
          <div class="event-thumb-sm">
            <svg class="thumb-icon" viewBox="0 0 60 60" fill="none">
              <rect width="60" height="60" fill="#D0D0D0" rx="4"/>
              <circle cx="38" cy="22" r="7" fill="#aaa"/>
              <line x1="38" y1="29" x2="28" y2="40" stroke="#aaa" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          <div style="position:absolute;top:-4px;left:-4px">
            <span class="past-badge">시전 기존</span>
          </div>
        </div>
        <div class="event-row-info">
          <div class="event-type-row">
            <span class="event-type-name" style="color:#E53935">낙상 감지</span>
            <span class="event-cam">카메라 1</span>
          </div>
          <div class="event-time">09:11</div>
          <div class="event-meta">8조 경파 · 6조 경파</div>
        </div>
        <button class="detail-btn">상세 보기 &gt;</button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
