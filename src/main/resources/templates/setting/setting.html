<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관제 시스템 - 설정</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <span class="logo-text">관제 시스템</span>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item active">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        대시보드
      </a>
      <a href="/camera" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        카메라 관리
      </a>
      <a href="/event" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        이벤트 기록
      </a>
      <a href="/status" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        통계
      </a>
      <a href="/setting" class="nav-item">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        설정
      </a>
    </nav>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="page-title">설정</h1>
      </div>
      <div class="topbar-right">
        <button class="icon-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </button>
        <button class="icon-btn avatar-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
      </div>
    </header>

    <!-- Settings Tabs -->
    <div class="settings-tabs">
      <div class="tab active">일반 설정</div>
      <div class="tab">알림 설정</div>
      <div class="tab">AI 감지 설정</div>
      <div class="tab">시스템 관리</div>
    </div>

    <div class="settings-body">
      <!-- 일반 설정 -->
      <div class="settings-section">
        <div class="section-title">일반 설정</div>
        <div class="settings-card">
          <div class="settings-row">
            <span class="settings-label">관제소 이름</span>
            <input type="text" class="settings-input" value="스마트 관제 센터">
          </div>
          <div class="settings-row">
            <span class="settings-label">시간대</span>
            <select class="settings-select">
              <option>(UTC+09:00) 서울, 도쿄</option>
            </select>
            <span class="settings-label" style="min-width:40px;margin-left:16px">언어</span>
            <select class="settings-select">
              <option>한국어</option>
            </select>
          </div>
          <div class="settings-row">
            <span class="settings-label">이벤트 보관 기간</span>
            <select class="settings-select">
              <option>30일</option>
              <option>60일</option>
              <option>90일</option>
            </select>
          </div>
          <div class="save-row">
            <button class="btn-primary" style="padding:8px 20px;font-size:12px;border-radius:6px;width:auto;flex:none">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:5px"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
              저장하기
            </button>
          </div>
        </div>
      </div>

      <!-- 알림 설정 -->
      <div class="settings-section">
        <div class="section-title">알림 설정</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="settings-card">
            <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0">
              <label class="toggle">
                <input type="checkbox" checked>
                <div class="toggle-track"><div class="toggle-thumb"></div></div>
                <span class="toggle-label">이메일 알림</span>
              </label>
            </div>
            <div class="settings-row">
              <span class="settings-label">이메일 주소</span>
              <input type="text" class="settings-input" value="admin@security.com">
            </div>
            <label class="checkbox-item"><input type="checkbox" checked> 낙상 감지 알림</label>
            <label class="checkbox-item"><input type="checkbox" checked> 무음담 감지 알림</label>
            <label class="checkbox-item" style="padding-bottom:12px"><input type="checkbox" checked> 폭행 감지 알림</label>
          </div>
          <div class="settings-card">
            <div style="padding:12px 16px;border-bottom:1px solid #f0f0f0">
              <label class="toggle">
                <input type="checkbox" checked>
                <div class="toggle-track"><div class="toggle-thumb"></div></div>
                <span class="toggle-label">SMS 알림</span>
              </label>
            </div>
            <div class="settings-row">
              <span class="settings-label">전화번호</span>
              <input type="text" class="settings-input" value="010-1234-5678">
            </div>
            <label class="checkbox-item"><input type="checkbox" checked> 긴급 이벤트만 수신</label>
            <label class="checkbox-item" style="padding-bottom:12px"><input type="checkbox"> 일일 요약 리포트 수신</label>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-row">
            <span class="settings-label">알림 쿨다운 시간</span>
            <select class="settings-select">
              <option>5분 (권장)</option>
              <option>10분</option>
              <option>30분</option>
            </select>
            <span style="font-size:11px;color:#999;margin-left:8px">동일 이벤트 반복 알림 간격</span>
            <div style="flex:1"></div>
            <button class="btn-secondary" style="font-size:12px;padding:7px 14px;white-space:nowrap;display:flex;align-items:center;gap:5px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/></svg>
              테스트 알림 발송
            </button>
          </div>
        </div>
      </div>

      <!-- AI 감지 설정 -->
      <div class="settings-section">
        <div class="section-title">AI 감지 설정</div>
        <div class="settings-card">
          <div class="slider-row">
            <div class="slider-icon red">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            </div>
            <span class="slider-name">낙상 감지 민감도</span>
            <input type="range" min="0" max="1" step="0.1" value="0.7" style="accent-color:#E53935">
            <span class="slider-val">0.7</span>
          </div>
          <div class="slider-row">
            <div class="slider-icon orange">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            </div>
            <span class="slider-name">무음담 감지 시간</span>
            <input type="range" min="0" max="60" step="1" value="15" style="accent-color:#F57C00">
            <span class="slider-val">15초</span>
          </div>
          <div class="slider-row">
            <div class="slider-icon yellow">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
            </div>
            <span class="slider-name">폭행 의심 임계값</span>
            <input type="range" min="0" max="1" step="0.1" value="0.4" style="accent-color:#F9A825">
            <span class="slider-val">0.4</span>
          </div>
          <div style="display:flex;justify-content:flex-end;padding:10px 16px;border-top:1px solid #f0f0f0">
            <button class="btn-secondary" style="font-size:12px;padding:7px 14px;display:flex;align-items:center;gap:5px">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.93"/></svg>
              기본값으로 초기화
            </button>
          </div>
        </div>
      </div>

      <!-- 시스템 관리 -->
      <div class="settings-section">
        <div class="section-title">시스템 관리</div>
        <div class="settings-card">
          <div class="mgmt-row">
            <span class="mgmt-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <span class="mgmt-label">비밀번호 변경</span>
            <button class="btn-mgmt">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
              변경
            </button>
          </div>
          <div class="mgmt-row">
            <span class="mgmt-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></span>
            <span class="mgmt-label">데이터 백업</span>
            <button class="btn-mgmt">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              백업하기
            </button>
          </div>
          <div class="mgmt-row">
            <span class="mgmt-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></span>
            <span class="mgmt-label">설정 복원</span>
            <button class="btn-mgmt">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              파일 선택
            </button>
          </div>
          <div class="mgmt-row">
            <span class="mgmt-icon" style="color:#E53935"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></span>
            <span class="mgmt-label danger">전체 로그 삭제</span>
            <button class="btn-mgmt danger">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
              삭제
            </button>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <div class="settings-footer">
        <span class="footer-note">마지막 저장: 2024-04-24 14:30:25</span>
        <button class="btn-secondary" style="font-size:12px;padding:9px 16px">취소</button>
        <button class="btn-primary" style="font-size:12px;padding:9px 20px;border-radius:6px;width:auto;flex:none;display:flex;align-items:center;gap:5px">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/></svg>
          모든 설정 저장
        </button>
      </div>
    </div>
  </div>
</div>
</body>
</html>
