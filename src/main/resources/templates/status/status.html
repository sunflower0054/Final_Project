<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관제 사스템 - 동계</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-wrapper">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo-icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span class="logo-text">관제 사스템</span>
        </div>
        <nav class="sidebar-nav">
            <a href="/" class="nav-item active">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                대시보드
            </a>
            <a href="/camera" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                카메라 관리
            </a>
            <a href="/event" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                이벤트 기록
            </a>
            <a href="/status" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
                통계
            </a>
            <a href="/setting" class="nav-item">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                설정
            </a>
        </nav>
    </aside>

    <div class="main-content">
        <header class="topbar">
            <div class="topbar-left">
                <button class="menu-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                </button>
                <h1 class="page-title">등계</h1>
            </div>
            <div class="topbar-right">
                <button class="icon-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                </button>
                <button class="icon-btn avatar-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                </button>
            </div>
        </header>

        <div class="page-body">
            <!-- Alert Cards -->
            <div class="alert-cards">
                <div class="alert-card alert-red">
                    <div class="alert-icon red"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">낙상 감지</div>
                        <div class="alert-count">4<span>건</span></div>
                    </div>
                </div>
                <div class="alert-card alert-orange">
                    <div class="alert-icon orange"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">무음담</div>
                        <div class="alert-count">6<span>건</span></div>
                    </div>
                </div>
                <div class="alert-card alert-yellow">
                    <div class="alert-icon yellow"><svg width="14" height="14" viewBox="0 0 24 24" fill="white" stroke="white" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg></div>
                    <div class="alert-info">
                        <div class="alert-label">폭행 의심</div>
                        <div class="alert-count">3<span>건</span></div>
                    </div>
                </div>
            </div>

            <!-- Charts Row -->
            <div class="content-grid">
                <!-- Line Chart -->
                <div class="card">
                    <div class="card-header-plain">주간 이빈드 발생 추이</div>
                    <div class="chart-area">
                        <svg class="chart-svg" viewBox="0 0 500 180" xmlns="http://www.w3.org/2000/svg">
                            <!-- Grid lines -->
                            <line x1="40" y1="20" x2="490" y2="20" stroke="#eee" stroke-width="1"/>
                            <line x1="40" y1="55" x2="490" y2="55" stroke="#eee" stroke-width="1"/>
                            <line x1="40" y1="90" x2="490" y2="90" stroke="#eee" stroke-width="1"/>
                            <line x1="40" y1="125" x2="490" y2="125" stroke="#eee" stroke-width="1"/>
                            <line x1="40" y1="160" x2="490" y2="160" stroke="#eee" stroke-width="1"/>

                            <!-- Y labels -->
                            <text x="30" y="24" text-anchor="end" fill="#999" font-size="11">6</text>
                            <text x="30" y="59" text-anchor="end" fill="#999" font-size="11">4</text>
                            <text x="30" y="94" text-anchor="end" fill="#999" font-size="11">2</text>
                            <text x="30" y="164" text-anchor="end" fill="#999" font-size="11">0</text>

                            <!-- Red line (낙상 감지) -->
                            <polyline points="50,140 110,90 170,55 220,90 280,90 340,90 390,70 440,20 490,55"
                                      fill="none" stroke="#E53935" stroke-width="2" stroke-linejoin="round"/>

                            <!-- Orange line (무음담) -->
                            <polyline points="50,155 110,145 170,145 220,145 280,145 340,140 390,125 440,90 490,125"
                                      fill="none" stroke="#F57C00" stroke-width="2" stroke-linejoin="round" stroke-dasharray="5,3"/>

                            <!-- Dots red -->
                            <circle cx="50" cy="140" r="3" fill="#E53935"/>
                            <circle cx="110" cy="90" r="3" fill="#E53935"/>
                            <circle cx="170" cy="55" r="3" fill="#E53935"/>
                            <circle cx="220" cy="90" r="3" fill="#E53935"/>
                            <circle cx="280" cy="90" r="3" fill="#E53935"/>
                            <circle cx="340" cy="90" r="3" fill="#E53935"/>
                            <circle cx="390" cy="70" r="3" fill="#E53935"/>
                            <circle cx="440" cy="20" r="4" fill="#E53935"/>
                            <circle cx="490" cy="55" r="3" fill="#E53935"/>

                            <!-- Dots orange -->
                            <circle cx="50" cy="155" r="3" fill="#F57C00"/>
                            <circle cx="440" cy="90" r="3" fill="#F57C00"/>
                            <circle cx="490" cy="125" r="3" fill="#F57C00"/>

                            <!-- X labels -->
                            <text x="50" y="175" text-anchor="middle" fill="#999" font-size="10">18</text>
                            <text x="110" y="175" text-anchor="middle" fill="#999" font-size="10">18</text>
                            <text x="170" y="175" text-anchor="middle" fill="#999" font-size="10">19</text>
                            <text x="220" y="175" text-anchor="middle" fill="#999" font-size="10">20</text>
                            <text x="280" y="175" text-anchor="middle" fill="#999" font-size="10">21</text>
                            <text x="340" y="175" text-anchor="middle" fill="#999" font-size="10">22</text>
                            <text x="390" y="175" text-anchor="middle" fill="#999" font-size="10">22</text>
                            <text x="440" y="175" text-anchor="middle" fill="#999" font-size="10">23</text>
                            <text x="490" y="175" text-anchor="middle" fill="#999" font-size="10">24</text>
                        </svg>

                        <!-- Legend -->
                        <div style="display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:11px;">
              <span style="display:flex;align-items:center;gap:5px;color:#666">
                <span style="width:20px;height:2px;background:#E53935;display:inline-block;"></span>
                낙상 감지
              </span>
                            <span style="display:flex;align-items:center;gap:5px;color:#666">
                <span style="width:20px;height:2px;background:#F57C00;display:inline-block;"></span>
                무음담
              </span>
                            <span style="display:flex;align-items:center;gap:5px;color:#666">
                <span style="width:20px;height:2px;background:#E53935;display:inline-block;opacity:0.5"></span>
                폭행 의심
              </span>
                        </div>
                    </div>
                </div>

                <!-- Donut Chart -->
                <div class="card">
                    <div class="card-header-plain">이빈드 유형 비율</div>
                    <div style="display:flex;flex-direction:column;align-items:center;padding:16px">
                        <svg viewBox="0 0 120 120" width="130" height="130">
                            <!-- Background circle -->
                            <circle cx="60" cy="60" r="45" fill="none" stroke="#eee" stroke-width="18"/>
                            <!-- Red segment 40% -->
                            <circle cx="60" cy="60" r="45" fill="none" stroke="#E53935" stroke-width="18"
                                    stroke-dasharray="113.1 169.6" stroke-dashoffset="0"
                                    transform="rotate(-90 60 60)"/>
                            <!-- Orange segment 36.8% -->
                            <circle cx="60" cy="60" r="45" fill="none" stroke="#F57C00" stroke-width="18"
                                    stroke-dasharray="104.0 178.7" stroke-dashoffset="-113.1"
                                    transform="rotate(-90 60 60)"/>
                            <!-- Yellow segment 23.2% -->
                            <circle cx="60" cy="60" r="45" fill="none" stroke="#F9A825" stroke-width="18"
                                    stroke-dasharray="65.6 217.1" stroke-dashoffset="-217.1"
                                    transform="rotate(-90 60 60)"/>
                            <text x="60" y="56" text-anchor="middle" font-size="13" font-weight="700" fill="#333">40.0%</text>
                            <text x="60" y="70" text-anchor="middle" font-size="9" fill="#999">40.0%</text>
                        </svg>
                        <div class="legend-list" style="width:100%;padding:0 10px">
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#E53935"></div>
                                <span class="legend-label">낙상 감지</span>
                                <span class="legend-val">40.0%</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#F57C00"></div>
                                <span class="legend-label">무음담</span>
                                <span class="legend-val">36.8%</span>
                            </div>
                            <div class="legend-item">
                                <div class="legend-dot" style="background:#F9A825"></div>
                                <span class="legend-label">폭행 의심</span>
                                <span class="legend-val">23.2%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bottom Row -->
            <div class="content-grid">
                <!-- Camera Table -->
                <div class="card">
                    <div class="card-header-plain">카메라 벌 감지 동계</div>
                    <div style="padding:14px">
                        <table class="camera-table">
                            <thead>
                            <tr>
                                <th></th>
                                <th>
                    <span style="display:inline-flex;align-items:center;gap:4px">
                      <span style="width:14px;height:14px;background:#E53935;border-radius:3px;display:inline-flex;align-items:center;justify-content:center">
                        <svg width="8" height="8" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                      </span>
                      낙상 감지
                    </span>
                                </th>
                                <th>
                    <span style="display:inline-flex;align-items:center;gap:4px">
                      <span style="width:14px;height:14px;background:#F57C00;border-radius:3px;display:inline-flex;align-items:center;justify-content:center">
                        <svg width="8" height="8" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                      </span>
                      무음담
                    </span>
                                </th>
                                <th>
                    <span style="display:inline-flex;align-items:center;gap:4px">
                      <span style="width:14px;height:14px;background:#F9A825;border-radius:3px;display:inline-flex;align-items:center;justify-content:center">
                        <svg width="8" height="8" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                      </span>
                      폭행 의심
                    </span>
                                </th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td>카메라 1</td>
                                <td class="val-red">5</td>
                                <td>2</td>
                                <td>1</td>
                            </tr>
                            <tr>
                                <td>카메라 2</td>
                                <td class="val-red">3</td>
                                <td>2</td>
                                <td>0</td>
                            </tr>
                            <tr>
                                <td>카메라 3</td>
                                <td class="val-red">1</td>
                                <td>1</td>
                                <td>2</td>
                            </tr>
                            <tr>
                                <td>
                                    카메라 4
                                    <span class="off-dot"><span></span><span></span></span>
                                </td>
                                <td style="color:#bbb">OFF</td>
                                <td style="color:#bbb">—</td>
                                <td style="color:#bbb">—</td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Event Type Ratio List -->
                <div class="card">
                    <div class="card-header-plain">이빈드 유형 비율</div>
                    <div style="padding:14px;display:flex;flex-direction:column;gap:10px">
                        <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:#FFEBEE">
                            <div style="width:22px;height:22px;background:#E53935;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                            </div>
                            <span style="flex:1;font-size:12px;font-weight:600;color:#333">낙상 감지</span>
                            <span style="font-size:13px;font-weight:700;color:#E53935">40.0%</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:#FFF3E0">
                            <div style="width:22px;height:22px;background:#F57C00;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                            </div>
                            <span style="flex:1;font-size:12px;font-weight:600;color:#333">무음담</span>
                            <span style="font-size:13px;font-weight:700;color:#F57C00">36.8%</span>
                        </div>
                        <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:8px;background:#FFFDE7">
                            <div style="width:22px;height:22px;background:#F9A825;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                                <svg width="10" height="10" viewBox="0 0 24 24" fill="white"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
                            </div>
                            <span style="flex:1;font-size:12px;font-weight:600;color:#333">폭행 의심</span>
                            <span style="font-size:13px;font-weight:700;color:#F9A825">23.2%</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
