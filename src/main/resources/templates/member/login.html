<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <link rel="stylesheet" th:href="@{/css/member_style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body class="login-page">

<!-- 새로 만든 wrapper로 감싸기 -->
<div class="login-wrapper">

    <div class="logo">늘 봄</div>

    <div class="login-box">

        <div class="input-group">
            <input type="text" class="input-box" placeholder="아이디" aria-label="아이디">
            <input type="password" class="input-box" placeholder="비밀번호" aria-label="비밀번호">
        </div>

        <button class="login-btn">로그인</button>

        <div class="login-links">
            <a href="#">비밀번호 찾기</a>
            <span class="divider">|</span>
            <a href="/member/register">회원가입</a>
        </div>

    </div>

    <div class="footer-text">
        JA · VA Monitoring System
    </div>

</div>

</body>
</html>
