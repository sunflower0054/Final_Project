<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ══════════════════════════════════
           CSS 변수 정의 (회원가입과 통일)
        ══════════════════════════════════ */
        :root {
          /* 산뜻하고 부드러운 네이비 톤 */
          --navy:        #3B5B9D;
          --navy-mid:    #4E71B8;
          --navy-light:  #F0F4FB;
          --accent:      #2563EB; /* 강조용 블루 */
          --accent-hover:#1D4ED8;
          --gray-200: #E2E8F0; /* 아주 연한 테두리 */
          --gray-300: #CBD5E1; /* 연한 테두리 */
          --gray-400: #94A3B8; /* 플레이스홀더 */
          --gray-500: #64748B; /* 부제목, 일반 텍스트 */
          --gray-700: #334155; /* 부가 텍스트 */
          --gray-800: #1E293B; /* 서브 타이틀 */
          --gray-900: #0F172A; /* 메인 텍스트 */
          --radius-sm: 8px; /* 카드 및 버튼 곡률 */
        }

        * {
            box-sizing: border-box;
            font-family: 'Noto Sans KR', sans-serif;
            margin: 0; padding: 0;
        }

        body {
            /* 배경을 아주 연한 회색으로 설정하여 하얀 카드가 돋보이면서도 떠보이지 않게 */
            background: var(--gray-100);
            color: var(--gray-900);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.5;
            padding: 20px;
        }

        /* 전체 컨테이너 */
        .login-container {
            width: 100%;
            max-width: 460px; /* 회원가입 카드와 동일한 너비 */
            text-align: center;
        }

        /* ══════════════════════════════════
           로고 (화면 중앙 상단 배치)
        ══════════════════════════════════ */
        .logo {
            font-size: 38px;
            font-weight: 900;
            color: var(--navy); /* 연해진 네이비 톤 적용 */
            margin-bottom: 30px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* ══════════════════════════════════
           로그인 카드 (네이버 스타일)
        ══════════════════════════════════ */
        .login-box {
            background: #FFFFFF; /* 하얀색 카드 */
            border: 1px solid var(--gray-300); /* 그림자 대신 얇은 테두리 */
            border-radius: var(--radius-sm);
            padding: 40px 32px;
        }

        /* 폼 그룹 */
        .input-group {
            margin-top: 10px;
        }

        /* 입력 상자 공통 */
        .input-box {
            width: 100%;
            height: 48px; /* 입력창 높이 통일 */
            padding: 0 14px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            margin-bottom: 10px;
            font-size: 14px;
            color: var(--gray-900);
            background: #fff;
            outline: none;
            transition: border-color 0.15s;
        }

        .input-box::placeholder {
            color: var(--gray-400);
        }

        /* 포커스 시 테두리 색상 변경 (강조 블루) */
        .input-box:focus {
            border-color: var(--accent);
        }

        /* ══════════════════════════════════
           버튼 및 링크
        ══════════════════════════════════ */

        /* 로그인 버튼 */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: var(--navy); /* 연해진 네이비 톤 적용 */
            color: #fff;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.15s;
            margin-top: 16px;
        }

        .login-btn:hover {
            background: var(--navy-mid);
        }

        /* 하단 링크 영역 */
        .login-links {
            margin-top: 20px;
            font-size: 13px;
            color: var(--gray-500);
            display: flex;
            justify-content: center;
            gap: 10px; /* 구분선 대체 */
        }

        .login-links a {
            color: var(--navy); /* 연해진 네이비 톤 적용 */
            text-decoration: none;
            font-weight: 700;
        }

        .login-links a:hover {
            text-decoration: underline;
        }

        /* 구분선 스타일 */
        .login-links .divider {
            color: var(--gray-300);
        }

        /* ══════════════════════════════════
           하단 안내 텍스트
        ══════════════════════════════════ */
        .footer-text {
            margin-top: 30px;
            font-size: 12px;
            color: var(--gray-500);
            letter-spacing: -0.3px;
        }
    </style>

</head>

<body>

<div class="login-container">

    <div class="logo">골든노미스</div>

    <div class="login-box">

        <div class="input-group">
            <input type="text" class="input-box" placeholder="아이디" aria-label="아이디">
            <input type="password" class="input-box" placeholder="비밀번호" aria-label="비밀번호">
        </div>

        <button class="login-btn">로그인</button>

        <div class="login-links">
            <a href="#">비밀번호 찾기</a>
            <span class="divider">|</span>
            <a href="/member/register">회원가입</a>
        </div>

    </div>

    <div class="footer-text">
        JA · VA Monitoring System
    </div>

</div>

</body>
</html>
