<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[TEST] 119 신고 페이지 - eventId=999</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #94D05C; --success: #2A8F3D; --success-bg: #DCFCE7;
            --error: #E03131; --error-bg: #FFF5F5; --gray-200: #E1E3D3;
            --gray-500: #5A626F; --gray-600: #4B5563; --gray-900: #1C2919;
            --radius: 16px;
        }
        * { box-sizing: border-box; margin:0; padding:0; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f6f7ea; padding: 40px 20px; }

        .report-result-layout { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 24px; }
        .banner-card { background: #fff; border-radius: var(--radius); padding: 32px; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .success-banner { border: 1px solid var(--success); }
        .auto-banner { border: 2px solid var(--error); }
        .banner-icon-wrap { width: 64px; height: 64px; border-radius: 50%; margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; }
        .success-text { color: var(--success); font-size: 24px; font-weight: 800; }
        .error-text { color: var(--error); font-size: 24px; font-weight: 800; }

        .sms-preview-card, .map-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; }
        .sms-bubble { background: #F1F5F9; border-radius: 12px; padding: 20px; font-size: 15px; line-height: 1.6; border-left: 4px solid var(--navy); white-space: pre-wrap; }
        .map-wrap { width: 100%; height: 350px; background: #E2E8F0; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 17px; color: #555; }
        .emergency-call-card { background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 12px; padding: 24px; text-align: center; }
        .btn-119 { display: inline-flex; align-items: center; gap: 8px; background: var(--error); color: white; padding: 14px 28px; border-radius: 8px; font-weight: 800; font-size: 18px; text-decoration: none; }
        .bottom-actions { text-align: center; padding-top: 16px; }
        .btn-home { background: var(--navy); color: white; padding: 14px 32px; border-radius: 12px; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

<div class="report-result-layout" id="container"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const type = params.get('type') || 'manual';                    // manual, auto, fail
    const address = params.get('address') || '충남 천안시 서북구 불당동 123-45';
    const residentName = '김순자';
    const age = 78;
    const disease = '고혈압, 당뇨';
    const phone = '010-1234-5678';
    const reporterPhone = '010-8376-3942';

    const smsText = `[긴급신고] ${type === 'auto' ? '무응답' : '낙상'} 감지\n`
                 + `이름: ${residentName} / ${age}세\n`
                 + `기저질환: ${disease}\n`
                 + `주소: ${address}\n`
                 + `거주자 연락처: ${phone}\n`
                 + `신고자 연락처: ${reporterPhone}`;

    let html = '';

    if (type === 'manual') {
        html = `
            <div class="banner-card success-banner">
                <div class="banner-icon-wrap"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg></div>
                <h2 class="success-text">119 신고 완료</h2>
                <p style="color: var(--gray-600); font-size: 16px;">관제 센터에서 119 상황실로 문자를 성공적으로 발송했습니다.</p>
            </div>`;
    } else if (type === 'auto') {
        html = `
            <div class="banner-card auto-banner">
                <div class="banner-icon-wrap"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <h2 class="error-text">119 자동 신고 완료</h2>
                <p style="color: var(--gray-600); font-size: 16px;">관제 센터에서 10분간 응답이 없어, 시스템이 <strong>자동으로 119에 문자를 접수</strong>했습니다.</p>
            </div>
            <div class="emergency-call-card" style="display:block;">
                <p style="color:#991B1B;font-weight:600;font-size:15px;margin-bottom:16px;">⚠️ 문자 접수가 지연되거나 통신사 문제로 누락되었을 수 있습니다.<br>안전을 위해 아래 버튼을 눌러 직접 119 상황실에 전화로 확인해 주세요.</p>
                <a href="tel:119" class="btn-119">119 바로 전화하기</a>
            </div>`;
    } else if (type === 'fail') {
        html = `
            <div class="banner-card auto-banner">
                <div class="banner-icon-wrap"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
                <h2 class="error-text">119 신고 실패</h2>
                <p style="color: var(--gray-600); font-size: 16px;">관제 센터에서 119 상황실로 문자를 발송하지 못했습니다.<br>안전을 위해 아래 버튼을 눌러 직접 전화해 주세요.</p>
            </div>`;
    }

    html += `
        <div class="sms-preview-card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;${type==='fail'?'color:var(--error)':''}">
                ${type==='fail' ? '발송 실패 안내' : '발송된 문자 내용'}
            </h3>
            <div class="sms-bubble">${smsText}</div>
        </div>

        <div class="map-card">
            <h3 style="font-size:18px;font-weight:700;margin-bottom:16px;">사고 발생 위치 & 주변 응급실 정보</h3>
            <div class="map-wrap">📍 ${address}<br><br>(실제 배포 시 카카오맵이 표시됩니다)</div>
        </div>

        <div class="bottom-actions">
            <a href="#" onclick="alert('관제 화면으로 이동합니다 (테스트)')" class="btn-home">관제 화면(Home)으로 돌아가기</a>
        </div>`;

    document.getElementById('container').innerHTML = html;

    console.log('%c✅ 테스트 페이지 로드 완료! eventId=999 시뮬레이션', 'color:#2A8F3D;font-size:16px;font-weight:bold');
</script>
</body>
</html>
