<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="unsafe-url" />
    <title>관제 시스템 - 119 신고 완료</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=05dea7c839bf99daaa3a652b70da85fe&libraries=services"></script>

    <style>
        .report-result-layout {
            display: flex; flex-direction: column; gap: 24px;
            max-width: 900px; margin: 0 auto; padding-bottom: 40px;
        }

        /* 공통 배너 스타일 */
        .banner-card {
            background: #fff; border-radius: var(--radius); padding: 32px;
            text-align: center; display: none; /* 기본 숨김, JS에서 제어 */
        }
        .banner-icon-wrap {
            width: 64px; height: 64px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;
        }

        /* 수동 신고 (Success) 스타일 */
        .success-banner { border: 1px solid var(--success); box-shadow: 0 4px 20px rgba(5, 150, 105, 0.08); }
        .success-banner .banner-icon-wrap { background: var(--success-bg); color: var(--success); }
        .success-text { color: var(--success); }

        /* 자동 신고 (Error/Auto) 스타일 */
        .auto-banner { border: 2px solid var(--error); box-shadow: 0 4px 20px rgba(220, 38, 38, 0.1); }
        .auto-banner .banner-icon-wrap { background: var(--error-bg); color: var(--error); }
        .error-text { color: var(--error); }

        /* 119 전화하기 경고 박스 (자동 신고 전용) */
        .emergency-call-card {
            background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 12px;
            padding: 24px; text-align: center; display: none; /* 기본 숨김 */
        }
        .btn-119 {
            display: inline-flex; align-items: center; gap: 8px; background: var(--error); color: white;
            padding: 14px 28px; border-radius: 8px; font-weight: 800; font-size: 18px;
            text-decoration: none; transition: 0.2s; box-shadow: 0 4px 12px rgba(220, 38, 38, 0.3);
        }
        .btn-119:hover { background: #B91C1C; transform: translateY(-2px); }

        /* 문자 내용 미리보기 */
        .sms-preview-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; }
        .sms-bubble {
            background: #F1F5F9; border-radius: 12px; padding: 20px; font-size: 15px;
            color: var(--gray-900); line-height: 1.6; border-left: 4px solid var(--navy); white-space: pre-wrap;
        }

        /* 지도 및 병원 리스트 */
        .map-card { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: 24px; }
        .map-wrap { width: 100%; height: 350px; background: #E2E8F0; border-radius: 12px; margin-bottom: 16px; }
        .hospital-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
        .hospital-item { display: flex; justify-content: space-between; align-items: center; padding: 16px; border: 1px solid var(--gray-200); border-radius: 12px; }
        .h-info { display: flex; flex-direction: column; gap: 4px; }
        .h-name { font-weight: 700; color: var(--gray-900); font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .h-dist { font-size: 13px; color: var(--success); font-weight: 600; background: var(--success-bg); padding: 2px 8px; border-radius: 4px; }
        .h-tel { font-size: 14px; color: var(--gray-500); }
        .h-call-btn {
            display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px;
            background: var(--gray-100); color: var(--gray-700); font-size: 14px; font-weight: 600; text-decoration: none; border: 1px solid var(--gray-200);
        }

        .bottom-actions { text-align: center; padding-top: 16px; }
        .btn-home {
            display: inline-flex; align-items: center; gap: 8px; background: var(--navy); color: white;
            padding: 14px 32px; border-radius: 12px; font-weight: 600; text-decoration: none;
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="main-content" style="padding: 40px 20px;">
        <div class="report-result-layout">

            <div id="manual-banner" class="banner-card success-banner">
                <div class="banner-icon-wrap">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h2 class="success-text" style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">119 신고 완료</h2>
                <p style="color: var(--gray-600); font-size: 16px;">관제 센터에서 119 상황실로 문자를 성공적으로 발송했습니다.</p>
            </div>

            <div id="auto-banner" class="banner-card auto-banner">
                <div class="banner-icon-wrap">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                </div>
                <h2 class="error-text" style="font-size: 24px; font-weight: 800; margin-bottom: 8px;">119 자동 신고 완료</h2>
                <p style="color: var(--gray-600); font-size: 16px;">관제 센터에서 10분간 응답이 없어, 시스템이 <strong>자동으로 119에 문자를 접수</strong>했습니다.</p>
            </div>

            <div class="sms-preview-card">
                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;">발송된 문자 내용</h3>
                <div class="sms-bubble" id="sms-content">
                    데이터를 불러오는 중입니다...
                </div>
            </div>

            <div id="emergency-call-card" class="emergency-call-card">
                <p style="color: #991B1B; font-weight: 600; font-size: 15px; margin-bottom: 16px;">
                    ⚠️ 문자 접수가 지연되거나 통신사 문제로 누락되었을 수 있습니다.<br>안전을 위해 아래 버튼을 눌러 직접 119 상황실에 전화로 확인해 주세요.
                </p>
                <a href="tel:119" class="btn-119">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                    119 바로 전화하기
                </a>
            </div>

            <div class="map-card">
                <h3 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;">사고 발생 위치 & 주변 응급실 정보</h3>
                <div class="map-wrap" id="map"></div>
                <ul class="hospital-list" id="hospital-list"></ul>
            </div>

            <div class="bottom-actions">
                <a href="/index/index" class="btn-home">관제 화면(Home)으로 돌아가기</a>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        // 1. AJAX 통신으로 데이터 가져오기 (초기 로드 시 실행)
        loadReportDataViaAjax();

        function loadReportDataViaAjax() {
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('type') || 'manual'; // 'auto' 또는 'manual'
            const residentId = urlParams.get('residentId'); // ★ ID만 받습니다.


// ==========================================
// [테스트 전용 로직] ID가 '999'일 경우 가짜 데이터 렌더링
// ==========================================
if (residentId === '999') {
    // 1. URL에서 address 파라미터 값을 가져옵니다.
    // (만약 함수 최상단에 이미 선언해두셨다면 이 두 줄은 생략하셔도 됩니다)
    const urlParams = new URLSearchParams(window.location.search);
    const addressParam = urlParams.get('address');

    const mockData = {
        type: typeParam,
        event: typeParam === 'auto' ? '낙상 의심 (10분 미확인 자동 신고)' : '낙상 감지 (관제 센터 수동 신고)',
        name: '테스트 거주자',
        age: 82,
        disease: '고혈압, 관절염',

        // 2. 하드코딩된 주소 대신 addressParam을 사용하도록 수정합니다.
        // URL에 값이 있으면 그 값을 사용하고, 없으면 뒤의 기본값(강남역)을 사용합니다.
        address: addressParam || '서울 강남구 테헤란로 152',

        reporter: typeParam === 'auto' ? '010-1234-5678 (스마트 관제 시스템)' : '010-1234-5678 (스마트 관제 센터)'
    };
    renderUI(mockData);
    return; // 여기서 함수를 종료하여 아래 fetch(서버 요청)를 실행하지 않음
}
// ==========================================


            if (residentId) {
                // 1. 전달받은 ID로 DB에서 거주자 정보 조회
                fetch(`/api/residents/${residentId}`)
                    .then(response => {
                        if (!response.ok) throw new Error("데이터 조회 실패");
                        return response.json();
                    })
                    .then(dbData => {
                        // 2. 나이 계산
                        let calcAge = "미상";
                        if (dbData.birthDate) {
                            const birthYear = parseInt(dbData.birthDate.split('-')[0]);
                            calcAge = new Date().getFullYear() - birthYear + 1;
                        }

                        // 3. 기저질환 배열 -> 문자열 변환
                        let diseases = "없음";
                        if (dbData.underlyingDiseases && dbData.underlyingDiseases.length > 0) {
                            diseases = dbData.underlyingDiseases.join(", ");
                        }

                        // 4. 화면에 뿌려줄 데이터 최종 조립
                        const reportData = {
                            type: typeParam,
                            event: typeParam === 'auto' ? '낙상 의심 (10분 미확인 자동 신고)' : '낙상 감지 (관제 센터 수동 신고)',
                            name: dbData.name || '알 수 없음',
                            age: calcAge,
                            disease: diseases,
                            address: dbData.address || '주소 정보 없음',
                            reporter: typeParam === 'auto' ? '010-1234-5678 (스마트 관제 시스템)' : '010-1234-5678 (스마트 관제 센터)'
                        };

                        // 5. 화면 렌더링
                        renderUI(reportData);
                    })
                    .catch(error => {
                        console.error("API 연동 에러:", error);
                        document.getElementById('sms-content').innerHTML = `<span style="color:red">거주자 정보를 불러오지 못했습니다. (ID: ${residentId})</span>`;
                    });
            } else {
                document.getElementById('sms-content').innerHTML = `<span style="color:red">잘못된 접근입니다. (거주자 ID 누락)</span>`;
            }
        }

        // [테스트용 폴백 함수] API가 안 붙었을 때 화면 깨짐 방지
        function renderTestUI(typeParam) {
            const mockData = {
                type: typeParam,
                event: typeParam === 'auto' ? '낙상 의심 (10분 미확인)' : '낙상 감지',
                name: '테스트환자',
                age: '82',
                disease: '고혈압, 관절염',
                address: '서울 마포구 양화로 45',
                reporter: '010-1234-5678'
            };
            renderUI(mockData);
        }

        // 2. 받아온 AJAX 데이터를 화면에 적용하는 함수
        function renderUI(data) {
            // --- UI 토글 처리 (수동 vs 자동) ---
            const manualBanner = document.getElementById('manual-banner');
            const autoBanner = document.getElementById('auto-banner');
            const emergencyCallCard = document.getElementById('emergency-call-card');

            if (data.type === 'auto') {
                manualBanner.style.display = 'none';
                autoBanner.style.display = 'block';
                emergencyCallCard.style.display = 'block';
                document.title = "관제 시스템 - 119 자동 신고 완료";
            } else {
                manualBanner.style.display = 'block';
                autoBanner.style.display = 'none';
                emergencyCallCard.style.display = 'none';
                document.title = "관제 시스템 - 119 신고 완료";
            }

            // --- SMS 문자 내용 세팅 ---
            const reportTitle = data.type === 'auto' ? '[긴급 119 AI 자동 신고]' : '[긴급 119 관제센터 신고]';
            const smsText = `<strong>${reportTitle}</strong>\n\n▪ <strong>감지내용:</strong> ${data.event}\n▪ <strong>대상자:</strong> ${data.name} (${data.age}세)\n▪ <strong>기저질환:</strong> ${data.disease}\n▪ <strong>발생위치:</strong> ${data.address}\n▪ <strong>신고자:</strong> ${data.reporter}`;
            document.getElementById('sms-content').innerHTML = smsText;

            // --- 지도 및 주변 병원 세팅 ---
            initMapAndHospitals(data.address, data.name);
        }

        // 3. 카카오맵 및 병원 검색 (기존 로직 동일)
        function initMapAndHospitals(targetAddress, targetName) {
            kakao.maps.load(function () {
                var mapContainer = document.getElementById('map');
                var mapOption = { center: new kakao.maps.LatLng(37.566826, 126.978656), level: 5 };
                var map = new kakao.maps.Map(mapContainer, mapOption);
                var geocoder = new kakao.maps.services.Geocoder();

                if (targetAddress) {
                    geocoder.addressSearch(targetAddress, function(result, status) {
                        if (status === kakao.maps.services.Status.OK) {
                            var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                            map.setCenter(coords);

                            var marker = new kakao.maps.Marker({ position: coords, map: map });
                            var iw = new kakao.maps.InfoWindow({
                                content: `<div style="padding:6px 12px; font-size:13px; font-weight:700; color:#DC2626; border-radius:6px;">${targetName}님 사고 위치</div>`
                            });
                            iw.open(map, marker);

                            searchHospitals(coords, map);
                        } else {
                            document.getElementById('hospital-list').innerHTML = '<li style="padding:20px; text-align:center; color:var(--error);">주소를 찾을 수 없습니다.</li>';
                        }
                    });
                }
            });
        }

        function searchHospitals(center, map) {
            var ps = new kakao.maps.services.Places();
            var hospitalListEl = document.getElementById('hospital-list');

            ps.keywordSearch('응급실', function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    hospitalListEl.innerHTML = '';
                    var limit = Math.min(data.length, 5);

                    for (var i = 0; i < limit; i++) {
                        var place = data[i];
                        var distanceText = place.distance ? (place.distance / 1000).toFixed(1) + 'km' : '-';
                        var phoneText = place.phone || '전화번호 없음';
                        var phoneLink = place.phone ? 'tel:' + place.phone.replace(/-/g, '') : '#';

                        var li = document.createElement('li');
                        li.className = 'hospital-item';
                        li.innerHTML = `
                            <div class="h-info">
                                <div class="h-name">${place.place_name} <span class="h-dist">${distanceText}</span></div>
                                <div class="h-tel">${place.road_address_name || place.address_name}</div>
                            </div>
                            <a href="${phoneLink}" class="h-call-btn">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                                ${phoneText}
                            </a>
                        `;
                        hospitalListEl.appendChild(li);
                    }
                } else {
                    hospitalListEl.innerHTML = '<li style="padding:20px; text-align:center; color:var(--error);">주변 응급실 정보를 찾을 수 없습니다.</li>';
                }
            }, { location: center, radius: 5000, sort: kakao.maps.services.SortBy.DISTANCE });
        }
    });
</script>
</body>
</html>
